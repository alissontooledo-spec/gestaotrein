<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1E2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Toledo Labs — Treinamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  /* ── Navy Clean v2 — Toledo Labs ── */
  --navy:#1E2A4A;--navy-2:#263554;--navy-3:#2E3F6B;
  --amber:#F59E0B;--amber-h:#D97706;--amber-l:#FEF3C7;--amber-text:#92400E;
  --blue:#1D4ED8;--blue-h:#1E40AF;--blue-l:#DBEAFE;--blue-text:#1E40AF;
  --green:#059669;--green-l:#D1FAE5;--green-text:#065F46;
  --red:#DC2626;--red-l:#FEE2E2;--red-text:#991B1B;
  --warn:#D97706;--warn-l:#FEF3C7;--warn-text:#92400E;
  --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;--gray-600:#475569;
  --text-1:#1E2A4A;--text-2:#64748B;--text-3:#94A3B8;
  --surface:#FFFFFF;--bg:#F4F6FA;--border:#E2E8F0;--border-2:#CBD5E1;
  --r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-2xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --nav-h:64px;--sidebar-w:228px;--header-h:58px
}
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.5}
.screen{display:none;position:fixed;inset:0;overflow:hidden;flex-direction:column}
.screen.active{display:flex}

/* ── Login Screen ── */
#screenLogin{background:var(--navy);align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 60% 20%,rgba(46,63,107,.6) 0%,transparent 60%)}
.login-card{background:var(--surface);border-radius:var(--r-2xl);padding:40px 36px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.login-logo-icon{width:44px;height:44px;background:var(--amber);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-icon svg{stroke:var(--navy)}
.login-logo-text{font-size:18px;font-weight:700;color:var(--navy);letter-spacing:-.3px;line-height:1.2}
.login-logo-sub{font-size:11px;color:var(--text-3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px;letter-spacing:-.3px}
.login-sub{font-size:14px;color:var(--text-2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;color:var(--text-1);background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.btn-primary{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:-.1px}
.btn-primary:hover{background:var(--navy-2)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed;transform:none}
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--text-3)}
.login-error{background:var(--red-l);color:var(--red-text);border-radius:var(--r-md);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;border:1px solid #FECACA}
.login-error.show{display:block}

/* ── App shell ── */
#screenApp{background:var(--bg)}

/* ── Sidebar ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-row{display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--amber);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo-icon svg{stroke:var(--navy)}
.sidebar-logo-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;line-height:1.3}
.sidebar-logo-tag{font-size:10px;color:rgba(255,255,255,.38);font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sidebar-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.28);padding:14px 8px 5px;font-weight:500}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;color:rgba(255,255,255,.58);font-size:13px;font-weight:500;transition:background .12s,color .12s;margin-bottom:1px}
.sidebar-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9)}
.sidebar-item.active{background:rgba(245,158,11,.14);color:var(--amber)}
.si-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.si-icon svg{width:17px;height:17px}
.sidebar-badge{margin-left:auto;background:rgba(220,38,38,.85);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:999px;line-height:1.6}
.sidebar-bottom{padding:12px 10px;border-top:1px solid rgba(255,255,255,.07)}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;transition:background .15s}
.sidebar-user:hover{background:rgba(255,255,255,.06)}
.su-avatar{width:30px;height:30px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0}
.su-name{font-size:12px;font-weight:500;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.su-role{font-size:10px;color:rgba(255,255,255,.38)}

/* ── Main content area ── */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.main-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.main-header-title{font-size:16px;font-weight:600;color:var(--text-1);flex:1;letter-spacing:-.2px}
.main-body{flex:1;overflow-y:auto;padding:24px}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--navy)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.show{display:block}

/* ── Mobile bottom nav ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn-items{display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;color:rgba(255,255,255,.38);font-size:10px;font-weight:500;gap:3px;transition:color .15s;border:none;background:none;font-family:inherit}
.bn-item.active{color:var(--amber)}
.bn-item svg{width:22px;height:22px}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--amber);margin-top:1px;opacity:0}
.bn-item.active .bn-dot{opacity:1}

/* ── Mobile header ── */
.mobile-header{display:none;flex-shrink:0;background:var(--navy);padding:20px 16px 18px;padding-top:calc(20px + env(safe-area-inset-top))}
.mh-greeting{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:2px;font-weight:400}
.mh-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.4px}
.mh-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(245,158,11,.18);padding:4px 10px;border-radius:999px;font-size:11px;color:var(--amber);font-weight:500;border:1px solid rgba(245,158,11,.25)}
.mobile-content{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nav-h) + 20px)}

/* ── Cards & surfaces ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:6px}
.card-link{font-size:12px;color:var(--amber-h);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:2px}

/* ── Stats / KPI grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;position:relative;overflow:hidden}
.stat-card.accent{border-top:3px solid var(--amber)}
.stat-label{font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px;display:flex;align-items:center;gap:3px}
.stat-sub.up{color:var(--green)}
.stat-sub.warn{color:var(--warn)}
.stat-sub.down{color:var(--red)}
.stat-card.navy{background:var(--navy);border-color:var(--navy);border-top:3px solid var(--amber)}
.stat-card.navy .stat-label{color:rgba(255,255,255,.55)}
.stat-card.navy .stat-value{color:#fff}
.stat-card.navy .stat-sub{color:rgba(255,255,255,.5)}
.stat-card.blue{background:var(--blue);border-color:var(--blue)}
.stat-card.blue .stat-label,.stat-card.blue .stat-value,.stat-card.blue .stat-sub{color:#fff}
.stat-card.blue .stat-label,.stat-card.blue .stat-sub{color:rgba(255,255,255,.75)}

/* ── List items ── */
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:var(--gray-50);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:var(--r-sm)}
.li-icon{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:700}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--text-2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Badges / Pills ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.05px}
.badge-blue{background:var(--blue-l);color:var(--blue-text)}
.badge-green{background:var(--green-l);color:var(--green-text)}
.badge-amber{background:var(--amber-l);color:var(--amber-text)}
.badge-red{background:var(--red-l);color:var(--red-text)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.badge-navy{background:rgba(30,42,74,.1);color:var(--navy)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-amber{background:var(--amber);color:var(--navy);font-weight:600}
.btn-amber:hover{background:var(--amber-h)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-h)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-2)}
.btn-outline{background:transparent;color:var(--text-1);border:1px solid var(--border-2)}
.btn-outline:hover{background:var(--gray-100)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--gray-100);color:var(--text-1)}
.btn-danger{background:var(--red-l);color:var(--red-text);border:1px solid #FECACA}
.btn-danger:hover{background:#FEE2E2}

/* ── FAB ── */
.fab{position:fixed;right:20px;bottom:calc(var(--nav-h) + 16px);width:52px;height:52px;border-radius:50%;background:var(--amber);color:var(--navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(245,158,11,.45);z-index:80;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.06)}
.fab svg{width:24px;height:24px}

/* ── Section layout ── */
.home-section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:13px;font-weight:600;color:var(--text-1);text-transform:uppercase;letter-spacing:.05em}
.section-link{font-size:12px;color:var(--amber-h);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:3px}

/* ── Empty states ── */
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.35}
.empty-title{font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text-3)}

/* ── Quick actions grid ── */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.qa-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.qa-btn:hover{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-l)}
.qa-icon{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.qa-label{font-size:13px;font-weight:600;color:var(--text-1)}
.qa-sub{font-size:11px;color:var(--text-3);margin-top:2px}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:16px 0}
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollable::-webkit-scrollbar{width:4px}
.scrollable::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:480px){.modal-overlay{align-items:center;padding:16px}}
.modal-box{background:var(--surface);width:100%;max-width:480px;border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s ease}
@media(min-width:480px){.modal-box{border-radius:var(--r-xl);max-height:85vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:600;color:var(--text-1);letter-spacing:-.2px}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px;border-radius:var(--r-sm);display:flex;transition:color .15s}
.modal-close:hover{color:var(--text-1)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── Dropdown menu ── */
.menu-item{padding:9px 14px;font-size:13px;color:var(--text-1);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.menu-item:hover{background:var(--gray-100)}
.menu-item.danger{color:var(--red)}
.menu-item.danger:hover{background:var(--red-l)}

/* ── Toast notifications ── */
#toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:12px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;transform:translateX(120%);transition:transform .25s;pointer-events:auto;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.success{background:#064E3B;border-left:3px solid var(--green)}
.toast.error{background:#7F1D1D;border-left:3px solid var(--red)}
.toast.info{background:var(--navy-2);border-left:3px solid var(--amber)}

/* ── Loading overlay ── */
#loading-overlay{position:fixed;inset:0;background:rgba(30,42,74,.75);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.show{display:flex}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{color:rgba(255,255,255,.75);font-size:13px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive breakpoints ── */
@media(min-width:768px){.sidebar{transform:none!important}.sidebar-overlay{display:none!important}.bottom-nav{display:none!important}.main-content{display:flex;flex:1}.mobile-header{display:none!important}.mobile-content{display:none!important}.hamburger{display:none!important}.fab{bottom:24px;right:24px}}
@media(max-width:767px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.bottom-nav{display:block}.main-content{display:none!important}.mobile-header{display:block}.mobile-content{display:block}.hamburger{display:flex}#screenApp{flex-direction:column}}
@media(min-width:768px) and (max-width:1024px){:root{--sidebar-w:204px}.stats-grid{grid-template-columns:repeat(2,1fr)}.rel2-kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.rel2-rankings{grid-template-columns:1fr}.home-2col{grid-template-columns:1fr}}
@media(min-width:1280px){.stats-grid{grid-template-columns:repeat(4,1fr)}.quick-actions{grid-template-columns:repeat(4,1fr)}.rel2-kpis{grid-template-columns:repeat(4,minmax(0,1fr))}}

/* ── Home Admin redesign ── */
.home-navy-header{background:var(--navy);border-radius:var(--r-xl);padding:18px 18px 22px;margin-bottom:14px}
.home-navy-greeting{font-size:17px;font-weight:700;color:#fff;margin-bottom:2px}
.home-navy-sub{font-size:12px;color:rgba(255,255,255,.45)}
.home-kpi-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:16px}
.home-kpi{background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 12px;cursor:pointer}
.home-kpi-val{font-size:22px;font-weight:700;color:#fff;line-height:1}
.home-kpi-lbl{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.home-kpi-delta{font-size:10px;margin-top:5px;font-weight:600}
.home-kpi-delta.amber{color:var(--amber)}
.home-kpi-delta.green{color:#34D399}
.home-alert{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);border-left:3px solid var(--amber);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.home-alert-text{font-size:12px;color:var(--amber-h);font-weight:500}
.home-chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:14px}
.home-chart-title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

function formatarData(iso) {
  if (!iso) return '-';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function formatarDataHora(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function mascararCnpj(input) {
  let v = input.value.replace(/\D/g,'').slice(0,14);
  if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2}).*/,'$1.$2.$3/$4-$5');
  else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d*).*/,'$1.$2.$3/$4');
  else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d*).*/,'$1.$2.$3');
  else if (v.length > 2) v = v.replace(/^(\d{2})(\d*).*/,'$1.$2');
  input.value = v;
}
function mascararCpf(input) {
  let v = input.value.replace(/\D/g,'').slice(0,11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2}).*/,'$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d*).*/,'$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d*).*/,'$1.$2');
  input.value = v;
}

  c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},dur);
}

  const btn   = document.getElementById('loginBtn');
  if (!email || !senha) { err.textContent='Preencha e-mail e senha.'; err.classList.add('show'); return; }
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password:senha});
    if (error) throw error;
    const {data:perfil, error:ep} = await sb.from('usuarios').select('*').eq('id',data.user.id).single();
    if (ep || !perfil) throw new Error('Usuário não encontrado no sistema. Contate o administrador.');
    if (!perfil.ativo) throw new Error('Usuário inativo. Contate o administrador.');
    usuarioAtual = perfil;
    await entrarNoApp();
  } catch(e) {
    err.textContent = e.message || 'E-mail ou senha incorretos.';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function entrarNoApp() {
  showScreen('screenApp');
  configurarNavegacao();
  await irPara('home');
}

async function fazerLogout() {
  if (!confirm('Deseja sair do sistema?')) return;
  showLoading('Saindo...');
  await sb.auth.signOut();
  usuarioAtual = null;
  hideLoading();
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Entrar';
  showScreen('screenLogin');
}

async function irPara(pagina, params={}) {
  paginaAtual = pagina;
  marcarNavAtivo(pagina);
  fecharSidebar();
  fabOcultar();
  document.getElementById('headerTitle').textContent = TITULOS[pagina] || pagina;
  showLoading();
  try {
    switch(pagina) {
      case 'home':          await renderHome(); break;
      case 'orgs':          await renderOrgs(); break;
      case 'clientes':      await renderClientes(); break;
      case 'colaboradores': await renderColaboradores(); break;
      case 'catalogo':      await renderCatalogo(); break;
      case 'turmas':        await renderTurmas(); break;
      case 'equipe':        await renderEquipe(); break;
      case 'agenda':        await renderAgenda(); break;
      case 'historico':     await renderHistorico(); break;
      case 'relatorios':    await renderRelatorios(); break;
      case 'conta':         await renderConta(); break;
      default: renderEmBreve(TITULOS[pagina]||pagina);
    }
  } catch(e) {
    console.error(e);
    renderErro(e.message);
  } finally {
    hideLoading();
  }
}

  for (let i=5;i>=0;i--) {

function _menuDropdown(btn, items) {

  menu.className = 'dropdown-menu org-menu';
  menu.style.cssText = `position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-md);z-index:200;min-width:180px;padding:4px 0;top:${Math.min(rect.bottom+4,window.innerHeight-160)}px;right:${window.innerWidth-rect.right}px`;
  menu.innerHTML = items.map(item=>item==='---'?'<div style="height:1px;background:var(--border);margin:4px 0"></div>':`<div class="menu-item${item.danger?' danger':''}" data-action="${item.action}" data-id="${item.id||''}" data-extra="${item.extra||''}">${item.label}</div>`).join('');
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),0);
}

async function criarUsuarioOrg() {
  const nome            = document.getElementById('mUsrNome')?.value.trim();
  const email           = document.getElementById('mUsrEmail')?.value.trim();
  const senha           = document.getElementById('mUsrSenha')?.value;
  const perfil          = document.getElementById('mUsrPerfil')?.value;
  const sigla_conselho  = document.getElementById('mUsrSiglaConselho')?.value.trim()||null;
  const conselho_classe = document.getElementById('mUsrConselho')?.value.trim()||null;
  const especialidade   = document.getElementById('mUsrEspecialidade')?.value.trim()||null;
  if (!nome||!email||!senha) { showToast('Preencha todos os campos','error'); return; }
  if (senha.length<6) { showToast('Senha deve ter no mínimo 6 caracteres','error'); return; }
  try {
    setBtnModalLoading(true);
    const {data:{session}} = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/criar-usuario`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`,'apikey':SUPABASE_KEY},
      body:JSON.stringify({nome,email,senha,perfil,org_id:_modalCurrentId,sigla_conselho,conselho_classe,especialidade}),
    });
    const resultado = await res.json();
    if (!res.ok) throw new Error(resultado.error||'Erro ao criar usuário');
    // Salvar campos profissionais diretamente na tabela usuarios
    if (resultado.userId && (sigla_conselho||conselho_classe||especialidade)) {
      await sb.from('usuarios').update({sigla_conselho,conselho_classe,especialidade}).eq('id',resultado.userId);
    }
    fecharModal(); showToast(`${nome} criado com sucesso!`,'success');
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro','error'); }
}

async function salvarCatalogo() {
  const nome = document.getElementById('mCatNome')?.value.trim();
  const desc = document.getElementById('mCatDesc')?.value.trim();
  const ch   = parseFloat(document.getElementById('mCatCH')?.value);
  const val  = parseInt(document.getElementById('mCatVal')?.value);
  if (!nome) { showToast('Nome obrigatório','error'); return; }
  if (!desc) { showToast('Descrição obrigatória','error'); return; }
  if (!ch||ch<=0) { showToast('Carga horária inválida','error'); return; }
  if (!val||val<=0) { showToast('Validade inválida','error'); return; }
  const dados = {nome, descricao:desc, carga_horaria:ch, validade_meses:val, categoria:document.getElementById('mCatCat')?.value.trim()||null, conteudo_programatico:document.getElementById('mCatCP')?.value.trim()||null};
  try {
    setBtnModalLoading(true);
    const {error} = _modalCurrentId ? await sb.from('catalogo').update(dados).eq('id',_modalCurrentId) : await sb.from('catalogo').insert({...dados,org_id:usuarioAtual.org_id,ativo:true});
    if (error) throw error;
    fecharModal(); showToast(_modalCurrentId?'Treinamento atualizado!':'Treinamento cadastrado!','success');
    await renderCatalogo();
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro ao salvar','error'); }
}

async function toggleCatalogo(id) {
  const t = _catalogoCache.find(x=>x.id===id);
  if (!t||!confirm(`Deseja ${t.ativo?'desativar':'ativar'} este treinamento?`)) return;
  const {error} = await sb.from('catalogo').update({ativo:!t.ativo}).eq('id',id);
  if (error) { showToast(error.message,'error'); return; }
  showToast(`Treinamento ${t.ativo?'desativado':'ativado'}!`,'success');
  await renderCatalogo();
}

    const podeMgr      = ['administrador','comercial'].includes(usuarioAtual.perfil);

    const nomeC = t.clientes?.nome||'-';
    const podeEditar = podeMgr && st !== 'concluida' && st !== 'cancelada';

    // Agendamento do instrutor logado (para exibir data/hora)
    const agMeuAgend = usuarioAtual.perfil === 'instrutor'
      ? agendamentos.find(ag => ag.instrutor_id === usuarioAtual.id) || agendamentos[0]
      : null;

    const html = usuarioAtual.perfil === 'instrutor' ? `
      <!-- ===== TELA INSTRUTOR ===== -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button class="btn btn-ghost btn-sm" data-action="irParaTurmas">${ICONS.back} Voltar</button>

function _menuTurmaCard(btn, id) {
  const t = _turmasCache.find(x=>x.id===id);
  if (!t) return;
  const items = [
    {action:'editarTurma', id, label:'Editar turma'},
    '---',
    {action:'cancelarTurma', id, label:'Cancelar turma', danger:true},
  ];
  if (usuarioAtual.perfil === 'administrador') {
    items.push({action:'excluirTurma', id, label:'Excluir turma', danger:true});
  }
  _menuDropdown(btn, items);
}

async function abrirModalTurma(id=null) {
  _modalCurrentId = id;
  if (!_clientesCache.length) {
    const {data} = await sb.from('clientes').select('id,nome').eq('org_id',usuarioAtual.org_id).eq('ativo',true).order('nome');
    _clientesCache = data||[];
  }
  if (!_catalogoCache.length) {
    const {data} = await sb.from('catalogo').select('id,nome,carga_horaria').eq('org_id',usuarioAtual.org_id).eq('ativo',true).order('nome');
    _catalogoCache = data||[];
  }
  if (!_catalogoCache.length) { showToast('Cadastre o catálogo de treinamentos antes de criar turmas','error'); return; }
  const t = id ? _turmasCache.find(x=>x.id===id) : null;
  const podeCriarCliente = ['administrador','comercial'].includes(usuarioAtual.perfil);
  const cliOpts = _clientesCache.map(c=>`<option value="${c.id}" ${t?.cliente_id===c.id?'selected':''}>${c.nome}</option>`).join('');
  const catOpts = _catalogoCache.map(c=>`<option value="${c.id}" ${t?.catalogo_id===c.id?'selected':''}>${c.nome}</option>`).join('');
  abrirModal(t?'Editar turma':'Nova turma', `
    <div class="field">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <label style="margin:0">Cliente *</label>
        ${podeCriarCliente?`<button type="button" class="btn btn-ghost btn-sm" style="padding:3px 8px;font-size:11px;color:var(--amber-h);border:1px solid var(--border)" onclick="abrirModalClienteRapido()">${ICONS.plus} Novo cliente</button>`:''}
      </div>
      <select id="mTurCli" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none">
        <option value="">Selecione o cliente...</option>${cliOpts}
      </select>
    </div>
    <div class="field"><label>Treinamento *</label>
      <select id="mTurCat" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none">
        <option value="">Selecione o treinamento...</option>${catOpts}
      </select></div>
    <div class="field"><label>Observações</label>
      <textarea id="mTurObs" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none">${t?.observacoes||''}</textarea></div>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-navy" id="btnSalvarModal" onclick="salvarTurma()">${t?'Salvar':'Criar turma'}</button>`);
}

async function abrirModalClienteRapido() {
  const cliAtualId = document.getElementById('mTurCli')?.value;
  abrirModal('Novo cliente', `
    <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:var(--r-md);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--amber-text)">
      O cliente será selecionado automaticamente após o cadastro.
    </div>
    <div class="field"><label>Nome *</label><input type="text" id="mCRNome" placeholder="Razão social" autofocus></div>
    <div class="field"><label>CNPJ</label><input type="text" id="mCRCnpj" placeholder="00.000.000/0001-00" maxlength="18" oninput="mascararCnpj(this)"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field" style="margin:0"><label>Cidade</label><input type="text" id="mCRCidade" placeholder="São Paulo"></div>
      <div class="field" style="margin:0"><label>UF</label><input type="text" id="mCRUf" placeholder="SC" maxlength="2" style="text-transform:uppercase"></div>
    </div>
    <div class="field"><label>E-mail</label><input type="email" id="mCREmail" placeholder="contato@empresa.com.br"></div>`,
    `<button class="btn btn-outline" onclick="abrirModalTurma(${_modalCurrentId?`'${_modalCurrentId}'`:'null'})">Voltar</button>
     <button class="btn btn-navy" id="btnSalvarModal" onclick="salvarClienteRapido()">Cadastrar e selecionar</button>`);
}

async function salvarClienteRapido() {
  const nome = document.getElementById('mCRNome')?.value.trim();
  if (!nome) { showToast('Nome é obrigatório','error'); return; }
  const dados = {
    nome,
    cnpj: document.getElementById('mCRCnpj')?.value.trim()||null,
    cidade: document.getElementById('mCRCidade')?.value.trim()||null,
    uf: (document.getElementById('mCRUf')?.value.trim()||'').toUpperCase()||null,
    email: document.getElementById('mCREmail')?.value.trim()||null,
    org_id: usuarioAtual.org_id,
    ativo: true,
  };
  try {
    setBtnModalLoading(true);
    const {data, error} = await sb.from('clientes').insert(dados).select().single();
    if (error) throw error;
    _clientesCache = [];
    const {data:clis} = await sb.from('clientes').select('id,nome').eq('org_id',usuarioAtual.org_id).eq('ativo',true).order('nome');
    _clientesCache = clis||[];
    fecharModal();
    showToast(`${nome} cadastrado!`,'success');
    await abrirModalTurma(_modalCurrentId||null);
    setTimeout(()=>{ const sel = document.getElementById('mTurCli'); if(sel && data) sel.value = data.id; },100);
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro ao salvar','error'); }
}

async function salvarTurma() {
  const cli = document.getElementById('mTurCli')?.value;
  const cat = document.getElementById('mTurCat')?.value;
  if (!cli) { showToast('Selecione o cliente','error'); return; }
  if (!cat) { showToast('Selecione o treinamento','error'); return; }
  const dados = {cliente_id:cli, catalogo_id:cat, observacoes:document.getElementById('mTurObs')?.value.trim()||null};
  try {
    setBtnModalLoading(true);
    const {error} = _modalCurrentId
      ? await sb.from('turmas').update(dados).eq('id',_modalCurrentId)
      : await sb.from('turmas').insert({...dados,org_id:usuarioAtual.org_id,status:'agendada',criado_por:usuarioAtual.id});
    if (error) throw error;
    fecharModal(); showToast(_modalCurrentId?'Turma atualizada!':'Turma criada!','success');
    await renderTurmas();
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro ao salvar','error'); }
}

function abrirModalCancelarTurma(id) {
  _modalCurrentId = id;
  abrirModal('Cancelar turma', `
    <div style="background:var(--red-l,#FEF2F2);border:1px solid #FECACA;border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px;font-size:13px;line-height:1.5">
      <div style="font-weight:600;color:var(--red);margin-bottom:4px">⚠️ Atenção</div>
      O cancelamento não pode ser desfeito. Todos os dados da turma serão preservados para histórico.
    </div>
    <div class="field">
      <label>Motivo do cancelamento *</label>
      <textarea id="mCancelMotivo" rows="4" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Descreva o motivo do cancelamento..."></textarea>
    </div>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Voltar</button>
     <button class="btn btn-danger" id="btnSalvarModal" onclick="confirmarCancelarTurma()" style="background:var(--red);color:#fff;border-color:var(--red)">Confirmar cancelamento</button>`);
}

async function confirmarCancelarTurma() {
  const motivo = document.getElementById('mCancelMotivo')?.value.trim();
  if (!motivo) { showToast('Informe o motivo do cancelamento','error'); return; }
  try {
    setBtnModalLoading(true);
    const {error} = await sb.from('turmas').update({
      status:'cancelada',
      motivo_cancelamento: motivo,
    }).eq('id',_modalCurrentId);
    if (error) throw error;
    fecharModal();
    showToast('Turma cancelada','info');
    await renderTurmas();
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro','error'); }
}

async function cancelarTurma(id) {
  abrirModalCancelarTurma(id);
}

function abrirModalExcluirTurma(id) {
  if (usuarioAtual.perfil !== 'administrador') { showToast('Apenas administradores podem excluir turmas','error'); return; }
  _modalCurrentId = id;
  abrirModal('Excluir turma', `
    <div style="background:var(--red-l,#FEF2F2);border:1px solid #FECACA;border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px;font-size:13px;line-height:1.5">
      <div style="font-weight:600;color:var(--red);margin-bottom:4px">⛔ Ação irreversível</div>
      Esta ação excluirá permanentemente a turma e todos os dados relacionados:
      agendamentos, participantes, presenças e evidências.
    </div>
    <div class="field">
      <label>Digite <strong>EXCLUIR</strong> para confirmar</label>
      <input type="text" id="mExcluirConfirm" placeholder="EXCLUIR">
    </div>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-danger" id="btnSalvarModal" onclick="confirmarExcluirTurma()" style="background:var(--red);color:#fff;border-color:var(--red)">Excluir permanentemente</button>`);
}

async function confirmarExcluirTurma() {
  const confirm = document.getElementById('mExcluirConfirm')?.value.trim();
  if (confirm !== 'EXCLUIR') { showToast('Digite EXCLUIR para confirmar','error'); return; }
  try {
    setBtnModalLoading(true);
    const id = _modalCurrentId;
    // Excluir dados relacionados em cascata
    await sb.from('presencas').delete().eq('turma_id',id);
    await sb.from('evidencias').delete().eq('turma_id',id);
    await sb.from('turma_participantes').delete().eq('turma_id',id);
    await sb.from('sessoes').delete().eq('turma_id',id);
    const {error} = await sb.from('turmas').delete().eq('id',id);
    if (error) throw error;
    fecharModal();
    showToast('Turma excluída permanentemente','info');
    await renderTurmas();
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro ao excluir','error'); }
}

async function _carregarInstrutores() {
  if (window._instrutoresCache && window._instrutoresCache.length) return window._instrutoresCache;
  const {data} = await sb.from('usuarios').select('id,nome').eq('org_id',usuarioAtual.org_id).eq('perfil','instrutor').eq('ativo',true).order('nome');
  window._instrutoresCache = data||[];
  return window._instrutoresCache;
}

async function salvarAgendamento() {
  const turmaId = _modalCurrentId;
  if (!turmaId) { showToast('Erro: ID da turma não encontrado','error'); return; }
  const data = document.getElementById('mAgData')?.value;
  if (!data) { showToast('Informe a data','error'); return; }
  const dados = {
    turma_id:    turmaId,
    org_id:      usuarioAtual.org_id,
    data,
    hora_inicio: document.getElementById('mAgIni')?.value||null,
    hora_fim:    document.getElementById('mAgFim')?.value||null,
    instrutor_id:document.getElementById('mAgInstrutor')?.value||null,
    modalidade:  document.getElementById('mAgMod')?.value||'presencial',
    local:       document.getElementById('mAgLocal')?.value.trim()||null,
  };
  try {
    setBtnModalLoading(true);
    const {error} = window._agendamentoEditId
      ? await sb.from('sessoes').update(dados).eq('id',window._agendamentoEditId)
      : await sb.from('sessoes').insert(dados);
    if (error) throw error;
    fecharModal();
    showToast(window._agendamentoEditId?'Agendamento atualizado!':'Agendamento adicionado!','success');
    window._agendamentoEditId = null;
    await verTurma(turmaId);
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro ao salvar','error'); }
}

function menuAgendamento(btn, agId, turmaId) {
  _menuDropdown(btn, [
    {action:'editarAgendamento', id:agId, extra:turmaId, label:'Editar agendamento'},

    {action:'excluirAgendamento', id:agId, extra:turmaId, label:'Excluir agendamento', danger:true},

}

async function excluirAgendamento(agId, turmaId) {
  if (!confirm('Deseja excluir este agendamento?')) return;
  const {error} = await sb.from('sessoes').delete().eq('id',agId);
  if (error) { showToast(error.message,'error'); return; }
  showToast('Agendamento excluído','info');
  await verTurma(turmaId);
}

function filtrarPartModal(q) {
  const f = q.toLowerCase().trim();
  const r = f ? (window._partDisp||[]).filter(c=>c.nome.toLowerCase().includes(f)||(c.cpf||'').includes(f)) : (window._partDisp||[]);

async function selecionarParticipante(colId) {
  const turmaId   = _modalCurrentId;
  const clienteId = window._partCliId;
  if (!turmaId||!colId) return;
  try {
    const {data:col} = await sb.from('colaboradores').select('nome,cargo').eq('id',colId).single();
    const {data:cli} = clienteId ? await sb.from('clientes').select('nome').eq('id',clienteId).single() : {data:null};
    const {error} = await sb.from('turma_participantes').insert({
      turma_id:turmaId, colaborador_id:colId, org_id:usuarioAtual.org_id,
      empresa_vinculo:cli?.nome||null, cargo_vinculo:col?.cargo||null
    });
    if (error) throw error;
    showToast(`${col?.nome||'Participante'} adicionado!`,'success');
    fecharModal();
    await verTurma(turmaId);
  } catch(e) {
    showToast(e.code==='23505'?'Participante já adicionado':e.message||'Erro','error');
  }
}

async function salvarCadastroRapido() {

function baixarModeloImportacao() {
  const csv = 'nome,cpf,cargo,email,telefone\nJoão da Silva,000.000.000-00,Operador,joao@empresa.com,(47) 99999-9999\nMaria Souza,111.111.111-11,Técnica,maria@empresa.com,(47) 88888-8888';

function abrirModalImportacao() {
  abrirModal('Importar colaboradores', `
    <div style="background:var(--blue-l);border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--blue-h);line-height:1.6">
      <div style="font-weight:600;margin-bottom:4px">Como importar:</div>
      1. Baixe o modelo de planilha abaixo<br>
      2. Preencha com os dados dos colaboradores<br>
      3. Salve como CSV e selecione o arquivo
    </div>
    <button class="btn btn-outline" style="width:100%;margin-bottom:16px" onclick="baixarModeloImportacao()">
      ⬇ Baixar modelo CSV
    </button>
    <div class="field"><label>Selecione o arquivo CSV *</label>
      <input type="file" id="mImpArquivo" accept=".csv" style="width:100%;padding:9px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit"></div>
    <div id="mImpPreview" style="margin-top:8px;font-size:13px;color:var(--text-2)"></div>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-navy" id="btnSalvarModal" onclick="executarImportacao()">Importar</button>`);
  document.getElementById('mImpArquivo').addEventListener('change', previewImportacao);
}

let _dadosImportacao = [];
function previewImportacao(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split('\n').filter(l=>l.trim());
    const header = lines[0].toLowerCase().split(',').map(h=>h.trim());
    const nomeIdx  = header.indexOf('nome');
    const cpfIdx   = header.indexOf('cpf');
    const cargoIdx = header.indexOf('cargo');
    const emailIdx = header.indexOf('email');
    const telIdx   = header.indexOf('telefone');
    if (nomeIdx < 0) { document.getElementById('mImpPreview').innerHTML='<span style="color:var(--red)">Coluna "nome" não encontrada no arquivo.</span>'; return; }
    _dadosImportacao = lines.slice(1).map(line=>{
      const cols = line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      return {
        nome:  cols[nomeIdx]||'',
        cpf:   cpfIdx>=0?cols[cpfIdx]||null:null,
        cargo: cargoIdx>=0?cols[cargoIdx]||null:null,
        email: emailIdx>=0?cols[emailIdx]||null:null,
        telefone:telIdx>=0?cols[telIdx]||null:null,
      };
    }).filter(r=>r.nome);
    document.getElementById('mImpPreview').innerHTML=`<span style="color:var(--green);font-weight:500">✓ ${_dadosImportacao.length} colaboradores encontrados no arquivo.</span>`;
  };
  reader.readAsText(file, 'UTF-8');
}

async function executarImportacao() {
  if (!_dadosImportacao.length) { showToast('Selecione um arquivo CSV válido','error'); return; }
  try {
    setBtnModalLoading(true);
    const {data,error} = await sb.from('colaboradores').upsert(_dadosImportacao, {onConflict:'cpf',ignoreDuplicates:false}).select();
    if (error) throw error;
    fecharModal();
    showToast(`${data?.length||_dadosImportacao.length} colaboradores importados com sucesso!`,'success');
    await renderColaboradores();
  } catch(e) {
    setBtnModalLoading(false);
    showToast(e.message||'Erro ao importar','error');
  }
}

async function renderAgenda() {
  const {data:sessoes} = await sb
    .from('sessoes')
    .select('id,turma_id,data,hora_inicio,hora_fim,local,modalidade,concluida')
    .eq('instrutor_id', usuarioAtual.id)
    .order('data', {ascending:true});

  const turmaIds = [...new Set((sessoes||[]).map(s=>s.turma_id).filter(Boolean))];
  let turmasMap = {};
  if (turmaIds.length) {
    const {data:turmasData} = await sb
      .from('turmas')
      .select('id,status,catalogo_id,cliente_id,clientes(nome),catalogo(nome,carga_horaria)')
      .in('id', turmaIds)
      .neq('status','cancelada');
    (turmasData||[]).forEach(t => { turmasMap[t.id] = t; });
  }

  // Agrupar sessões por turma
  const turmasAgrupadas = {};
  (sessoes||[]).forEach(s => {
    const t = turmasMap[s.turma_id];
    if (!t) return;
    if (!turmasAgrupadas[s.turma_id]) {
      turmasAgrupadas[s.turma_id] = { turma: t, sessoes: [] };
    }
    turmasAgrupadas[s.turma_id].sessoes.push(s);
  });

  setMobileHeader(`<div class="mh-greeting">Agenda</div><div class="mh-name">Meus agendamentos</div>`);
  fabOcultar();

  const SL = {agendada:'Agendada',em_andamento:'Em andamento',concluida:'Concluída',cancelada:'Cancelada'};
  const SB = {agendada:'badge-gray',em_andamento:'badge-blue',concluida:'badge-green',cancelada:'badge-red'};
  const hoje = new Date().toISOString().split('T')[0];

  // Calendário — datas com sessões
  const datasComSessao = new Set((sessoes||[]).map(s=>s.data).filter(Boolean));
  const [anoHoje, mesHoje] = hoje.split('-').map(Number);
  window._agendaMes  = mesHoje;
  window._agendaAno  = anoHoje;
  window._agendaTurmasAgrupadas = turmasAgrupadas;
  window._agendaDatasComSessao  = datasComSessao;
  window._agendaHoje = hoje;
  window._agendaSL = SL; window._agendaSB = SB;

  const renderGrupo = g => {
    const t  = g.turma;
    const st = t.status||'agendada';
    const totalS    = g.sessoes.length;
    const concluidosS = g.sessoes.filter(s=>s.concluida).length;
    const sessaoHoje    = g.sessoes.find(s => s.data === hoje && !s.concluida);
    const proximaSessao = g.sessoes.find(s => s.data >= hoje && !s.concluida);
    const datasHtml = g.sessoes.map(s => {
      const isConcluida = s.concluida;
      const isHoje = s.data === hoje;
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px">${isConcluida?'✅':'📅'}</span>
        <div style="flex:1">
          <span style="font-size:13px;font-weight:${isHoje?'600':'400'};color:${isHoje?'var(--blue)':'var(--text-1)'}">${formatarData(s.data)}</span>
          ${s.hora_inicio?`<span style="font-size:12px;color:var(--text-3)"> · ${s.hora_inicio.slice(0,5)}${s.hora_fim?' – '+s.hora_fim.slice(0,5):''}</span>`:''}
          ${isHoje?`<span style="font-size:10px;font-weight:700;color:var(--blue);margin-left:6px">HOJE</span>`:''}
        </div>
        <span style="font-size:11px;color:${isConcluida?'var(--green)':'var(--text-3)'}">${isConcluida?'Concluído':'Pendente'}</span>
      </div>`;
    }).join('');
    let btnAcao = '';
    if (sessaoHoje && st === 'agendada') {
      btnAcao = `<button class="btn btn-navy" style="width:100%;margin-top:12px" data-action="iniciarExecucaoSessao" data-id="${t.id}" data-sessao="${sessaoHoje.id}">▶ Iniciar treinamento de hoje</button>`;
    } else if (sessaoHoje && st === 'em_andamento') {
      btnAcao = `<button class="btn" style="width:100%;margin-top:12px;background:var(--green);color:#fff" data-action="abrirExecucaoSessao" data-id="${t.id}" data-sessao="${sessaoHoje.id}">▶ Continuar treinamento de hoje</button>`;
    } else if (!sessaoHoje && st === 'em_andamento' && proximaSessao) {
      btnAcao = `<div style="margin-top:10px;font-size:12px;color:var(--text-3);text-align:center">Próxima data: ${formatarData(proximaSessao.data)}</div>`;
    } else if (st === 'concluida') {
      btnAcao = `<button class="btn btn-outline" style="width:100%;margin-top:12px" data-action="abrirDocumentos" data-id="${t.id}">📄 Ver documentos</button>`;
    }
    return `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;color:var(--text-1);margin-bottom:2px">${t.catalogo?.nome||'Treinamento'}</div>
          <div style="font-size:13px;color:var(--text-2)">${t.clientes?.nome||'—'}</div>
        </div>
        <span class="badge ${SB[st]}" style="flex-shrink:0;margin-left:8px">${SL[st]}</span>
      </div>
      <div style="font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">
        Datas — ${concluidosS} de ${totalS} concluída(s)
      </div>
      ${datasHtml}
      ${btnAcao}
    </div>`;
  };

  window._agendaRenderGrupo = renderGrupo;

  const grupos = Object.values(turmasAgrupadas);
  const pendentes  = grupos.filter(g => g.turma.status !== 'concluida');
  const concluidas = grupos.filter(g => g.turma.status === 'concluida');

  setConteudo(`
    <div class="card" style="margin-bottom:16px;padding:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button onclick="_agendaNavMes(-1)" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--navy);padding:4px 10px">‹</button>
        <div id="agendaCalMes" style="font-size:15px;font-weight:700;color:var(--navy)"></div>
        <button onclick="_agendaNavMes(1)" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--navy);padding:4px 10px">›</button>
      </div>
      <div id="agendaCalGrid"></div>
    </div>
    <div id="agendaListaFiltrada">
      <div class="home-section">
        <div class="section-header"><div class="section-title">Pendentes (${pendentes.length})</div></div>
        ${pendentes.length===0
          ?'<div class="card"><div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Nenhum agendamento pendente</div></div></div>'
          :pendentes.map(renderGrupo).join('')}
      </div>
      <div class="home-section">
        <div class="section-header"><div class="section-title">Concluídos (${concluidas.length})</div></div>
        ${concluidas.length===0
          ?'<div class="card"><div class="empty"><div class="empty-icon">✓</div><div class="empty-title">Nenhum concluído ainda</div></div></div>'
          :concluidas.map(renderGrupo).join('')}
      </div>
    </div>`);

  _agendaRenderCalendario();
}

function _agendaRenderCalendario() {
  const mes  = window._agendaMes;
  const ano  = window._agendaAno;
  const datasSet = window._agendaDatasComSessao;
  const hoje = window._agendaHoje;
  const nomesMeses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const elMes = document.getElementById('agendaCalMes');
  const elGrid = document.getElementById('agendaCalGrid');
  if (!elMes || !elGrid) return;
  elMes.textContent = `${nomesMeses[mes-1]} ${ano}`;
  const primeiroDia = new Date(ano, mes-1, 1).getDay();
  const diasNoMes   = new Date(ano, mes, 0).getDate();
  const dias = ['D','S','T','Q','Q','S','S'];
  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
  html += dias.map(d=>`<div style="font-size:10px;font-weight:700;color:var(--text-3);padding:4px 0">${d}</div>`).join('');
  for (let i=0; i<primeiroDia; i++) html += `<div></div>`;
  for (let d=1; d<=diasNoMes; d++) {
    const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const temSessao = datasSet.has(dataStr);
    const ehHoje    = dataStr === hoje;
    html += `<div onclick="_agendaFiltrarData('${dataStr}')" style="padding:6px 2px;border-radius:6px;font-size:12px;cursor:${temSessao?'pointer':'default'};font-weight:${ehHoje?'700':'400'};background:${ehHoje?'var(--navy)':temSessao?'rgba(30,42,74,.1)':'transparent'};color:${ehHoje?'#fff':temSessao?'var(--navy)':'var(--text-3)'};position:relative">
      ${d}${temSessao&&!ehHoje?`<span style="display:block;width:4px;height:4px;background:var(--amber);border-radius:50%;margin:2px auto 0"></span>`:''}
    </div>`;
  }
  html += '</div>';
  elGrid.innerHTML = html;
}

function _agendaNavMes(delta) {
  let mes = window._agendaMes + delta;
  let ano = window._agendaAno;
  if (mes > 12) { mes = 1; ano++; }
  if (mes < 1)  { mes = 12; ano--; }
  window._agendaMes = mes; window._agendaAno = ano;
  _agendaRenderCalendario();
}

function _agendaFiltrarData(dataStr) {
  const turmasAgrupadas = window._agendaTurmasAgrupadas;
  const renderGrupo = window._agendaRenderGrupo;
  const SL = window._agendaSL; const SB = window._agendaSB;
  const el = document.getElementById('agendaListaFiltrada');
  if (!el) return;
  const grupos = Object.values(turmasAgrupadas).filter(g=>g.sessoes.some(s=>s.data===dataStr));
  if (!grupos.length) {
    el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Nenhum agendamento em ${dataStr.split('-').reverse().join('/')}</div></div></div>
      <button class="btn btn-outline btn-sm" style="margin-top:8px;width:100%" onclick="renderAgenda()">Ver todos</button>`;
    return;
  }
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div style="font-size:13px;font-weight:600;color:var(--navy)">${dataStr.split('-').reverse().join('/')} — ${grupos.length} turma(s)</div>
    <button class="btn btn-outline btn-sm" onclick="renderAgenda()">Ver todos</button>
  </div>` + grupos.map(renderGrupo).join('');
}

async function renderHistorico() {
  setMobileHeader(`<div class="mh-greeting">Instrutor</div><div class="mh-name">Histórico</div>`);
  fabOcultar();

  // Buscar todas as sessões concluídas deste instrutor
  const {data:sessoes, error:erS} = await sb
    .from('sessoes')
    .select('id,turma_id,data,hora_inicio,hora_fim,local,concluida')
    .eq('instrutor_id', usuarioAtual.id)
    .eq('concluida', true)
    .order('data', {ascending:false});
  if (erS) throw erS;

  // Buscar turmas concluídas vinculadas
  const turmaIds = [...new Set((sessoes||[]).map(s=>s.turma_id).filter(Boolean))];
  let turmasMap = {};
  if (turmaIds.length) {
    const {data:td} = await sb
      .from('turmas')
      .select('id,status,catalogo_id,cliente_id,observacoes,clientes(nome),catalogo(nome,carga_horaria),turma_participantes(id)')
      .in('id', turmaIds)
      .eq('status','concluida');
    (td||[]).forEach(t=>{ turmasMap[t.id]=t; });
  }

  // Agrupar sessões por turma (apenas turmas concluídas)
  const grupos = {};
  (sessoes||[]).forEach(s=>{
    const t = turmasMap[s.turma_id];
    if (!t) return;
    if (!grupos[s.turma_id]) grupos[s.turma_id] = {turma:t, sessoes:[]};
    grupos[s.turma_id].sessoes.push(s);
  });
  const lista = Object.values(grupos).sort((a,b)=>{
    const da = a.sessoes[0]?.data||'';
    const db = b.sessoes[0]?.data||'';
    return db.localeCompare(da);
  });

  window._historicoLista = lista;
  const totalTurmas   = lista.length;
  const totalAlunos   = lista.reduce((acc,g)=>(acc+(g.turma.turma_participantes?.length||0)),0);
  const totalHoras    = lista.reduce((acc,g)=>{
    const ch  = g.turma.catalogo?.carga_horaria||0;
    return acc + (ch * g.sessoes.length);
  },0);
  const hoje = new Date();
  const mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
  const turmasMes = lista.filter(g=>g.sessoes.some(s=>s.data?.startsWith(mesAtual))).length;
  const clientesUnicos = new Set(lista.map(g=>g.turma.cliente_id).filter(Boolean)).size;

  // Filtros ativos
  const clientesSet = [...new Set(lista.map(g=>g.turma.clientes?.nome).filter(Boolean))].sort();
  const treinamentosSet = [...new Set(lista.map(g=>g.turma.catalogo?.nome).filter(Boolean))].sort();

    : lista.map(g=>{
        const t    = g.turma;
        const nomeT = t.catalogo?.nome||'Treinamento';
        const nomeC = t.clientes?.nome||'—';
        const nPart = t.turma_participantes?.length||0;
        const ch    = t.catalogo?.carga_horaria||0;
        const datas = g.sessoes.map(s=>formatarData(s.data));
        const primeiraData = g.sessoes[g.sessoes.length-1]?.data||'';
        const local = g.sessoes[0]?.local||'—';

async function iniciarExecucaoSessao(turmaId, sessaoId) {
  if (!confirm('Deseja iniciar o treinamento de hoje? O status será alterado para "Em andamento".')) return;
  const {error} = await sb.from('turmas').update({status:'em_andamento'}).eq('id',turmaId);
  if (error) { showToast(error.message,'error'); return; }
  showToast('Execução iniciada!','success');
  await abrirExecucao(turmaId, sessaoId);
}

async function iniciarExecucao(turmaId) {
  if (!confirm('Deseja iniciar a execução desta turma? O status será alterado para "Em andamento".')) return;
  const {error} = await sb.from('turmas').update({status:'em_andamento'}).eq('id',turmaId);
  if (error) { showToast(error.message,'error'); return; }
  showToast('Execução iniciada!','success');

}

// ---- Abrir execução (sessão específica ou primeira pendente) ----
async function abrirExecucaoSessao(turmaId, sessaoId) {
  await abrirExecucao(turmaId, sessaoId);
}

async function abrirExecucao(turmaId, sessaoIdParam) {
  showLoading('Carregando execução...');
  try {
    const {data:t,error} = await sb.from('turmas')
      .select('*,clientes(nome),catalogo(nome,carga_horaria),sessoes(*),turma_participantes(*,colaboradores(*))')
      .eq('id',turmaId).single();
    if (error) throw error;

    window._execTurmaId   = turmaId;
    window._execClienteId = t.cliente_id;
    window._execParticipantes = t.turma_participantes||[];

    // Determinar sessão ativa: parâmetro > hoje > primeira pendente do instrutor
    const hoje = new Date().toISOString().split('T')[0];
    let sessaoAtiva = null;
    if (sessaoIdParam) {
      sessaoAtiva = (t.sessoes||[]).find(s => s.id === sessaoIdParam) || null;
    }
    if (!sessaoAtiva) {
      const sessoesInstrutor = (t.sessoes||[]).filter(s => s.instrutor_id === usuarioAtual.id);
      sessaoAtiva = sessoesInstrutor.find(s => s.data === hoje && !s.concluida)
        || sessoesInstrutor.find(s => !s.concluida)
        || sessoesInstrutor[sessoesInstrutor.length - 1]
        || null;
    }

    window._execSessaoId = sessaoAtiva?.id || null;

    // Presenças da sessão ativa
    const {data:presencas} = window._execSessaoId
      ? await sb.from('presencas').select('*').eq('sessao_id', window._execSessaoId)
      : await sb.from('presencas').select('*').eq('turma_id', turmaId);
    window._execPresencas = {};
    (presencas||[]).forEach(p => { window._execPresencas[p.colaborador_id] = p; });

    // Evidências da sessão ativa
    const {data:evidencias} = window._execSessaoId
      ? await sb.from('evidencias').select('*').eq('sessao_id', window._execSessaoId)
      : {data:[]};
    window._execEvidencias = evidencias||[];

    const nomeT = t.catalogo?.nome||'Treinamento';
    const nomeC = t.clientes?.nome||'';
    const totalSessoes    = (t.sessoes||[]).filter(s => s.instrutor_id === usuarioAtual.id).length;
    const concluidasSessoes = (t.sessoes||[]).filter(s => s.instrutor_id === usuarioAtual.id && s.concluida).length;
    const infoSessao = sessaoAtiva
      ? `${formatarData(sessaoAtiva.data)}${totalSessoes > 1 ? ` · Dia ${concluidasSessoes + 1} de ${totalSessoes}` : ''}`
      : '';

    const html = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <button class="btn btn-ghost btn-sm" data-action="irParaTurmas">${ICONS.back} Voltar</button>
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700;color:var(--text-1)">${nomeT}</div>
          <div style="font-size:13px;color:var(--text-2)">${nomeC}${infoSessao ? ' · '+infoSessao : ''}</div>
        </div>
        <span class="badge badge-blue">Em andamento</span>
      </div>

      <!-- Abas de execução -->
      <div style="display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:0">

// Retorna o container de execução visível (mobile ou desktop)
function _execContainer() {
  const mobile = document.getElementById('mobileBody');
  const desktop = document.getElementById('mainBody');
  // No mobile o mobileBody está visível (display:block via CSS media query)
  if (window.innerWidth < 768) return mobile;
  return desktop;
}

// Busca um elemento pelo ID dentro do container correto
function execEl(id) {
  return _execContainer().querySelector('#'+id) || document.getElementById(id);
}

function trocarAbaExec(aba, btn) {
  const container = btn.closest('#mainBody, #mobileBody') || _execContainer();
  container.querySelectorAll('.exec-tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.exec-aba').forEach(a => a.style.display = 'none');
  btn.classList.add('active');
  const abaId = 'aba' + aba.charAt(0).toUpperCase() + aba.slice(1);
  const abaEl = container.querySelector('#' + abaId);
  if (abaEl) abaEl.style.display = 'block';

  if (aba === 'presenca') {
    const lista = container.querySelector('#listaPresencas');
    if (lista && window._execParticipantes) {
      lista.innerHTML = _htmlListaPresencas(window._execParticipantes);
    }
  }
  if (aba === 'finalizar') {
    const totalAssin = container.querySelector('#totalAssinados');
    if (totalAssin && window._execPresencas) {
      totalAssin.textContent = Object.values(window._execPresencas).filter(p => p.assinatura_path || p.presente).length;
    }
    const totalEv = container.querySelector('#totalEvidencias');
    if (totalEv && window._execEvidencias) {
      totalEv.textContent = window._execEvidencias.length;
    }
  }
}

// ---- Assinatura digital ----
function abrirAssinatura(colId, nomeCol) {
  window._assinaturaColId = colId;
  window._assinaturaNome  = nomeCol;
  abrirModal(`Assinatura — ${nomeCol}`, `
    <div style="font-size:13px;color:var(--text-2);margin-bottom:12px">
      ${nomeCol}, assine no espaço abaixo:
    </div>
    <canvas id="canvasAssinatura" width="440" height="180"
      style="border:2px solid var(--border);border-radius:var(--r-md);touch-action:none;width:100%;display:block;background:#fff;cursor:crosshair">
    </canvas>
    <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="limparAssinatura()">
      🗑 Limpar
    </button>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-navy" id="btnSalvarModal" onclick="confirmarAssinatura()">Confirmar assinatura</button>`);

  // Inicializar canvas após modal abrir
  setTimeout(()=>_initCanvas(), 100);
}

function _initCanvas() {
  const canvas = document.getElementById('canvasAssinatura');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Ajustar resolução para telas de alta densidade
  const ratio = window.devicePixelRatio||1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width  = w * ratio;
  canvas.height = h * ratio;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(ratio, ratio);
  ctx.strokeStyle = '#0F172A';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  let desenhando = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {x: src.clientX - rect.left, y: src.clientY - rect.top};
  }
  function start(e) {
    e.preventDefault();
    desenhando = true;
    const {x,y} = getPos(e);
    lastX = x; lastY = y;
    ctx.beginPath();
    ctx.moveTo(x,y);
  }
  function draw(e) {
    if (!desenhando) return;
    e.preventDefault();
    const {x,y} = getPos(e);
    ctx.lineTo(x,y);
    ctx.stroke();
    lastX = x; lastY = y;
  }
  function end(e) { desenhando = false; }

  canvas.addEventListener('mousedown',  start, {passive:false});
  canvas.addEventListener('mousemove',  draw,  {passive:false});
  canvas.addEventListener('mouseup',    end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove',  draw,  {passive:false});
  canvas.addEventListener('touchend',   end);
}

function limparAssinatura() {
  const canvas = document.getElementById('canvasAssinatura');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

async function confirmarAssinatura() {
  const canvas = document.getElementById('canvasAssinatura');
  if (!canvas) return;

  // Verificar se há traços
  const ctx   = canvas.getContext('2d');
  const pixels= ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasData = pixels.some((v,i)=>i%4===3&&v>0);
  if (!hasData) { showToast('Por favor, realize a assinatura antes de confirmar','error'); return; }

  try {
    setBtnModalLoading(true);
    const turmaId = window._execTurmaId;
    const colId   = window._assinaturaColId;
    const dataUrl = canvas.toDataURL('image/png');

    // Upload da assinatura para o Storage
    const blob    = await (await fetch(dataUrl)).blob();
    const path    = `${usuarioAtual.org_id}/${turmaId}/${colId}.png`;
    const {error:upErr} = await sb.storage.from('assinaturas').upload(path, blob, {upsert:true, contentType:'image/png'});
    if (upErr) throw upErr;

    // Registrar presença
    // Verificar se já existe presença para atualizar ou inserir
    const {data:presExist} = await sb.from('presencas')
      .select('id').eq('turma_id',turmaId).eq('colaborador_id',colId).maybeSingle();
    const sessaoId = window._execSessaoId;
    if (!sessaoId) throw new Error('Sessão não encontrada. Certifique-se de que há um agendamento vinculado a você nesta turma.');
    let dbErr;
    if (presExist) {
      ({error:dbErr} = await sb.from('presencas').update({
        presente:true, assinatura_path:path, assinado_em:new Date().toISOString(),
        sessao_id:sessaoId,
      }).eq('id',presExist.id));
    } else {
      ({error:dbErr} = await sb.from('presencas').insert({
        sessao_id:sessaoId, turma_id:turmaId,
        colaborador_id:colId, org_id:usuarioAtual.org_id,
        presente:true, assinatura_path:path, assinado_em:new Date().toISOString(),
      }));
    }
    if (dbErr) throw dbErr;

    // Atualizar cache local
    window._execPresencas[colId] = {
      colaborador_id:colId,
      presente:true,
      assinatura_path:path,
      assinado_em:new Date().toISOString(),
    };

    fecharModal();
    showToast(`Assinatura de ${window._assinaturaNome} registrada!`,'success');

    // Atualizar lista sem recarregar tudo
    const listaEl = execEl('listaPresencas');
    if (listaEl) listaEl.innerHTML = _htmlListaPresencas(window._execParticipantes);

    // Atualizar contador na aba finalizar
    const totalEl = execEl('totalAssinados');
    if (totalEl) totalEl.textContent = Object.values(window._execPresencas).filter(p=>p.assinatura_path||p.presente).length;

  } catch(e) {
    setBtnModalLoading(false);
    showToast(e.message||'Erro ao salvar assinatura','error');
  }
}

// ---- Evidências fotográficas ----
function _htmlListaEvidencias(evidencias) {
  if (!evidencias.length) return `<div class="empty" style="padding:20px"><div class="empty-icon">📷</div><div class="empty-title">Nenhuma evidência</div><div class="empty-sub">Adicione fotos do treinamento.</div></div>`;
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">` +
    evidencias.map(ev=>`
      <div style="position:relative;border-radius:var(--r-md);overflow:hidden;aspect-ratio:1;background:var(--gray-100)">
        <img src="${ev.url_temp||''}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);padding:4px 6px;font-size:10px;color:#fff">
          ${ev.tipo||'foto'}
        </div>
        <button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:20px;height:20px;color:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center"
          data-action="removerEvidencia" data-id="${ev.id}" data-path="${ev.arquivo_path||''}">✕</button>
      </div>`).join('') + '</div>';
}

async function adicionarEvidencia(input, tipo) {
  const file = input.files[0];
  if (!file) return;
  const turmaId = window._execTurmaId;
  try {
    showLoading('Enviando foto...');
    const ext  = file.type.split('/')[1]||'jpg';
    const uuid = crypto.randomUUID();
    const path = `${usuarioAtual.org_id}/${turmaId}/${uuid}.${ext}`;

    const {error:upErr} = await sb.storage.from('evidencias').upload(path, file, {upsert:false, contentType:file.type});
    if (upErr) throw upErr;

    const sessaoId = window._execSessaoId;
    if (!sessaoId) throw new Error('Agendamento não encontrado. Verifique se há um agendamento vinculado a você nesta turma.');
    const {data:ev, error:dbErr} = await sb.from('evidencias').insert({
      org_id:       usuarioAtual.org_id,
      sessao_id:    sessaoId,
      tipo,
      arquivo_path: path,
    }).select().single();
    if (dbErr) throw dbErr;

    // URL temporária para exibição
    const {data:urlData} = await sb.storage.from('evidencias').createSignedUrl(path, 3600);
    ev.url_temp = urlData?.signedUrl||'';
    window._execEvidencias.push(ev);

    const listaEvEl = execEl('listaEvidencias');
    if (listaEvEl) listaEvEl.innerHTML = _htmlListaEvidencias(window._execEvidencias);
    showToast('Foto adicionada!','success');
    input.value = '';
  } catch(e) {
    showToast(e.message||'Erro ao enviar foto','error');
  } finally { hideLoading(); }
}

async function removerEvidencia(evId, path) {
  if (!confirm('Deseja remover esta evidência?')) return;
  try {
    if (path) await sb.storage.from('evidencias').remove([path]);
    const {error} = await sb.from('evidencias').delete().eq('id',evId);
    if (error) throw error;
    window._execEvidencias = window._execEvidencias.filter(e=>e.id!==evId);
    const listaEvEl2 = execEl('listaEvidencias');
    if (listaEvEl2) listaEvEl2.innerHTML = _htmlListaEvidencias(window._execEvidencias);
    showToast('Evidência removida','info');
  } catch(e) { showToast(e.message||'Erro','error'); }
}

async function salvarAnotacoes(turmaId) {
  const textarea = execEl('anotacoesInstrutor');
  if (!textarea) return;
  const texto = textarea.value.trim();
  const {error} = await sb.from('turmas').update({anotacoes_instrutor:texto}).eq('id',turmaId);
  if (error) { showToast(error.message,'error'); return; }
  textarea.readOnly = true;
  textarea.style.background = 'var(--gray-50)';
  textarea.style.color = 'var(--text-2)';
  const btnSalvar  = execEl('btnSalvarAnotacoes');
  const btnEditar  = execEl('btnEditarAnotacoes');
  const labelSalvo = execEl('anotacoesSalvas');
  if (btnSalvar)  btnSalvar.style.display  = 'none';
  if (btnEditar)  btnEditar.style.display  = 'inline-flex';
  if (labelSalvo) labelSalvo.style.display = 'inline';
  showToast('Anotações salvas!','success');
}

function editarAnotacoes() {
  const textarea = execEl('anotacoesInstrutor');
  if (!textarea) return;
  textarea.readOnly = false;
  textarea.style.background = '';
  textarea.style.color = '';
  textarea.focus();
  const btnSalvar  = execEl('btnSalvarAnotacoes');
  const btnEditar  = execEl('btnEditarAnotacoes');
  const labelSalvo = execEl('anotacoesSalvas');
  if (btnSalvar)  btnSalvar.style.display  = 'inline-flex';
  if (btnEditar)  btnEditar.style.display  = 'none';
  if (labelSalvo) labelSalvo.style.display = 'none';
}

// ---- Finalizar turma ----
async function finalizarTurma(turmaId) {
  const total   = window._execParticipantes.length;
  const assinou = Object.values(window._execPresencas).filter(p=>p.assinatura_path||p.presente).length;
  if (total > 0 && assinou === 0) {
    if (!confirm('Nenhum participante assinou ainda. Deseja finalizar mesmo assim?')) return;
  }
  if (!confirm('Confirma a finalização desta etapa do treinamento?')) return;
  try {
    showLoading('Finalizando...');

    // 1. Marcar a sessão atual como concluída
    const sessaoId = window._execSessaoId;
    if (sessaoId) {
      const {error:errSessao} = await sb.from('sessoes')
        .update({concluida: true})
        .eq('id', sessaoId);
      if (errSessao) throw errSessao;
    }

    // 2. Verificar se TODAS as sessões da turma estão concluídas
    const {data:todasSessoes} = await sb.from('sessoes')
      .select('id,concluida')
      .eq('turma_id', turmaId);

    const todasConcluidas = (todasSessoes||[]).length > 0
      && (todasSessoes||[]).every(s => s.concluida || s.id === sessaoId);

    // 3. Só marca turma como concluída se todas as sessões terminaram
    if (todasConcluidas) {
      const {error:errTurma} = await sb.from('turmas')
        .update({status: 'concluida'})
        .eq('id', turmaId);
      if (errTurma) throw errTurma;
      showToast('Treinamento concluído! Todos os dias finalizados.', 'success');
    } else {
      showToast('Etapa finalizada! Retorne na próxima data para continuar.', 'success');
    }

    await verTurma(turmaId);
  } catch(e) {
    showToast(e.message||'Erro ao finalizar','error');
  } finally { hideLoading(); }
}
