<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Treinamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0F172A;--navy-2:#1E293B;--navy-3:#334155;--blue:#2563EB;--blue-h:#1D4ED8;--blue-l:#EFF6FF;--blue-m:#BFDBFE;--green:#059669;--green-l:#D1FAE5;--amber:#D97706;--amber-l:#FEF3C7;--red:#DC2626;--red-l:#FEE2E2;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;--gray-600:#475569;--gray-700:#334155;--gray-800:#1E293B;--text-1:#0F172A;--text-2:#475569;--text-3:#94A3B8;--surface:#FFFFFF;--bg:#F8FAFC;--border:#E2E8F0;--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.1);--nav-h:64px;--sidebar-w:240px;--header-h:60px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.5}
.screen{display:none;position:fixed;inset:0;overflow:hidden;flex-direction:column}
.screen.active{display:flex}
#screenLogin{background:var(--navy);align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo-icon{width:42px;height:42px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-text{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.login-logo-sub{font-size:11px;color:var(--text-3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px}
.login-sub{font-size:14px;color:var(--text-2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:15px;font-family:inherit;color:var(--text-1);background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.btn-primary{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:-.1px}
.btn-primary:hover{background:var(--blue-h)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed;transform:none}
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--text-3)}
.login-error{background:var(--red-l);color:var(--red);border-radius:var(--r-md);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.login-error.show{display:block}
#screenApp{background:var(--bg)}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo-row{display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sidebar-logo-tag{font-size:10px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;transition:background .15s,color .15s;margin-bottom:2px}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(37,99,235,.3);color:#fff}
.si-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sidebar-bottom{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);cursor:pointer;transition:background .15s}
.sidebar-user:hover{background:rgba(255,255,255,.08)}
.su-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.su-name{font-size:13px;font-weight:500;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.su-role{font-size:11px;color:rgba(255,255,255,.4)}
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.main-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.main-header-title{font-size:17px;font-weight:600;color:var(--text-1);flex:1}
.main-body{flex:1;overflow-y:auto;padding:24px}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--text-1)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.show{display:block}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn-items{display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:var(--text-3);font-size:10px;font-weight:500;gap:3px;transition:color .15s;border:none;background:none;font-family:inherit}
.bn-item.active{color:var(--blue)}
.bn-item svg{width:22px;height:22px}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:1px;opacity:0}
.bn-item.active .bn-dot{opacity:1}
.mobile-header{display:none;flex-shrink:0;background:var(--navy);padding:20px 16px 16px;padding-top:calc(20px + env(safe-area-inset-top))}
.mh-greeting{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:2px}
.mh-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
.mh-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;font-size:12px;color:rgba(255,255,255,.8);font-weight:500}
.mobile-content{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nav-h) + 20px)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--text-1);letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px}
.stat-card.blue{background:var(--blue);border-color:var(--blue)}
.stat-card.blue .stat-label,.stat-card.blue .stat-value,.stat-card.blue .stat-sub{color:#fff}
.stat-card.blue .stat-label,.stat-card.blue .stat-sub{color:rgba(255,255,255,.75)}
.list-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.list-item:last-child{border-bottom:none}
.li-icon{width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:700}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--text-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.1px}
.badge-blue{background:var(--blue-l);color:var(--blue-h)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r-md);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-h)}
.btn-outline{background:transparent;color:var(--text-1);border:1px solid var(--border)}
.btn-outline:hover{background:var(--gray-100)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--gray-100);color:var(--text-1)}
.btn-danger{background:var(--red-l);color:var(--red)}
.fab{position:fixed;right:20px;bottom:calc(var(--nav-h) + 16px);width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:80;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.05)}
.fab svg{width:24px;height:24px}
.home-section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:var(--text-1)}
.section-link{font-size:13px;color:var(--blue);font-weight:500;cursor:pointer}
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text-3)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.qa-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.qa-btn:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.qa-icon{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.qa-label{font-size:13px;font-weight:600;color:var(--text-1)}
.qa-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.divider{height:1px;background:var(--border);margin:16px 0}
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollable::-webkit-scrollbar{width:4px}
.scrollable::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:480px){.modal-overlay{align-items:center;padding:16px}}
.modal-box{background:var(--surface);width:100%;max-width:480px;border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s ease}
@media(min-width:480px){.modal-box{border-radius:var(--r-xl);max-height:85vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:600;color:var(--text-1)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px;border-radius:var(--r-sm);display:flex}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.menu-item{padding:9px 14px;font-size:13px;color:var(--text-1);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.menu-item:hover{background:var(--gray-100)}
.menu-item.danger{color:var(--red)}
.menu-item.danger:hover{background:var(--red-l)}
#toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:12px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;transform:translateX(120%);transition:transform .25s;pointer-events:auto;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.success{background:#064E3B;border-left:3px solid var(--green)}
.toast.error{background:#7F1D1D;border-left:3px solid var(--red)}
.toast.info{background:var(--navy-2);border-left:3px solid var(--blue)}
#loading-overlay{position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.loading-text{color:rgba(255,255,255,.8);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:768px){.sidebar{transform:none!important}.sidebar-overlay{display:none!important}.bottom-nav{display:none!important}.main-content{display:flex;flex:1}.mobile-header{display:none!important}.mobile-content{display:none!important}.hamburger{display:none!important}.fab{bottom:24px;right:24px}}
@media(max-width:767px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.bottom-nav{display:block}.main-content{display:none!important}.mobile-header{display:block}.mobile-content{display:block}.hamburger{display:flex}#screenApp{flex-direction:column}}
@media(min-width:768px) and (max-width:1024px){:root{--sidebar-w:200px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1280px){.stats-grid{grid-template-columns:repeat(4,1fr)}.quick-actions{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="screen active" id="screenLogin">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>

<script>
const SUPABASE_URL='https://cldbqcpnzitwqvgqbipz.supabase.co';
const SUPABASE_KEY='sb_publishable_uuOYchKEtJXdYPI0pKmM_A_mtp-ihMT';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let usuarioAtual=null,paginaAtual='home',fabCallback=null;

const isMobile=()=>window.innerWidth<768;

function iniciais(n){if(!n)return'?';return n.trim().split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('')}
function corPerfil(p){return{provedor:'#7C3AED',administrador:'#2563EB',comercial:'#059669',instrutor:'#D97706'}[p]||'#64748B'}
function labelPerfil(p){return{provedor:'Provedor',administrador:'Administrador',comercial:'Comercial',instrutor:'Instrutor'}[p]||p}
function hora(){const h=new Date().getHours();return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite'}
function formatarData(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('pt-BR')}

function showToast(msg,tipo='info',dur=3500){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+tipo;
  t.innerHTML='<span>'+(tipo==='success'?'checkmark':tipo==='error'?'X':'i')+'</span><span>'+msg+'</span>';
  c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},dur);
}

function showLoading(msg='Carregando...'){document.getElementById('loadingText').textContent=msg;document.getElementById('loading-overlay').classList.add('show')}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show')}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function abrirSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('show')}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin()});
});

async function fazerLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';err.classList.add('show');return}
  err.classList.remove('show');btn.disabled=true;btn.textContent='Entrando...';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
    if(error)throw error;
    const{data:perfil,error:ep}=await sb.from('usuarios').select('*').eq('id',data.user.id).single();
    if(ep||!perfil)throw new Error('Usuario nao encontrado no sistema. Contate o administrador.');
    if(!perfil.ativo)throw new Error('Usuario inativo. Contate o administrador.');
    usuarioAtual=perfil;
    await entrarNoApp();
  }catch(e){
    err.textContent=e.message||'E-mail ou senha incorretos.';
    err.classList.add('show');btn.disabled=false;btn.textContent='Entrar';
  }
}

async function entrarNoApp(){showScreen('screenApp');configurarNavegacao();await irPara('home')}

async function fazerLogout(){
  if(!confirm('Deseja sair do sistema?'))return;
  showLoading('Saindo...');
  await sb.auth.signOut();
  usuarioAtual=null;hideLoading();
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='Entrar';
  showScreen('screenLogin');
}

function configurarNavegacao(){
  const p=usuarioAtual.perfil;const itens=NAV_ITENS[p]||[];const bIds=NAV_BOTTOM[p]||[];
  document.getElementById('sidebarNav').innerHTML=itens.map(i=>'<div class="sidebar-item" id="si-'+i.id+'" onclick="irPara(\''+i.id+'\')"><span class="si-icon">'+i.icon+'</span><span>'+i.label+'</span></div>').join('');
  const bItens=itens.filter(i=>bIds.includes(i.id));
  document.getElementById('bnItems').innerHTML=bItens.map(i=>'<button class="bn-item" id="bn-'+i.id+'" onclick="irPara(\''+i.id+'\')">'+i.icon+'<span>'+i.label+'</span><div class="bn-dot"></div></button>').join('');
  document.getElementById('sidebarAvatar').textContent=iniciais(usuarioAtual.nome);
  document.getElementById('sidebarAvatar').style.background=corPerfil(p);
  document.getElementById('sidebarNome').textContent=usuarioAtual.nome;
  document.getElementById('sidebarPerfil').textContent=labelPerfil(p);
}

function marcarNavAtivo(id){
  document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(e=>e.classList.remove('active'));
  const si=document.getElementById('si-'+id);const bn=document.getElementById('bn-'+id);
  if(si)si.classList.add('active');if(bn)bn.classList.add('active');
}

async function irPara(pagina,params={}){
  paginaAtual=pagina;marcarNavAtivo(pagina);fecharSidebar();
  fabCallback=null;document.getElementById('fabBtn').style.display='none';
  const titulos={home:'Inicio',orgs:'Organizacoes',turmas:'Turmas',clientes:'Clientes',colaboradores:'Colaboradores',catalogo:'Catalogo de Treinamentos',relatorios:'Relatorios',equipe:'Equipe',agenda:'Minha Agenda',historico:'Historico',conta:'Minha conta'};
  document.getElementById('headerTitle').textContent=titulos[pagina]||pagina;
  showLoading();
  try{
    switch(pagina){
      case 'home': await renderHome();break;
      case 'agenda': await renderAgenda();break;
      case 'conta': await renderConta();break;
      case 'orgs': await renderOrgs();break;
      case 'turmas': await renderTurmas();break;
      case 'clientes': await renderClientes();break;
      case 'colaboradores': await renderColaboradores();break;
      case 'catalogo': await renderCatalogo();break;
      case 'equipe': await renderEquipe();break;
      default: renderEmBreve(titulos[pagina]||pagina);
    }
  }catch(e){console.error(e);renderErro(e.message);}
  finally{hideLoading();}
}

function setBtnModalLoading(loading){

  btn.disabled=loading;
  if(loading){if(!btn.dataset.label)btn.dataset.label=btn.textContent;btn.textContent='Salvando...';}

}

function mascararCnpj(input){
  let v=input.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12)v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2}).*/,'$1.$2.$3/$4-$5');
  else if(v.length>8)v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d*).*/,'$1.$2.$3/$4');
  else if(v.length>5)v=v.replace(/^(\d{2})(\d{3})(\d*).*/,'$1.$2.$3');
  else if(v.length>2)v=v.replace(/^(\d{2})(\d*).*/,'$1.$2');
  input.value=v;
}
function mascararCpf(input){
  let v=input.value.replace(/\D/g,'').slice(0,11);
  if(v.length>9)v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2}).*/,'$1.$2.$3-$4');
  else if(v.length>6)v=v.replace(/(\d{3})(\d{3})(\d*).*/,'$1.$2.$3');
  else if(v.length>3)v=v.replace(/(\d{3})(\d*).*/,'$1.$2');
  input.value=v;
}

async function salvarConta(){
  const nome=document.getElementById('editNome')&&document.getElementById('editNome').value.trim();
  const email=document.getElementById('editEmail')&&document.getElementById('editEmail').value.trim();
  if(!nome){showToast('Nome e obrigatorio','error');return;}
  try{
    const{error}=await sb.from('usuarios').update({nome,email}).eq('id',usuarioAtual.id);
    if(error)throw error;

async function criarUsuarioOrg(orgId){
  const nome=document.getElementById('mUsrNome')&&document.getElementById('mUsrNome').value.trim();
  const email=document.getElementById('mUsrEmail')&&document.getElementById('mUsrEmail').value.trim();
  const senha=document.getElementById('mUsrSenha')&&document.getElementById('mUsrSenha').value;
  const perfil=document.getElementById('mUsrPerfil')&&document.getElementById('mUsrPerfil').value;
  if(!nome||!email||!senha){showToast('Preencha todos os campos','error');return;}
  if(senha.length<6){showToast('Senha deve ter no minimo 6 caracteres','error');return;}
  try{
    setBtnModalLoading(true);
    const{data:{session}}=await sb.auth.getSession();
    const res=await fetch(SUPABASE_URL+'/functions/v1/criar-usuario',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_KEY},body:JSON.stringify({nome,email,senha,perfil,org_id:orgId})});
    const resultado=await res.json();
    if(!res.ok)throw new Error(resultado.error||'Erro ao criar usuario');
    fecharModal();showToast(nome+' criado com sucesso!','success');
  }catch(e){setBtnModalLoading(false);showToast(e.message||'Erro ao criar usuario','error');}
}

  return lista.map(t=>'<div class="list-item" style="padding:14px 4px"><div class="li-icon" style="background:var(--amber-l);color:var(--amber);font-size:12px;font-weight:700;border-radius:var(--r-md);text-align:center;line-height:1.2;padding:4px">'+t.carga_horaria+'h</div><div class="li-info"><div class="li-title">'+t.nome+'</div><div class="li-sub">'+(t.categoria?t.categoria+' - ':'')+'Validade: '+t.validade_meses+' '+(t.validade_meses===1?'mes':'meses')+' - '+t.carga_horaria+'h</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="badge '+(t.ativo?'badge-green':'badge-gray')+'">'+(t.ativo?'Ativo':'Inativo')+'</span><button class="btn btn-ghost btn-sm" onclick="menuCatalogo(event,\''+t.id+'\')" style="padding:6px;border-radius:var(--r-sm)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></div></div>').join('');
}
function filtrarCatalogo(q){
  const f=q.toLowerCase().trim();
  const r=f?_catalogoCache.filter(t=>t.nome.toLowerCase().includes(f)||(t.categoria||'').toLowerCase().includes(f)):_catalogoCache;
  document.getElementById('listaCatalogo').innerHTML=_htmlListaCatalogo(r);
}
function menuCatalogo(event,id){
  event.stopPropagation();document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  const t=_catalogoCache.find(x=>x.id===id);if(!t)return;
  const btn=event.currentTarget;const rect=btn.getBoundingClientRect();
  const menu=document.createElement('div');menu.className='org-menu';
  menu.style.cssText='position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-md);z-index:200;min-width:160px;padding:4px 0;top:'+Math.min(rect.bottom+4,window.innerHeight-110)+'px;right:'+(window.innerWidth-rect.right)+'px';
  menu.innerHTML='<div class="menu-item" onclick="abrirModalCatalogo(\''+id+'\')">Editar</div><div class="menu-item'+(t.ativo?' danger':'')+'" onclick="toggleCatalogo(\''+id+'\','+t.ativo+')">'+(t.ativo?'Desativar':'Ativar')+'</div>';
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),0);
}
function abrirModalCatalogo(id=null){
  _modalCurrentId=id||null;
  document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  const t=id?_catalogoCache.find(x=>x.id===id):null;
  abrirModal(t?'Editar treinamento':'Novo treinamento',
    '<div class="field"><label>Nome do treinamento *</label><input type="text" id="mCatNome" value="'+(t?t.nome:'')+'" placeholder="Ex.: NR-35 Trabalho em Altura"></div>'+
    '<div class="field"><label>Descricao *</label><textarea id="mCatDesc" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Descricao do treinamento...">'+(t&&t.descricao?t.descricao:'')+'</textarea></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="field" style="margin:0"><label>Carga horaria (h) *</label><input type="number" id="mCatCH" value="'+(t&&t.carga_horaria?t.carga_horaria:'')+'" placeholder="8" min="1" step="0.5"></div>'+
    '<div class="field" style="margin:0"><label>Validade (meses) *</label><input type="number" id="mCatVal" value="'+(t&&t.validade_meses?t.validade_meses:'')+'" placeholder="24" min="1"></div></div>'+
    '<div class="field"><label>Categoria</label><input type="text" id="mCatCat" value="'+(t&&t.categoria?t.categoria:'')+'" placeholder="Ex.: NR, CIPA..."></div>'+
    '<div class="field"><label>Conteudo programatico</label><textarea id="mCatCP" rows="4" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Topicos abordados...">'+(t&&t.conteudo_programatico?t.conteudo_programatico:'')+'</textarea></div>',
    '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button><button class="btn btn-blue" id="btnSalvarModal" onclick="salvarCatalogo(_modalCurrentId)">'+(t?'Salvar':'Cadastrar')+'</button>');
}
async function salvarCatalogo(id){
  const nome=document.getElementById('mCatNome').value.trim();
  const desc=document.getElementById('mCatDesc').value.trim();
  const ch=parseFloat(document.getElementById('mCatCH').value);
  const val=parseInt(document.getElementById('mCatVal').value);
  if(!nome){showToast('Nome e obrigatorio','error');return;}
  if(!desc){showToast('Descricao e obrigatoria','error');return;}
  if(!ch||ch<=0){showToast('Carga horaria invalida','error');return;}
  if(!val||val<=0){showToast('Validade invalida','error');return;}
  const dados={nome,descricao:desc,carga_horaria:ch,validade_meses:val,categoria:document.getElementById('mCatCat').value.trim()||null,conteudo_programatico:document.getElementById('mCatCP').value.trim()||null};
  try{
    setBtnModalLoading(true);
    const{error}=id?await sb.from('catalogo').update(dados).eq('id',id):await sb.from('catalogo').insert({...dados,org_id:usuarioAtual.org_id,ativo:true});
    if(error)throw error;
    fecharModal();showToast(id?'Treinamento atualizado!':'Treinamento cadastrado!','success');await renderCatalogo();
  }catch(e){setBtnModalLoading(false);showToast(e.message||'Erro ao salvar','error');}
}
async function toggleCatalogo(id,ativo){
  document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  if(!confirm('Deseja '+(ativo?'desativar':'ativar')+' este treinamento?'))return;
  const{error}=await sb.from('catalogo').update({ativo:!ativo}).eq('id',id);
  if(error){showToast(error.message,'error');return;}
  showToast('Treinamento '+(ativo?'desativado':'ativado')+'!','success');await renderCatalogo();
}

// TURMAS
let _turmasCache=[];
async function renderTurmas(){
  const oi=usuarioAtual.org_id;
  const perfil=usuarioAtual.perfil;
  let query=sb.from('turmas').select('*,clientes(nome),catalogo(nome,carga_horaria)').eq('org_id',oi).order('created_at',{ascending:false});
  const{data,error}=await query;
  if(error)throw error;
  _turmasCache=data||[];
  setMobileHeader('<div class="mh-greeting">Operacao</div><div class="mh-name">Turmas</div>');
  const podeCriar=['administrador','comercial'].includes(perfil);
  if(podeCriar){document.getElementById('fabBtn').style.display='flex';fabCallback=()=>abrirModalTurma();}
  const statusLabel={agendada:'Agendada',em_andamento:'Em andamento',concluida:'Concluida',cancelada:'Cancelada'};
  const statusBadge={agendada:'badge-gray',em_andamento:'badge-blue',concluida:'badge-green',cancelada:'badge-red'};
  setConteudo(
    '<div class="stats-grid" style="margin-bottom:16px">'+
    '<div class="stat-card blue"><div class="stat-label">Agendadas</div><div class="stat-value">'+_turmasCache.filter(t=>t.status==='agendada').length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Em andamento</div><div class="stat-value">'+_turmasCache.filter(t=>t.status==='em_andamento').length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Concluidas</div><div class="stat-value">'+_turmasCache.filter(t=>t.status==='concluida').length+'</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:16px">'+
    '<select id="filtrStatusTurma" style="padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);outline:none" onchange="filtrarTurmas()">'+
    '<option value="">Todos os status</option><option value="agendada">Agendadas</option><option value="em_andamento">Em andamento</option><option value="concluida">Concluidas</option><option value="cancelada">Canceladas</option></select>'+
    (podeCriar?'<button class="btn btn-blue" onclick="abrirModalTurma()">+ Nova</button>':'')+
    '</div>'+
    '<div class="card" id="listaTurmas">'+_htmlListaTurmas(_turmasCache,statusLabel,statusBadge)+'</div>'
  );
}
function _htmlListaTurmas(lista,statusLabel,statusBadge){
  const sl=statusLabel||{agendada:'Agendada',em_andamento:'Em andamento',concluida:'Concluida',cancelada:'Cancelada'};
  const sb2=statusBadge||{agendada:'badge-gray',em_andamento:'badge-blue',concluida:'badge-green',cancelada:'badge-red'};
  if(!lista.length)return'<div class="empty"><div class="empty-icon">&#128203;</div><div class="empty-title">Nenhuma turma</div><div class="empty-sub">Agende o primeiro treinamento.</div></div>';
  return lista.map(t=>{
    const id=t.id;
    const nomeT=(t.catalogo&&t.catalogo.nome)?t.catalogo.nome:'Treinamento';
    const nomeC=(t.clientes&&t.clientes.nome)?t.clientes.nome:'';
    const ch=(t.catalogo&&t.catalogo.carga_horaria)?t.catalogo.carga_horaria+'h':'NR';
    const proto=t.protocolo?(' &middot; '+t.protocolo):'';
    const st=t.status||'agendada';
    return '<div class="list-item" style="padding:14px 4px;cursor:pointer" data-turma-id="'+id+'">'+
      '<div class="li-icon" style="background:var(--blue-l);color:var(--blue-h);font-size:11px;font-weight:700;border-radius:var(--r-md);text-align:center;line-height:1.2;padding:4px">'+ch+'</div>'+
      '<div class="li-info">'+
      '<div class="li-title">'+nomeT+'</div>'+
      '<div class="li-sub">'+nomeC+proto+'</div>'+
      '</div>'+
      '<div style="flex-shrink:0"><span class="badge '+sb2[st]+'">'+sl[st]+'</span></div>'+
      '</div>';
  }).join('');
}
function filtrarTurmas(){
  const s=document.getElementById('filtrStatusTurma')&&document.getElementById('filtrStatusTurma').value;
  const sl={agendada:'Agendada',em_andamento:'Em andamento',concluida:'Concluida',cancelada:'Cancelada'};
  const sb2={agendada:'badge-gray',em_andamento:'badge-blue',concluida:'badge-green',cancelada:'badge-red'};
  const r=s?_turmasCache.filter(t=>t.status===s):_turmasCache;
  document.getElementById('listaTurmas').innerHTML=_htmlListaTurmas(r,sl,sb2);
}

function abrirModalSessao(turmaId){
  abrirModal('Nova sessao',
    '<div class="field"><label>Data *</label><input type="date" id="mSesData"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
    '<div class="field" style="margin:0"><label>Hora inicio</label><input type="time" id="mSesIni"></div>'+
    '<div class="field" style="margin:0"><label>Hora termino</label><input type="time" id="mSesFim"></div></div>'+
    '<div class="field"><label>Modalidade</label><select id="mSesMod" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none"><option value="presencial">Presencial</option><option value="online">Online</option><option value="hibrido">Hibrido</option></select></div>'+
    '<div class="field"><label>Local (opcional)</label><input type="text" id="mSesLocal" placeholder="Ex.: Sala de treinamento, planta da empresa..."></div>',
    '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button><button class="btn btn-blue" id="btnSalvarModal" data-action="salvarSessao">Adicionar</button>');
}

async function salvarSessao(turmaId){
  const data=document.getElementById('mSesData').value;
  if(!data){showToast('Informe a data','error');return;}
  const dados={turma_id:turmaId,org_id:usuarioAtual.org_id,data,hora_inicio:document.getElementById('mSesIni').value||null,hora_fim:document.getElementById('mSesFim').value||null,modalidade:document.getElementById('mSesMod').value,local:document.getElementById('mSesLocal').value.trim()||null};
  try{
    setBtnModalLoading(true);
    const{error}=await sb.from('sessoes').insert(dados);
    if(error)throw error;
    fecharModal();showToast('Sessao adicionada!','success');verTurma(turmaId);
  }catch(e){setBtnModalLoading(false);showToast(e.message||'Erro ao salvar','error');}
}

async function abrirModalAddParticipante(turmaId,clienteId){
  const{data:todos}=await sb.from('colaboradores').select('id,nome,cpf').order('nome').limit(500);
  const{data:jaAdicionados}=await sb.from('turma_participantes').select('colaborador_id').eq('turma_id',turmaId);
  const jaIds=new Set((jaAdicionados||[]).map(x=>x.colaborador_id));
  const disponiveis=(todos||[]).filter(c=>!jaIds.has(c.id));
  abrirModal('Adicionar participante',
    '<div class="field"><label>Buscar colaborador</label><input type="text" id="buscaPartModal" placeholder="Nome ou CPF..." oninput="filtrarPartModal(this.value)" style="margin-bottom:8px">'+
    '<div id="listaPartModal" style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-md)">'+
    (disponiveis.length===0?'<div class="empty" style="padding:20px"><div class="empty-title">Nenhum colaborador disponivel</div></div>':
    disponiveis.map(c=>'<div class="list-item" style="padding:10px 12px;cursor:pointer" data-action="selecionarPart" data-turma="'+turmaId+'" data-col="'+c.id+'" data-cli="'+clienteId+'">'+
      '<div class="li-icon" style="background:var(--green-l);color:var(--green);font-size:11px;font-weight:700;border-radius:50%;width:32px;height:32px">'+iniciais(c.nome)+'</div>'+
      '<div class="li-info"><div class="li-title">'+c.nome+'</div><div class="li-sub">'+(c.cpf?'CPF '+c.cpf:'Sem CPF')+'</div></div>'+
      '</div>').join(''))+
    '</div></div>',
    '<button class="btn btn-outline" onclick="fecharModal()">Fechar</button>');
  window._partModalData=disponiveis;
}

function filtrarPartModal(q){
  const f=q.toLowerCase().trim();
  const lista=window._partModalData||[];
  const r=f?lista.filter(c=>c.nome.toLowerCase().includes(f)||(c.cpf||'').includes(f)):lista;
  document.getElementById('listaPartModal').innerHTML=r.length===0?'<div class="empty" style="padding:20px"><div class="empty-title">Nenhum resultado</div></div>':
    r.map(c=>'<div class="list-item" style="padding:10px 12px;cursor:pointer" data-action="selecionarPart" data-turma="'+(_modalCurrentId||'')+'" data-col="'+c.id+'" data-cli="'+('' )+'">'+
    '<div class="li-icon" style="background:var(--green-l);color:var(--green);font-size:11px;font-weight:700;border-radius:50%;width:32px;height:32px">'+iniciais(c.nome)+'</div>'+
    '<div class="li-info"><div class="li-title">'+c.nome+'</div><div class="li-sub">'+(c.cpf?'CPF '+c.cpf:'Sem CPF')+'</div></div></div>').join('');
}

async function selecionarParticipante(turmaId,colaboradorId,clienteId){
  try{
    const{data:cli}=await sb.from('clientes').select('nome').eq('id',clienteId).single();
    const{data:col}=await sb.from('colaboradores').select('nome,cargo').eq('id',colaboradorId).single();
    const{error}=await sb.from('turma_participantes').insert({
      turma_id:turmaId,colaborador_id:colaboradorId,
      org_id:usuarioAtual.org_id,
      empresa_vinculo:cli&&cli.nome?cli.nome:null,
      cargo_vinculo:col&&col.cargo?col.cargo:null
    });
    if(error)throw error;
    showToast((col&&col.nome?col.nome:'Participante')+' adicionado!','success');
    fecharModal();verTurma(turmaId);
  }catch(e){showToast(e.code==='23505'?'Participante ja adicionado':e.message||'Erro','error');}
}

async function cancelarTurma(id){
  if(!confirm('Deseja cancelar esta turma?'))return;
  const{error}=await sb.from('turmas').update({status:'cancelada'}).eq('id',id);
  if(error){showToast(error.message,'error');return;}
  showToast('Turma cancelada','info');irPara('turmas');
}

async function abrirModalTurma(id=null){
  _modalCurrentId=id||null;
  document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  // Garantir que os caches estão carregados
  if(!_clientesCache.length){
    const{data}=await sb.from('clientes').select('id,nome').eq('org_id',usuarioAtual.org_id).eq('ativo',true).order('nome');
    _clientesCache=data||[];
  }
  if(!_catalogoCache.length){
    const{data}=await sb.from('catalogo').select('id,nome,carga_horaria').eq('org_id',usuarioAtual.org_id).eq('ativo',true).order('nome');
    _catalogoCache=data||[];
  }
  const t=id?_turmasCache.find(x=>x.id===id):null;
  const cliOptions=_clientesCache.map(c=>'<option value="'+c.id+'"'+(t&&t.cliente_id===c.id?' selected':'')+'>'+c.nome+'</option>').join('');
  const catOptions=_catalogoCache.map(c=>'<option value="'+c.id+'"'+(t&&t.catalogo_id===c.id?' selected':'')+'>'+c.nome+'</option>').join('');
  if(!_clientesCache.length){showToast('Cadastre clientes antes de criar turmas','error');return;}
  if(!_catalogoCache.length){showToast('Cadastre o catalogo de treinamentos antes de criar turmas','error');return;}
  abrirModal(t?'Editar turma':'Nova turma',
    '<div class="field"><label>Cliente *</label><select id="mTurCli" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none"><option value="">Selecione o cliente...</option>'+cliOptions+'</select></div>'+
    '<div class="field"><label>Treinamento *</label><select id="mTurCat" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none"><option value="">Selecione o treinamento...</option>'+catOptions+'</select></div>'+
    '<div class="field"><label>Local</label><input type="text" id="mTurLocal" value="'+(t&&t.local?t.local:'')+'" placeholder="Ex.: Planta da empresa, Sala A..."></div>'+
    '<div class="field"><label>Observacoes</label><textarea id="mTurObs" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Informacoes complementares...">'+(t&&t.observacoes?t.observacoes:'')+'</textarea></div>',
    '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button><button class="btn btn-blue" id="btnSalvarModal" onclick="salvarTurma(_modalCurrentId)">'+(t?'Salvar':'Criar turma')+'</button>');
}

async function salvarTurma(id){
  const cli=document.getElementById('mTurCli').value;
  const cat=document.getElementById('mTurCat').value;
  if(!cli){showToast('Selecione o cliente','error');return;}
  if(!cat){showToast('Selecione o treinamento','error');return;}
  const dados={cliente_id:cli,catalogo_id:cat,local:document.getElementById('mTurLocal').value.trim()||null,observacoes:document.getElementById('mTurObs').value.trim()||null};
  try{
    setBtnModalLoading(true);
    let error;
    if(id){
      ({error}=await sb.from('turmas').update(dados).eq('id',id));
    }else{
      ({error}=await sb.from('turmas').insert({...dados,org_id:usuarioAtual.org_id,status:'agendada',criado_por:usuarioAtual.id}));
    }
    if(error)throw error;
    fecharModal();showToast(id?'Turma atualizada!':'Turma criada!','success');await renderTurmas();
  }catch(e){setBtnModalLoading(false);showToast(e.message||'Erro ao salvar','error');}
}

function formatarData(iso){
  if(!iso)return'-';
  const[y,m,d]=iso.split('-');
  return d+'/'+m+'/'+y;
}

// CATALOGO
let _catalogoCache=[];
async function renderCatalogo(){
  const oi=usuarioAtual.org_id;
  const{data,error}=await sb.from('catalogo').select('*').eq('org_id',oi).order('nome');
  if(error)throw error;
  _catalogoCache=data||[];
  setMobileHeader('<div class="mh-greeting">Treinamentos</div><div class="mh-name">Catalogo</div>');
  document.getElementById('fabBtn').style.display='flex';fabCallback=()=>abrirModalCatalogo();
  setConteudo('<div style="display:flex;gap:8px;margin-bottom:16px"><input type="search" id="buscaCatalogo" placeholder="Buscar treinamento..." style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;outline:none" oninput="filtrarCatalogo(this.value)"><button class="btn btn-blue" onclick="abrirModalCatalogo()">+ Novo</button></div><div class="card" id="listaCatalogo">'+_htmlListaCatalogo(_catalogoCache)+'</div>');
}
function _htmlListaCatalogo(lista){
  if(!lista.length)return'<div class="empty"><div class="empty-icon">&#128218;</div><div class="empty-title">Nenhum treinamento</div><div class="empty-sub">Cadastre os tipos de treinamento.</div></div>';
  return lista.map(t=>'<div class="list-item" style="padding:14px 4px"><div class="li-icon" style="background:var(--amber-l);color:var(--amber);font-size:12px;font-weight:700;border-radius:var(--r-md);text-align:center;line-height:1.2;padding:4px">'+t.carga_horaria+'h</div><div class="li-info"><div class="li-title">'+t.nome+'</div><div class="li-sub">'+(t.categoria?t.categoria+' - ':'')+'Validade: '+t.validade_meses+' meses - '+t.carga_horaria+'h</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="badge '+(t.ativo?'badge-green':'badge-gray')+'">'+(t.ativo?'Ativo':'Inativo')+'</span><button class="btn btn-ghost btn-sm" data-action="menuCatalogo" data-id="'+t.id+'" style="padding:6px;border-radius:var(--r-sm)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button></div></div>').join('');
}
function filtrarCatalogo(q){
  const f=q.toLowerCase().trim();
  const r=f?_catalogoCache.filter(t=>t.nome.toLowerCase().includes(f)||(t.categoria||'').toLowerCase().includes(f)):_catalogoCache;
  document.getElementById('listaCatalogo').innerHTML=_htmlListaCatalogo(r);
}
function menuCatalogo(event,id){
  event.stopPropagation();document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  const t=_catalogoCache.find(x=>x.id===id);if(!t)return;
  const btn=event.currentTarget;const rect=btn.getBoundingClientRect();
  const menu=document.createElement('div');menu.className='org-menu';
  menu.style.cssText='position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-md);z-index:200;min-width:160px;padding:4px 0;top:'+Math.min(rect.bottom+4,window.innerHeight-110)+'px;right:'+(window.innerWidth-rect.right)+'px';
  menu.innerHTML='<div class="menu-item" data-action="editarCatalogo" data-id="'+id+'">Editar</div><div class="menu-item'+(t.ativo?' danger':'')+'" data-action="toggleCat" data-id="'+id+'" data-ativo="'+t.ativo+'">'+(t.ativo?'Desativar':'Ativar')+'</div>';
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),0);
}
function abrirModalCatalogo(id=null){
  _modalCurrentId=id||null;
  document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  const t=id?_catalogoCache.find(x=>x.id===id):null;
  abrirModal(t?'Editar treinamento':'Novo treinamento',
    '<div class="field"><label>Nome *</label><input type="text" id="mCatNome" value="'+(t?t.nome:'')+'" placeholder="Ex.: NR-35 Trabalho em Altura"></div>'+
    '<div class="field"><label>Descricao *</label><textarea id="mCatDesc" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Descricao...">'+(t&&t.descricao?t.descricao:'')+'</textarea></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
    '<div class="field" style="margin:0"><label>Carga horaria (h) *</label><input type="number" id="mCatCH" value="'+(t&&t.carga_horaria?t.carga_horaria:'')+'" placeholder="8" min="1" step="0.5"></div>'+
    '<div class="field" style="margin:0"><label>Validade (meses) *</label><input type="number" id="mCatVal" value="'+(t&&t.validade_meses?t.validade_meses:'')+'" placeholder="24" min="1"></div></div>'+
    '<div class="field"><label>Categoria</label><input type="text" id="mCatCat" value="'+(t&&t.categoria?t.categoria:'')+'" placeholder="Ex.: NR, CIPA..."></div>'+
    '<div class="field"><label>Conteudo programatico</label><textarea id="mCatCP" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Topicos abordados...">'+(t&&t.conteudo_programatico?t.conteudo_programatico:'')+'</textarea></div>',
    '<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button><button class="btn btn-blue" id="btnSalvarModal" onclick="salvarCatalogo(_modalCurrentId)">'+(t?'Salvar':'Cadastrar')+'</button>');
}
async function salvarCatalogo(id){
  const nome=document.getElementById('mCatNome').value.trim();
  const desc=document.getElementById('mCatDesc').value.trim();
  const ch=parseFloat(document.getElementById('mCatCH').value);
  const val=parseInt(document.getElementById('mCatVal').value);
  if(!nome){showToast('Nome obrigatorio','error');return;}
  if(!desc){showToast('Descricao obrigatoria','error');return;}
  if(!ch||ch<=0){showToast('Carga horaria invalida','error');return;}
  if(!val||val<=0){showToast('Validade invalida','error');return;}
  const dados={nome,descricao:desc,carga_horaria:ch,validade_meses:val,categoria:document.getElementById('mCatCat').value.trim()||null,conteudo_programatico:document.getElementById('mCatCP').value.trim()||null};
  try{
    setBtnModalLoading(true);
    const{error}=id?await sb.from('catalogo').update(dados).eq('id',id):await sb.from('catalogo').insert({...dados,org_id:usuarioAtual.org_id,ativo:true});
    if(error)throw error;
    fecharModal();showToast(id?'Treinamento atualizado!':'Treinamento cadastrado!','success');await renderCatalogo();
  }catch(e){setBtnModalLoading(false);showToast(e.message||'Erro ao salvar','error');}
}
async function toggleCatalogo(id,ativo){
  document.querySelectorAll('.org-menu').forEach(m=>m.remove());
  if(!confirm('Deseja '+(ativo?'desativar':'ativar')+' este treinamento?'))return;
  const{error}=await sb.from('catalogo').update({ativo:!ativo}).eq('id',id);
  if(error){showToast(error.message,'error');return;}
  showToast('Treinamento '+(ativo?'desativado':'ativado')+'!','success');await renderCatalogo();
}

// EQUIPE
async function renderEquipe(){
  const oi=usuarioAtual.org_id;
  const{data:usuarios,error}=await sb.from('usuarios').select('*').eq('org_id',oi).order('nome');
  if(error)throw error;
  setMobileHeader('<div class="mh-greeting">Gestao</div><div class="mh-name">Equipe</div>');
  document.getElementById('fabBtn').style.display='flex';
  fabCallback=()=>abrirModalUsuarioOrg(usuarioAtual.org_id,'instrutor');
  setConteudo('<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button class="btn btn-blue" onclick="abrirModalUsuarioOrg(\''+usuarioAtual.org_id+'\',\'instrutor\')">+ Novo usuario</button></div><div class="card">'+((usuarios||[]).length===0?'<div class="empty"><div class="empty-icon">&#128100;</div><div class="empty-title">Nenhum usuario</div></div>':(usuarios||[]).map(u=>'<div class="list-item" style="padding:14px 4px"><div class="li-icon" style="background:'+corPerfil(u.perfil)+'22;color:'+corPerfil(u.perfil)+';font-size:12px;font-weight:700;border-radius:50%">'+iniciais(u.nome)+'</div><div class="li-info"><div class="li-title">'+u.nome+'</div><div class="li-sub">'+(u.email||'Sem e-mail')+'</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="badge badge-gray" style="text-transform:capitalize">'+labelPerfil(u.perfil)+'</span><span class="badge '+(u.ativo?'badge-green':'badge-gray')+'">'+(u.ativo?'Ativo':'Inativo')+'</span></div></div>').join(''))+'</div>');
}

// PAGINAS EM BREVE
function renderEmBreve(nome){setConteudo('<div style="display:flex;align-items:center;justify-content:center;min-height:300px"><div class="empty"><div class="empty-icon">&#128679;</div><div class="empty-title">'+nome+'</div><div class="empty-sub">Esta secao esta sendo construida.<br>Estara disponivel em breve.</div></div></div>')}
function renderErro(msg){setConteudo('<div style="display:flex;align-items:center;justify-content:center;min-height:300px"><div class="empty"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-title">Ocorreu um erro</div><div class="empty-sub">'+(msg||'Tente novamente.')+'</div><button class="btn btn-outline" style="margin-top:16px" onclick="irPara(paginaAtual)">Tentar novamente</button></div></div>')}

// INIT
// Delegação de eventos — todos os data-action
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]');
  const turmaItem=e.target.closest('[data-turma-id]');
  if(turmaItem&&!el){
    const id=turmaItem.getAttribute('data-turma-id');
    if(id)verTurma(id);
    return;
  }
  if(!el)return;
  const action=el.getAttribute('data-action');
  const id=el.getAttribute('data-id');
  switch(action){
    case 'editarTurma':     abrirModalTurma(id); break;
    case 'cancelarTurma':   cancelarTurma(id); break;
    case 'addSessao':       abrirModalSessao(id); break;
    case 'addParticipante': abrirModalAddParticipante(id,el.getAttribute('data-cli')); break;
    case 'salvarSessao':    salvarSessao(_modalCurrentId); break;
    case 'selecionarPart':  selecionarParticipante(el.getAttribute('data-turma'),el.getAttribute('data-col'),el.getAttribute('data-cli')); break;
    case 'menuCatalogo':    menuCatalogo(e,id); break;
    case 'editarCatalogo':  abrirModalCatalogo(id); break;
    case 'toggleCat':       toggleCatalogo(id,el.getAttribute('data-ativo')==='true'); break;
  }
});

window.addEventListener('DOMContentLoaded',async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    try{
      const{data:perfil,error}=await sb.from('usuarios').select('*').eq('id',session.user.id).single();
      if(!error&&perfil&&perfil.ativo){usuarioAtual=perfil;await entrarNoApp();return;}
    }catch(e){console.warn('Sessao invalida');}
  }
  showScreen('screenLogin');
});</script>
