async function renderRelatorios() {
  const oi = usuarioAtual.org_id;
  setMobileHeader(`<div class="mh-greeting">Análises</div><div class="mh-name">Relatórios</div>`);

  // ── Buscar todos os dados necessários de uma vez ──
  const [
    {data:turmasRaw},
    {data:clientesRaw},
    {data:sessoesRaw},
    {data:usuariosRaw},
    {data:participantesRaw},
  ] = await Promise.all([
    sb.from('turmas')
      .select('id,status,cliente_id,catalogo_id,created_at,clientes(id,nome),catalogo(nome,carga_horaria)')
      .eq('org_id', oi),
    sb.from('clientes').select('id,nome,ativo').eq('org_id', oi),
    sb.from('sessoes').select('id,turma_id,data,instrutor_id,concluida,usuarios(id,nome)').eq('concluida', true),
    sb.from('usuarios').select('id,nome,perfil').eq('org_id', oi).eq('ativo', true),
    sb.from('turma_participantes').select('turma_id,colaborador_id'),
  ]);

  // Guardar globalmente para filtros e exportação
  window._relRaw = {
    turmas: turmasRaw||[],
    clientes: clientesRaw||[],
    sessoes: sessoesRaw||[],
    usuarios: usuariosRaw||[],
    participantes: participantesRaw||[],
  };
  window._relPeriodo = 6; // padrão: 6 meses

  _renderRelatorioView();
}

function _relFiltrarPorPeriodo(turmas, sessoes, meses) {
  // Calcular a data de corte com base no número de meses
  const hoje = new Date();
  const corte = new Date(hoje.getFullYear(), hoje.getMonth() - meses + 1, 1);
  const tFilt = turmas.filter(t => new Date(t.created_at) >= corte);
  const sFilt = sessoes.filter(s => s.data && new Date(s.data) >= corte);
  return { tFilt, sFilt };
}

function _renderRelatorioView() {
  setMobileHeader(`<div class="mh-greeting">Análises</div><div class="mh-name">Relatórios</div>`);
  const { turmas: tAll, clientes: cliAll, sessoes: sesAll, usuarios: usrAll, participantes: partAll } = window._relRaw;
  const meses = window._relPeriodo || 6;

  const { tFilt, sFilt } = _relFiltrarPorPeriodo(tAll, sesAll, meses);

  // ── KPIs ──
  const tAtivas     = tFilt.filter(t => t.status === 'em_andamento').length;
  const tAgendadas  = tFilt.filter(t => t.status === 'agendada').length;
  const tConcluidas = tFilt.filter(t => t.status === 'concluida').length;
  const tCanceladas = tFilt.filter(t => t.status === 'cancelada').length;
  const cliAtivos   = cliAll.filter(c => c.ativo).length;
  const totalTurmas = tFilt.length;

  // Participantes únicos no período
  const turmaIdsFilt = new Set(tFilt.map(t => t.id));
  const partFilt     = partAll.filter(p => turmaIdsFilt.has(p.turma_id));
  const partUnicos   = new Set(partFilt.map(p => p.colaborador_id)).size;

  // Horas totais (turmas concluídas no período)
  const horasTotal = tFilt
    .filter(t => t.status === 'concluida')
    .reduce((sum, t) => sum + (t.catalogo?.carga_horaria || 0), 0);

  // ── Gráfico: evolução nos últimos N meses ──
  const hoje = new Date();
  const mesesLabel = [];
  for (let i = meses - 1; i >= 0; i--) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    mesesLabel.push({
      label: d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', ''),
      ano: d.getFullYear(),
      mes: d.getMonth() + 1,
    });
  }
  const dadosTurmas   = mesesLabel.map(m => tAll.filter(t => { const d = new Date(t.created_at); return d.getFullYear() === m.ano && d.getMonth() + 1 === m.mes; }).length);
  const dadosSessoes  = mesesLabel.map(m => sesAll.filter(s => { const d = new Date(s.data || ''); return d.getFullYear() === m.ano && d.getMonth() + 1 === m.mes; }).length);
  const dadosPart     = mesesLabel.map(m => {
    const tIds = new Set(tAll.filter(t => { const d = new Date(t.created_at); return d.getFullYear() === m.ano && d.getMonth() + 1 === m.mes; }).map(t => t.id));
    return new Set(partAll.filter(p => tIds.has(p.turma_id)).map(p => p.colaborador_id)).size;
  });

  window._relDados = { turmas: dadosTurmas, sessoes: dadosSessoes, participantes: dadosPart };
  window._relMeses = mesesLabel;

  // ── Rankings top 5 ──
  const cliMap = {};
  tFilt.forEach(t => {
    if (!t.cliente_id) return;
    if (!cliMap[t.cliente_id]) cliMap[t.cliente_id] = { nome: t.clientes?.nome || '—', turmas: 0, horas: 0, pessoas: 0 };
    cliMap[t.cliente_id].turmas++;
    cliMap[t.cliente_id].horas += (t.catalogo?.carga_horaria || 0);
    cliMap[t.cliente_id].pessoas += partAll.filter(p => p.turma_id === t.id).length;
  });
  const rankCli = Object.entries(cliMap).map(([id, v]) => ({ id, ...v })).sort((a, b) => b.turmas - a.turmas).slice(0, 5);

  const catMap = {};
  tFilt.forEach(t => {
    if (!t.catalogo_id) return;
    if (!catMap[t.catalogo_id]) catMap[t.catalogo_id] = { nome: t.catalogo?.nome || '—', n: 0, horas: 0 };
    catMap[t.catalogo_id].n++;
    catMap[t.catalogo_id].horas += (t.catalogo?.carga_horaria || 0);
  });
  const rankCat = Object.entries(catMap).map(([id, v]) => ({ id, ...v })).sort((a, b) => b.n - a.n).slice(0, 5);

  const instrutores = usrAll.filter(u => u.perfil === 'instrutor');
  const instMap = {};
  instrutores.forEach(u => { instMap[u.id] = { nome: u.nome, sessoes: 0, turmas: new Set() }; });
  sFilt.forEach(s => {
    if (s.instrutor_id && instMap[s.instrutor_id]) {
      instMap[s.instrutor_id].sessoes++;
      instMap[s.instrutor_id].turmas.add(s.turma_id);
    }
  });
  const rankInst = Object.values(instMap).map(v => ({ ...v, turmas: v.turmas.size })).sort((a, b) => b.sessoes - a.sessoes);

  // ── Helpers de HTML ──
  const maxCli  = rankCli[0]?.turmas || 1;
  const maxCat  = rankCat[0]?.n || 1;
  const maxInst = rankInst[0]?.sessoes || 1;

  const _rankRow = (nome, val, maxVal, color, sub) => `
    <div class="rel2-row">
      <div class="rel2-badge" style="background:${color}22;color:${color};font-size:11px">
        ${val}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nome}</div>
        ${sub ? `<div style="font-size:10px;color:var(--text-3);margin-top:1px">${sub}</div>` : ''}
        <div class="rel2-bar-wrap"><div class="rel2-bar" style="width:${Math.round((val/maxVal)*100)}%;background:${color}"></div></div>
      </div>
    </div>`;

  const rankCliHtml = rankCli.length
    ? rankCli.map(r => _rankRow(r.nome, r.turmas, maxCli, '#1E2A4A', `${r.pessoas} pessoa${r.pessoas!==1?'s':''} · ${r.horas}h`)).join('')
    : `<div style="font-size:12px;color:var(--text-3);padding:8px 0">Nenhum dado no período</div>`;

  const rankCatHtml = rankCat.length
    ? rankCat.map(r => _rankRow(r.nome, r.n, maxCat, '#F59E0B', `${r.horas}h totais`)).join('')
    : `<div style="font-size:12px;color:var(--text-3);padding:8px 0">Nenhum dado no período</div>`;

  const instHtml = rankInst.length
    ? rankInst.map(r => _rankRow(r.nome, r.sessoes, maxInst, '#059669', `${r.turmas} turma${r.turmas!==1?'s':''}`)).join('')
    : `<div style="font-size:12px;color:var(--text-3);padding:8px 0">Nenhum instrutor ativo</div>`;

  // ── Clientes — lista para drill-down ──
  const cliListHtml = Object.entries(cliMap).sort((a,b)=>b[1].turmas-a[1].turmas).slice(0,8).map(([id,v])=>`
    <button class="rel2-cli-btn" onclick="relVerCliente('${id}')">
      <div>
        <div class="rel2-cli-name">${v.nome}</div>
        <div class="rel2-cli-meta">${v.turmas} turma${v.turmas!==1?'s':''} · ${v.pessoas} participante${v.pessoas!==1?'s':''} · ${v.horas}h</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text-3)"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`).join('');

  setConteudo(`

        <div>
          <div class="rel2-title">Relatórios</div>

        </div>
        <div class="rel2-export">

        <button class="rel2-chip${meses===6?' active':''}" onclick="relSetPeriodo(6,this)">6 meses</button>

      </div>
    </div>

    <div class="rel2-kpis">
      <div class="rel2-kpi" style="border-left:3px solid var(--navy)" onclick="irParaTurmasFiltradas('em_andamento')">
        <span class="rel2-kpi-icon">🎓</span>
        <div class="rel2-kpi-val">${tAtivas}</div>
        <div class="rel2-kpi-lbl">Turmas ativas</div>
        <div class="rel2-kpi-delta">Em andamento</div>
      </div>
      <div class="rel2-kpi" style="border-left:3px solid var(--green)" onclick="irParaTurmasFiltradas('concluida')">
        <span class="rel2-kpi-icon">✅</span>

        <div class="rel2-kpi-lbl">Concluídas</div>
        <div class="rel2-kpi-delta">${meses === 1 ? 'Este mês' : `Últimos ${meses} meses`}</div>
      </div>
      <div class="rel2-kpi" style="border-left:3px solid var(--amber)">
        <span class="rel2-kpi-icon">👥</span>

      </div>
      <div class="rel2-kpi" style="border-left:3px solid #7C3AED">
        <span class="rel2-kpi-icon">⏱</span>
        <div class="rel2-kpi-val">${horasTotal}</div>
        <div class="rel2-kpi-lbl">Horas de treinamento</div>
        <div class="rel2-kpi-delta">Turmas concluídas</div>
      </div>
      <div class="rel2-kpi" style="border-left:3px solid var(--amber)" onclick="irParaTurmasFiltradas('agendada')">
        <span class="rel2-kpi-icon">📋</span>
        <div class="rel2-kpi-val">${tAgendadas}</div>
        <div class="rel2-kpi-lbl">Agendadas</div>
        <div class="rel2-kpi-delta">Próximas turmas</div>
      </div>
      <div class="rel2-kpi" style="border-left:3px solid var(--navy)">
        <span class="rel2-kpi-icon">🏢</span>

        <div class="rel2-kpi-delta">Empresas cadastradas</div>
      </div>
      <div class="rel2-kpi" style="border-left:3px solid var(--text-3)" onclick="irParaTurmasFiltradas('cancelada')">

    <div class="rel2-card" style="margin-top:12px">

      ${cliListHtml || '<div style="font-size:12px;color:var(--text-3);padding:8px 0">Nenhum cliente com turmas no período</div>'}
    </div>

}

function _buildRelBars(vals, color, mesesLabel) {
  const maxVal = Math.max(...vals, 1);
  const n = vals.length;
  const slotW = n <= 6 ? 40 : Math.floor(320 / n);
  const svgW = slotW * n;
  return vals.map((v, i) => {
    const barH = Math.max(v > 0 ? Math.round(70 * (v / maxVal)) : 0, v > 0 ? 5 : 0);
    const x = i * slotW;
    const bw = Math.max(slotW - 8, 10);
    const bx = x + (slotW - bw) / 2;
    const isLast = i === vals.length - 1;
    return `<g>
      <rect x="${bx.toFixed(1)}" y="${70 - barH}" width="${bw}" height="${barH}" fill="${isLast ? color : color + '44'}" rx="3"/>
      ${v > 0 ? `<text x="${(x + slotW / 2).toFixed(1)}" y="${70 - barH - 4}" text-anchor="middle" font-size="9" font-weight="600" fill="${color}">${v}</text>` : ''}
      <text x="${(x + slotW / 2).toFixed(1)}" y="88" text-anchor="middle" font-size="9" fill="#8896A4">${mesesLabel[i].label}</text>
    </g>`;
  }).join('');
}

function relSetPeriodo(n, btn) {
  window._relPeriodo = n;
  document.querySelectorAll('.rel2-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sub = document.getElementById('relSubtitle');
  if (sub) sub.textContent = (n === 1 ? 'Este mês' : `Últimos ${n} meses`) + ' · Atualizado agora';
  _renderRelatorioView();
}

function relToggle(btn, metric, label, color) {
  document.querySelectorAll('.rel2-tbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const dados = window._relDados?.[metric] || [];
  const svg = document.getElementById('relSvg');
  if (svg && window._relMeses) {
    svg.innerHTML = _buildRelBars(dados, color, window._relMeses);
    // Preservar dimensões responsivas após rebuild
    svg.style.maxWidth = '640px';
    svg.style.maxHeight = '130px';
  }
  const leg = document.getElementById('relLegLabel');
  if (leg) leg.innerHTML = `<span style="width:10px;height:10px;border-radius:2px;background:${color};display:inline-block"></span>${label}`;
}

function exportarRelatorioCSV() {
  const { turmas: tAll, participantes: partAll, sessoes: sesAll } = window._relRaw || {};
  if (!tAll || !tAll.length) { showToast('Nenhum dado para exportar', 'info'); return; }
  const meses = window._relPeriodo || 6;
  const { tFilt } = _relFiltrarPorPeriodo(tAll, sesAll, meses);

  const header = ['Protocolo','Treinamento','Cliente','Status','Data criação','Carga horária','Participantes'];
  const rows = tFilt.map(t => {
    const nPart = partAll.filter(p => p.turma_id === t.id).length;
    return [
      '',
      (t.catalogo?.nome || '').replace(/,/g, ';'),
      (t.clientes?.nome || '').replace(/,/g, ';'),
      t.status || '',
      t.created_at ? new Date(t.created_at).toLocaleDateString('pt-BR') : '',
      t.catalogo?.carga_horaria || 0,
      nPart,
    ];
  });
  const csv = [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `relatorio-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  showToast('CSV exportado com sucesso!', 'success');
}

function exportarRelatorioPDF() {
  showToast('Gerando PDF do relatório...', 'info');
  const { turmas: tAll, participantes: partAll, sessoes: sesAll } = window._relRaw || {};
  if (!tAll || !tAll.length) { showToast('Nenhum dado para exportar', 'info'); return; }
  const meses = window._relPeriodo || 6;
  const { tFilt } = _relFiltrarPorPeriodo(tAll, sesAll, meses);

  const { jsPDF } = window.jspdf;
  const W = 297, H = 210;
  const NAVY = [30, 42, 74], AMBER = [245, 158, 11], WHITE = [255, 255, 255];
  const T2 = [71, 85, 105], T3 = [148, 163, 184], BORD = [220, 228, 240], GRAY = [244, 246, 250];

  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const hoje = new Date().toLocaleDateString('pt-BR');
  const s = (v, max) => pdfSafe(v, max);

  const tAtivas     = tFilt.filter(t => t.status === 'em_andamento').length;
  const tConcluidas = tFilt.filter(t => t.status === 'concluida').length;
  const tAgendadas  = tFilt.filter(t => t.status === 'agendada').length;
  const tCanceladas = tFilt.filter(t => t.status === 'cancelada').length;
  const turmaIds    = new Set(tFilt.map(t => t.id));
  const partFilt    = partAll.filter(p => turmaIds.has(p.turma_id));
  const partUnicos  = new Set(partFilt.map(p => p.colaborador_id)).size;
  const horasTotal  = tFilt.filter(t => t.status === 'concluida').reduce((s, t) => s + (t.catalogo?.carga_horaria || 0), 0);
  const periodLabel = meses === 1 ? 'Este mes' : `Ultimos ${meses} meses`;

  // ── Cabeçalho ──
  doc.setFillColor(...NAVY); doc.rect(0, 0, W, 36, 'F');
  doc.setFillColor(...AMBER); doc.rect(0, 36, W, 2, 'F');
  doc.addImage(LOGO_AVANTESEG, 'PNG', 14, 8, 50, 16);
  doc.setFontSize(12); doc.setTextColor(...WHITE); doc.setFont('helvetica', 'bold');
  doc.text('RELATORIO DE TREINAMENTOS', W - 14, 18, { align: 'right' });
  doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(...T3);
  doc.text(`${periodLabel}  |  Gerado em ${hoje}`, W - 14, 26, { align: 'right' });

  // ── KPIs ──
  let kx = 14;
  const kpis = [
    { l: 'Turmas ativas', v: tAtivas, c: NAVY },
    { l: 'Concluidas', v: tConcluidas, c: [5, 150, 105] },
    { l: 'Pessoas treinadas', v: partUnicos, c: [245, 158, 11] },
    { l: 'Horas de treinamento', v: horasTotal, c: [124, 58, 237] },
    { l: 'Agendadas', v: tAgendadas, c: [245, 158, 11] },
    { l: 'Canceladas', v: tCanceladas, c: [148, 163, 184] },
  ];
  const kw = (W - 28 - 10) / 6;
  kpis.forEach((k, i) => {
    doc.setFillColor(...GRAY); doc.rect(kx + i * (kw + 2), 42, kw, 22, 'F');
    doc.setDrawColor(...BORD); doc.setLineWidth(0.2); doc.rect(kx + i * (kw + 2), 42, kw, 22, 'S');
    doc.setDrawColor(...k.c); doc.setLineWidth(1.5); doc.line(kx + i * (kw + 2), 42, kx + i * (kw + 2), 64);
    doc.setFontSize(14); doc.setTextColor(...k.c); doc.setFont('helvetica', 'bold');
    doc.text(String(k.v), kx + i * (kw + 2) + kw / 2, 54, { align: 'center' });
    doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica', 'normal');
    doc.text(s(k.l, 22), kx + i * (kw + 2) + kw / 2, 61, { align: 'center' });
  });

  // ── Tabela de turmas ──
  let ty = 72;
  doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica', 'bold');
  doc.text(`TURMAS NO PERIODO (${tFilt.length})`, 14, ty); ty += 4;

  // Cabeçalho tabela
  const cols = [
    { x: 14, w: 95, t: 'Treinamento' },
    { x: 112, w: 60, t: 'Cliente' },
    { x: 175, w: 28, t: 'Data' },
    { x: 206, w: 18, t: 'Status' },
    { x: 227, w: 14, t: 'Horas' },
    { x: 244, w: 14, t: 'Pessoas' },
  ];
  doc.setFillColor(...NAVY); doc.rect(14, ty, W - 28, 8, 'F');
  doc.setFontSize(7); doc.setTextColor(...WHITE); doc.setFont('helvetica', 'bold');
  cols.forEach(c => doc.text(s(c.t), c.x + 1.5, ty + 5.5));
  ty += 8;

  const statusAbrev = { agendada: 'Agend.', em_andamento: 'Ativo', concluida: 'Concl.', cancelada: 'Cancel.' };
  const maxLinhas = Math.floor((H - ty - 14) / 7);
  tFilt.slice(0, maxLinhas).forEach((t, i) => {
    const nPart = partAll.filter(p => p.turma_id === t.id).length;
    const data  = t.created_at ? new Date(t.created_at).toLocaleDateString('pt-BR') : '—';
    doc.setFillColor(i % 2 === 0 ? 244 : 255, i % 2 === 0 ? 246 : 255, i % 2 === 0 ? 250 : 255);
    doc.rect(14, ty, W - 28, 7, 'F');
    doc.setDrawColor(...BORD); doc.setLineWidth(0.15); doc.rect(14, ty, W - 28, 7, 'S');
    doc.setFontSize(7); doc.setTextColor(...NAVY); doc.setFont('helvetica', 'normal');
    doc.text(s(t.catalogo?.nome || '—', 50), cols[0].x + 1.5, ty + 4.5);
    doc.text(s(t.clientes?.nome || '—', 32), cols[1].x + 1.5, ty + 4.5);
    doc.text(data, cols[2].x + 1.5, ty + 4.5);
    doc.text(statusAbrev[t.status] || t.status, cols[3].x + 1.5, ty + 4.5);
    doc.text(String(t.catalogo?.carga_horaria || 0), cols[4].x + 1.5, ty + 4.5);
    doc.text(String(nPart), cols[5].x + 1.5, ty + 4.5);
    ty += 7;
  });
  if (tFilt.length > maxLinhas) {
    doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica', 'italic');
    doc.text(`+ ${tFilt.length - maxLinhas} registros adicionais no CSV`, 14, ty + 5);
  }

  // ── Rodapé ──
  doc.setFillColor(...NAVY); doc.rect(0, H - 10, W, 10, 'F');
  doc.setFontSize(6.5); doc.setTextColor(...AMBER); doc.setFont('helvetica', 'bold');
  doc.text('AvanteSeg Cursos e Treinamentos Corporativos Ltda', W / 2, H - 4, { align: 'center' });

  doc.save(`relatorio-${new Date().toISOString().slice(0, 10)}.pdf`);
  showToast('PDF do relatório gerado!', 'success');
}

async function toggleUsuarioEquipe(id, ativoStr, nome) {
  const ativo = ativoStr === 'true';
  if (!confirm(`Deseja ${ativo?'desativar':'reativar'} ${nome}?`)) return;
  showLoading();
  const {error} = await sb.from('usuarios').update({ativo:!ativo}).eq('id',id);
  hideLoading();
  if (error) { showToast(error.message,'error'); return; }
  showToast(`${nome} ${ativo?'desativado':'reativado'}!`, ativo?'info':'success');
  await renderEquipe();
}

function mostrarFormSenha() {
  document.getElementById('formAlterarSenha').style.display = 'block';
  document.getElementById('btnAlterarSenha').style.display  = 'none';
}

function cancelarAlterarSenha() {
  document.getElementById('formAlterarSenha').style.display = 'none';
  document.getElementById('btnAlterarSenha').style.display  = 'block';
  document.getElementById('senhaAtual').value  = '';
  document.getElementById('senhaNova').value   = '';
  document.getElementById('senhaConfirm').value = '';
}

async function confirmarAlterarSenha() {
  const atual   = document.getElementById('senhaAtual')?.value;
  const nova    = document.getElementById('senhaNova')?.value;
  const confirm = document.getElementById('senhaConfirm')?.value;
  if (!atual || !nova || !confirm) { showToast('Preencha todos os campos de senha','error'); return; }
  if (nova.length < 6) { showToast('A nova senha deve ter no mínimo 6 caracteres','error'); return; }
  if (nova !== confirm) { showToast('A confirmação de senha não confere','error'); return; }
  try {
    showLoading('Verificando senha...');
    // Reautenticar com senha atual
    const {error:authErr} = await sb.auth.signInWithPassword({email: usuarioAtual.email, password: atual});
    if (authErr) { hideLoading(); showToast('Senha atual incorreta','error'); return; }
    // Atualizar para nova senha
    const {error:upErr} = await sb.auth.updateUser({password: nova});
    hideLoading();
    if (upErr) throw upErr;
    showToast('Senha alterada com sucesso!','success');
    cancelarAlterarSenha();
  } catch(e) { hideLoading(); showToast(e.message||'Erro ao alterar senha','error'); }
}

async function salvarConta() {
  const nome = document.getElementById('editNome')?.value.trim();
  if (!nome) { showToast('Nome é obrigatório','error'); return; }
  try {
    const {error} = await sb.from('usuarios').update({nome}).eq('id',usuarioAtual.id);
    if (error) throw error;
    usuarioAtual.nome = nome;
    document.getElementById('sidebarAvatar').textContent = iniciais(nome);
    document.getElementById('sidebarNome').textContent   = nome;
    showToast('Dados atualizados!','success');
  } catch(e) { showToast(e.message||'Erro ao salvar','error'); }
}

document.addEventListener('click', function(e) {
  // Navegação via data-nav
  const navEl = e.target.closest('[data-nav]');
  if (navEl) { irPara(navEl.getAttribute('data-nav')); return; }

  // Ações via data-action
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');
  const id     = el.getAttribute('data-id') || null;
  const extra  = el.getAttribute('data-extra') || null;
  const cli    = el.getAttribute('data-cli') || null;
  const col    = el.getAttribute('data-col') || null;

  switch(action) {
    // Navegação
    case 'irParaTurmas':    irPara('turmas'); break;
    case 'irPara':          if(id) irPara(id); break;
    case 'verTurma':        if(id) verTurma(id); break;
    case 'verHistoricoTurma': verHistoricoTurma(id); break;
    // Organizações
    case 'menuOrg':         menuOrg(el, id); break;
    case 'editarOrg':       document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalOrg(id); break;
    case 'criarUserOrg':    document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalUsuarioOrg(id); break;
    case 'toggleOrg':       document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); toggleOrg(id); break;
    // Clientes
    case 'verCliente':      verCliente(id); break;
    case 'menuCliente':     menuCliente(el, id); break;
    case 'editarCliente':   document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalCliente(id); break;
    case 'toggleCliente':   document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); toggleCliente(id); break;
    // Colaboradores
    case 'verColab':        verColab(id); break;
    case 'editarColab':     abrirModalColab(id); break;
    // Catálogo
    case 'verCatalogo':     verCatalogo(id); break;
    case 'menuCatalogo':    menuCatalogo(el, id); break;
    case 'editarCatalogo':  document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalCatalogo(id); break;
    case 'toggleCatalogo':  document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); toggleCatalogo(id); break;
    // Equipe
    case 'verUsuarioEquipe': verUsuarioEquipe(id); break;
    // Turmas
    case 'menuTurmaCard':         _menuTurmaCard(el,id); break;
    case 'excluirTurma':          document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalExcluirTurma(id); break;
    case 'editarTurma':           document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalTurma(id); break;
    case 'cancelarTurma':   cancelarTurma(id); break;
    case 'addAgendamento':  abrirModalAgendamento(id); break;
    case 'menuAgendamento':  menuAgendamento(el,id,el.getAttribute('data-turma')); break;
    case 'editarAgendamento': document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalAgendamento(extra,id); break;
    case 'excluirAgendamento': document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); excluirAgendamento(id,extra); break;
    case 'addParticipante': abrirModalAddParticipante(id, cli); break;
    // Participante
    case 'selecionarPart':        selecionarParticipante(el.getAttribute('data-col')); break;
    case 'removerParticipante':   removerParticipante(id,el.getAttribute('data-turma')); break;
    case 'abrirDocumentos':           renderDocumentosTurma(id); break;
    case 'iniciarExecucaoSessao':     iniciarExecucaoSessao(id, el.dataset.sessao); break;
    case 'abrirExecucaoSessao':       abrirExecucaoSessao(id, el.dataset.sessao); break;
    // Execução
    case 'iniciarExecucao':       iniciarExecucao(id); break;
    case 'abrirExecucao':         abrirExecucao(id); break;
    case 'abrirAssinatura':       abrirAssinatura(el.getAttribute('data-col'),el.getAttribute('data-nome')); break;
    case 'removerEvidencia':      removerEvidencia(id,el.getAttribute('data-path')); break;
    case 'cadastroRapidoColab':   abrirCadastroRapidoColab(); break;
  }
});

    try {
      const {data:perfil, error} = await sb.from('usuarios').select('*').eq('id',session.user.id).single();
      if (!error && perfil && perfil.ativo) { usuarioAtual = perfil; await entrarNoApp(); return; }
    } catch(e) { console.warn('Sessão inválida'); }
  }
  showScreen('screenLogin');
});

// Gera QR Code como dataURL PNG usando QRCode.js
function gerarQRCodeDataURL(texto) {
  return new Promise((resolve) => {
    const div = document.createElement('div');
    div.style.display = 'none';
    document.body.appendChild(div);
    const qr = new QRCode(div, {
      text:          texto,
      width:         200,
      height:        200,
      colorDark:     '#0F172A',
      colorLight:    '#FFFFFF',
      correctLevel:  QRCode.CorrectLevel.M,
    });
    setTimeout(() => {
      const canvas = div.querySelector('canvas');
      const img    = div.querySelector('img');
      let url = '';
      if (canvas) url = canvas.toDataURL('image/png');
      else if (img) url = img.src;
      document.body.removeChild(div);
      resolve(url);
    }, 300);
  });
}

// Carrega imagem como dataURL (para assinaturas do Storage)
function carregarImagemComoDataURL(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width  = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

function fmtDataExtenso(iso) {
  if (!iso) return '-';
  const [y,m,d] = iso.split('-');
  const meses = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`;
}

// Sanitiza qualquer string para uso no jsPDF (helvetica e latin-1 puro)
// Remove diacriticos via NFD, substitui caracteres fora do ASCII imprimivel por '?'
function pdfSafe(v, maxLen) {
  if (v === null || v === undefined) return '';
  return String(v)
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\x20-\x7E]/g, '?')
    .trim()
    .slice(0, maxLen || 400);
}

// Formata data por extenso sem acentos (para uso nos PDFs)
function fmtDataExtensoPDF(iso) {
  return pdfSafe(fmtDataExtenso(iso));
}

// Formata validade sem acentos: usa logica propria em vez de toLocaleDateString
function fmtValidadePDF(dtVal) {
  if (!dtVal) return '';
  const meses = ['janeiro','fevereiro','marco','abril','maio','junho',
                 'julho','agosto','setembro','outubro','novembro','dezembro'];
  const m = dtVal.getMonth(); // 0-based
  const y = dtVal.getFullYear();
  return meses[m] + ' de ' + y;
}

// Salva o PDF no Supabase Storage e registra na tabela documentos
async function salvarDocumentoSupabase(pdfDoc, nomeArquivo, tipo, turmaId, colaboradorId, codigoValidacao) {
  try {
    const pdfBytes = pdfDoc.output('arraybuffer');
    const blob     = new Blob([pdfBytes], {type:'application/pdf'});
    const orgId    = usuarioAtual.org_id;
    const path     = `${orgId}/${turmaId}/${nomeArquivo}`;

    const {error:upErr} = await sb.storage.from('documentos').upload(path, blob, {upsert:true, contentType:'application/pdf'});
    if (upErr) { console.warn('Storage documentos:', upErr.message); return; }

    // Verificar se já existe registro para evitar o ON CONFLICT problemático
    let query = sb.from('documentos').select('id').eq('turma_id', turmaId).eq('tipo', tipo);
    if (colaboradorId) {
      query = query.eq('colaborador_id', colaboradorId);
    } else {
      query = query.is('colaborador_id', null);
    }
    const {data: existente} = await query.maybeSingle();

    let dbErr;
    if (existente) {
      ({error: dbErr} = await sb.from('documentos').update({
        arquivo_path:     path,
        codigo_validacao: codigoValidacao,
        gerado_em:        new Date().toISOString(),
      }).eq('id', existente.id));
    } else {
      ({error: dbErr} = await sb.from('documentos').insert({
        org_id:           orgId,
        turma_id:         turmaId,
        colaborador_id:   colaboradorId || null,
        tipo,
        arquivo_path:     path,
        codigo_validacao: codigoValidacao,
        gerado_em:        new Date().toISOString(),
      }));
    }
    if (dbErr) console.warn('DB documentos:', dbErr.message);
  } catch(e) {
    console.warn('salvarDocumentoSupabase:', e.message);
  }
}

async function gerarListaPresenca(turmaId) {

      .select('*,clientes(nome,cnpj),catalogo(nome,carga_horaria),sessoes(*,usuarios(nome)),turma_participantes(*,colaboradores(nome,cpf,cargo))')

    const AMBER = [245, 158, 11];
    const WHITE = [255, 255, 255];
    const GRAY50 = [244, 246, 250];
    const BORDER = [226, 232, 240];
    const TEXT1 = [30, 42, 74];
    const TEXT2 = [100, 116, 139];
    const TEXT3 = [148, 163, 184];
    const AMBERLT = [254, 243, 199];

    const ag = (t.sessoes||[]).sort((a,b)=>a.data>b.data?1:-1)[0];

    const protocolo = t.protocolo||turmaId.slice(0,12).toUpperCase();

    // ── Borda dupla externa ──
    doc.setDrawColor(...NAVY); doc.setLineWidth(1.2);
    doc.rect(mg-4, mg-4, W-mg*2+8, H-mg*2+8, 'S');
    doc.setDrawColor(...NAVY); doc.setLineWidth(0.3);
    doc.rect(mg-2, mg-2, W-mg*2+4, H-mg*2+4, 'S');

    // ── Cantos âmbar ──
    const cs = 8; // corner size
    doc.setDrawColor(...AMBER); doc.setLineWidth(1.5);
    // TL
    doc.line(mg-4, mg-4+cs, mg-4, mg-4); doc.line(mg-4, mg-4, mg-4+cs, mg-4);
    // TR
    doc.line(W-mg+4-cs, mg-4, W-mg+4, mg-4); doc.line(W-mg+4, mg-4, W-mg+4, mg-4+cs);
    // BL
    doc.line(mg-4, H-mg+4-cs, mg-4, H-mg+4); doc.line(mg-4, H-mg+4, mg-4+cs, H-mg+4);
    // BR
    doc.line(W-mg+4-cs, H-mg+4, W-mg+4, H-mg+4); doc.line(W-mg+4, H-mg+4, W-mg+4, H-mg+4-cs);

    // ── Header navy ──
    doc.setFillColor(...NAVY);
    doc.rect(mg, mg, W-mg*2, 30, 'F');

    // Linha âmbar sob header
    doc.setFillColor(...AMBER);
    doc.rect(mg, mg+30, W-mg*2, 1.5, 'F');

    // Logo no header
    doc.addImage(LOGO_AVANTESEG, 'PNG', mg+4, mg+5, 46, 14);

    // Badge "Ficha de Presença" no header
    doc.setFillColor(...AMBERLT);
    doc.setDrawColor(...AMBER); doc.setLineWidth(0.3);
    doc.roundedRect(W-mg-52, mg+8, 48, 10, 2, 2, 'FD');
    doc.setFontSize(7.5); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('FICHA DE PRESENCA', W-mg-28, mg+14.5, {align:'center'});

    // Protocolo header
    doc.setFontSize(6.5); doc.setTextColor(...TEXT3); doc.setFont('helvetica','normal');
    doc.text(protocolo, W-mg-4, mg+24, {align:'right'});

    // ── Título do treinamento ──
    let y = mg + 38;
    doc.setFontSize(13); doc.setTextColor(...TEXT1); doc.setFont('helvetica','bold');
    const nomeT = pdfSafe(t.catalogo?.nome||'Treinamento');
    const linhasT = doc.splitTextToSize(nomeT, W-mg*2-4);
    linhasT.forEach((l,i)=>doc.text(l, mg+2, y+i*6));
    y += linhasT.length * 6 + 2;
    doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...TEXT2);
    doc.text(pdfSafe(t.clientes?.nome||'-'), mg+2, y); y += 5;

    // ── Bloco de metadados (3 colunas) ──
    doc.setFillColor(...GRAY50);
    doc.rect(mg, y, W-mg*2, 16, 'F');
    doc.setDrawColor(...BORDER); doc.setLineWidth(0.3);
    doc.rect(mg, y, W-mg*2, 16, 'S');

    const colW = (W-mg*2)/3;
    const metas = [
      {l:'Data',v:dataAula},
      {l:'Instrutor',v:instrutor},
      {l:'Carga horaria',v:`${t.catalogo?.carga_horaria||'-'}h`},
      {l:'Local',v:local},
      {l:'CNPJ Cliente',v:t.clientes?.cnpj||'-'},
      {l:'Protocolo',v:protocolo},
    ];
    const metaRows = [[metas[0],metas[1],metas[2]],[metas[3],metas[4],metas[5]]];
    metaRows.forEach((row,ri)=>{
      row.forEach((m,ci)=>{
        const mx = mg + ci*colW + 4;
        const my = y + 4 + ri*8;
        doc.setFontSize(7); doc.setTextColor(...TEXT3); doc.setFont('helvetica','normal');
        doc.text(m.l.toUpperCase(), mx, my);
        doc.setFontSize(8); doc.setTextColor(...TEXT1); doc.setFont('helvetica','bold');
        doc.text(pdfSafe(m.v||'-', 28), mx, my+4);
      });
    });
    y += 22;

    // ── Cabeçalho tabela ──
    doc.setFillColor(...NAVY);
    doc.rect(mg, y, W-mg*2, 7, 'F');
    doc.setFontSize(7.5); doc.setTextColor(...WHITE); doc.setFont('helvetica','bold');
    const cols = [{x:mg+2,w:6,t:'Nº'},{x:mg+10,w:60,t:'Participante'},{x:mg+72,w:34,t:'CPF'},{x:mg+108,w:52,t:'Assinatura'}];
    cols.forEach(c=>doc.text(c.t, c.x, y+5));
    y += 7;

    const participantes = t.turma_participantes||[];
    const {data:presencas} = await sb.from('presencas').select('*').eq('turma_id', turmaId);
    const presMap = {};
    (presencas||[]).forEach(p=>{ presMap[p.colaborador_id]=p; });

    for (let i=0;i<participantes.length;i++) {
      const p = participantes[i];
      const col = p.colaboradores||{};
      const pr = presMap[p.colaborador_id];
      const rowH = 14;

      if (y + rowH > H - mg - 24) {
        // Nova página com mesmo visual
        doc.addPage();
        // Bordas
        doc.setDrawColor(...NAVY); doc.setLineWidth(1.2);
        doc.rect(mg-4,mg-4,W-mg*2+8,H-mg*2+8,'S');
        doc.setLineWidth(0.3); doc.rect(mg-2,mg-2,W-mg*2+4,H-mg*2+4,'S');
        doc.setDrawColor(...AMBER); doc.setLineWidth(1.5);
        doc.line(mg-4,mg-4+cs,mg-4,mg-4); doc.line(mg-4,mg-4,mg-4+cs,mg-4);
        doc.line(W-mg+4-cs,mg-4,W-mg+4,mg-4); doc.line(W-mg+4,mg-4,W-mg+4,mg-4+cs);
        doc.line(mg-4,H-mg+4-cs,mg-4,H-mg+4); doc.line(mg-4,H-mg+4,mg-4+cs,H-mg+4);
        doc.line(W-mg+4-cs,H-mg+4,W-mg+4,H-mg+4); doc.line(W-mg+4,H-mg+4,W-mg+4,H-mg+4-cs);
        y = mg;
        doc.setFillColor(...NAVY); doc.rect(mg,y,W-mg*2,7,'F');
        doc.setFontSize(7.5); doc.setTextColor(...WHITE); doc.setFont('helvetica','bold');
        cols.forEach(c=>doc.text(c.t,c.x,y+5));
        y+=7;
      }

      doc.setFillColor(i%2===0?244:255, i%2===0?246:255, i%2===0?250:255);
      doc.rect(mg,y,W-mg*2,rowH,'F');
      doc.setDrawColor(...BORDER); doc.setLineWidth(0.2);
      doc.rect(mg,y,W-mg*2,rowH,'S');

      doc.setFontSize(8); doc.setTextColor(...TEXT1); doc.setFont('helvetica','normal');
      doc.text(String(i+1).padStart(2,'0'), mg+3, y+9);
      doc.text((col.nome||'').slice(0,36), mg+10, y+9);
      doc.text(pdfSafe(col.cpf||'-'), mg+72, y+9);

      if (pr?.assinatura_path) {
        try {
          const {data:urlData} = await sb.storage.from('assinaturas').createSignedUrl(pr.assinatura_path,60);
          if (urlData?.signedUrl) {
            const imgData = await carregarImagemComoDataURL(urlData.signedUrl);
            if (imgData) doc.addImage(imgData,'PNG',mg+108,y+1,42,rowH-3);
          }
        } catch(e){}
      }
      y += rowH;
    }

    // ── Rodapé ──
    const fy = H-mg-16;
    doc.setFillColor(...NAVY);
    doc.rect(mg, fy, W-mg*2, 14, 'F');
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('AvanteSeg Cursos e Treinamentos Corporativos Ltda', mg+4, fy+5.5);
    doc.setTextColor(...TEXT3); doc.setFont('helvetica','normal');
    doc.text('CNPJ: 17.883.200/0001-32  |  Av. Arno Carlo Gracher, 69 - Sl 4, Brusque-SC  |  toledolabs.com.br/validar', mg+4, fy+10.5);
    doc.text(protocolo, W-mg-4, fy+8, {align:'right'});

    doc.save(`ficha-presenca-${(nomeT).replace(/\s+/g,'-').toLowerCase()}.pdf`);
    const codigo = crypto.randomUUID();
    await salvarDocumentoSupabase(doc, `lista-presenca-${turmaId}.pdf`, 'lista_presenca', turmaId, null, codigo);
    showToast('Ficha de presença gerada!','success');
  } catch(e) {
    console.error(e);
    showToast(e.message||'Erro ao gerar PDF','error');
  } finally { hideLoading(); }
}

async function gerarCertificadoIndividual(turmaId, colaboradorId) {

    if (!col) throw new Error('Colaborador nao encontrado');

    const ag           = (t.sessoes||[]).sort((a,b)=>a.data>b.data?1:-1)[0];
    const dataCert     = ag?.data || t.created_at?.split('T')[0];

    const codigo      = crypto.randomUUID();

    const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});

    // ════════════════════════════════

    cy += 11;

    // ════════════════════════════════════════════════════════
    // PÁGINA 2 - CONTRACAPA INDIVIDUAL — Layout B1 v2
    // Fontes mínimas 7pt para impressão, CP contido na coluna
    // ════════════════════════════════════════════════════════
    doc.addPage('a4','landscape');
    doc.setFillColor(...WHITE); doc.rect(0,0,W,H,'F');

    // W=297, margens=14, gaps=6, total_content=257
    // Col1 (33%=85mm): Treinamento + Participante
    // Col2 (37%=95mm): Conteúdo Programático + Assinatura
    // Col3 (30%=77mm): Dados do Certificado
    const p_mg=14, p_gap=6, p_top=30, p_bot=H-26;

      {l:'Empresa',   v:s(t.clientes?.nome||'nao informada',28)},
      {l:'CNPJ',      v:s(t.clientes?.cnpj||'nao informado')},
      {l:'Instrutor', v:s(instrutor,28)},

      doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');

    p_y1+=3;
    doc.setDrawColor(...BORD); doc.setLineWidth(0.3);
    doc.line(p_c1x, p_y1, p_c1x+p_c1w-4, p_y1); p_y1+=5;

    // Card participante
    doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('PARTICIPANTE', p_c1x, p_y1); p_y1+=4;
    const p_cardH = 26;
    doc.setFillColor(...GRAY); doc.rect(p_c1x, p_y1, p_c1w-4, p_cardH, 'F');
    doc.setDrawColor(...BORD); doc.setLineWidth(0.2); doc.rect(p_c1x, p_y1, p_c1w-4, p_cardH, 'S');
    doc.setDrawColor(...NAVY); doc.setLineWidth(2.5); doc.line(p_c1x, p_y1, p_c1x, p_y1+p_cardH);
    doc.setFontSize(9); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    const p_nomePartLines = doc.splitTextToSize(s(col.nome,32), p_c1w-10);
    p_nomePartLines.slice(0,2).forEach((l,i) => doc.text(l, p_c1x+5, p_y1+7+i*6));
    doc.setFontSize(7); doc.setTextColor(...T2); doc.setFont('helvetica','normal');
    doc.text(`CPF: ${s(col.cpf||'nao informado')}`, p_c1x+5, p_y1+20);
    if (col.cargo) doc.text(`Cargo: ${s(col.cargo,28)}`, p_c1x+5, p_y1+25);

    // ══ COLUNA 2: Conteúdo Programático + Assinatura ══
    let p_y2 = p_top+6;
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('CONTEUDO PROGRAMATICO', p_c2x, p_y2); p_y2+=3.5;
    doc.setDrawColor(...AMBER); doc.setLineWidth(0.6);
    doc.line(p_c2x, p_y2, p_c2x+36, p_y2); p_y2+=5;

    // Área CP — reserva espaço para assinatura (18mm no final)
    const p_cpMaxY = p_bot - 18;
    const p_cpLeading = 4.2;
    if (cpText) {
      // splitTextToSize garante word-wrap dentro de p_c2w-4
      const p_lCP = doc.splitTextToSize(s(cpText,2000), p_c2w-4);
      const p_maxLinhas = Math.floor((p_cpMaxY - p_y2) / p_cpLeading);
      doc.setFontSize(7); doc.setTextColor(...T2); doc.setFont('helvetica','normal');
      p_lCP.slice(0, p_maxLinhas).forEach((l,i) => {
        doc.text(l, p_c2x, p_y2 + i*p_cpLeading);
      });
      // Indicador de continuação se houver mais conteúdo
      if (p_lCP.length > p_maxLinhas) {
        doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','italic');
        doc.text('(continua no verso...)', p_c2x, p_cpMaxY);
      }
    } else {
      doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','italic');
      doc.text('Conteudo nao informado.', p_c2x, p_y2);
    }

    // Assinatura — sempre na base da col2, nunca sobrepõe o CP
    const p_sigY = p_bot - 12;
    doc.setDrawColor(...LGRAY); doc.setLineWidth(0.3);
    doc.line(p_c2x + p_c2w*0.08, p_sigY, p_c2x + p_c2w*0.92, p_sigY);
    doc.setFontSize(8); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    doc.text(s(instrutor,32), p_c2x+p_c2w/2, p_sigY+5, {align:'center'});
    if (instCredencial) {
      doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text(instCredencial, p_c2x+p_c2w/2, p_sigY+10, {align:'center'});
      if (instEspec) {
        doc.setFontSize(6); doc.text(pdfSafe(instEspec,44), p_c2x+p_c2w/2, p_sigY+15, {align:'center'});
      }
    } else {
      doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text('Instrutor Responsavel', p_c2x+p_c2w/2, p_sigY+10, {align:'center'});
    }

    // ══ COLUNA 3: Dados do Certificado ══
    let p_y3 = p_top+6;
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('DADOS DO CERTIFICADO', p_c3x, p_y3); p_y3+=3.5;
    doc.setDrawColor(...AMBER); doc.setLineWidth(0.6);
    doc.line(p_c3x, p_y3, p_c3x+30, p_y3); p_y3+=6;

    [
      {l:'Realizado em', v:fmtDataExtensoPDF(dataCert)},
      {l:'Carga horaria', v:`${ch} hora${ch!==1?'s':''}`},
      {l:'Empresa',       v:s(t.clientes?.nome||'nao informada',24)},
      {l:'Valido ate',    v:s(fmtVal)},
    ].forEach(d => {
      doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text(d.l.toUpperCase(), p_c3x, p_y3); p_y3+=3.5;
      doc.setFontSize(8); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
      doc.text(d.v, p_c3x, p_y3); p_y3+=7;
    });

    p_y3+=4;
    doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('CODIGO DE AUTENTICIDADE', p_c3x, p_y3); p_y3+=4;
    doc.setFillColor(...NAVY); doc.rect(p_c3x, p_y3, p_c3w-2, 10, 'F');
    doc.setFontSize(9); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text(codigoShort, p_c3x+(p_c3w-2)/2, p_y3+7, {align:'center'});

    // ── STRIP DE VALIDAÇÃO (14mm, legível para impressão) ──
    const p_stripY = H-26;
    doc.setFillColor(244,246,250); doc.rect(0, p_stripY, W, 14, 'F');
    doc.setDrawColor(...BORD); doc.setLineWidth(0.3); doc.line(0, p_stripY, W, p_stripY);

    // Âncora 1: validação
    doc.setFillColor(...AMBER); doc.circle(p_mg+3, p_stripY+7, 2, 'F');
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('VALIDACAO DO CERTIFICADO', p_mg+8, p_stripY+4.5);
    doc.setFontSize(6.5); doc.setTextColor(...BLUE); doc.setFont('helvetica','bold');
    doc.text('toledolabs.com.br/validar', p_mg+8, p_stripY+10);

    // Sep
    doc.setDrawColor(...BORD); doc.setLineWidth(0.3); doc.line(p_mg+76, p_stripY+2, p_mg+76, p_stripY+12);

    // Âncora 2: código
    doc.setFillColor(100,116,139); doc.circle(p_mg+80, p_stripY+7, 2, 'F');
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('CODIGO', p_mg+85, p_stripY+4.5);
    doc.setFontSize(7); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    doc.text(codigoShort, p_mg+85, p_stripY+10.5);

    // Sep
    doc.setDrawColor(...BORD); doc.line(p_mg+118, p_stripY+2, p_mg+118, p_stripY+12);

    // QR Code
    if (qrData) doc.addImage(qrData,'PNG', p_mg+122, p_stripY+1, 12, 12);
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('Escaneie para validar', p_mg+137, p_stripY+8);

    // Texto legal à direita
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('Emitido eletronicamente. Validade juridica conforme legislacao vigente.', W-14, p_stripY+8, {align:'right'});

    // ── RODAPÉ ──
    doc.setFillColor(...NAVY); doc.rect(0, H-12, W, 12, 'F');
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('AvanteSeg Cursos e Treinamentos Corporativos Ltda', W/2, H-6.5, {align:'center'});
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('Av. Arno Carlo Gracher, 69 Sala 4  -  Brusque - SC  -  (47) 3351-4266  -  www.avanteseg.com.br', W/2, H-2.5, {align:'center'});

    const nomeSafe = s(col.nome,60).replace(/\s+/g,'-').toLowerCase();
    doc.save(`certificado-${nomeSafe}.pdf`);
    await salvarDocumentoSupabase(doc,`cert-individual-${colaboradorId}.pdf`,'certificado_individual',turmaId,colaboradorId,codigo);
    showToast(`Certificado de ${s(col.nome,40)} gerado!`,'success');
  } catch(e) {
    console.error(e); showToast(e.message||'Erro ao gerar certificado','error');
  } finally { hideLoading(); }
}


// ============================================================
// PDF - CERTIFICADO COLETIVO
// ============================================================
async function gerarCertificadoColetivo(turmaId) {
  showLoading('Gerando certificado coletivo...');
  try {
    const {data:t, error} = await sb.from('turmas')
      .select('*,clientes(nome,cnpj),catalogo(nome,carga_horaria,descricao,conteudo_programatico,validade_meses),sessoes(*,usuarios(nome)),turma_participantes(*,colaboradores(nome,cargo,cpf))')
      .eq('id', turmaId).single();
    if (error) throw error;

    const ag            = (t.sessoes||[]).sort((a,b)=>a.data>b.data?1:-1)[0];
    const dataCert      = ag?.data || t.created_at?.split('T')[0];
    const instrutor     = ag?.usuarios?.nome || '';
    const instConselho  = ag?.usuarios?.conselho_classe||'';
    const instSigla     = ag?.usuarios?.sigla_conselho||'';
    const instEspec     = ag?.usuarios?.especialidade||'';
    const instCredencial = instConselho ? pdfSafe(`${instSigla?instSigla+' ':''} ${instConselho}`.trim()) : '';
    const participantes = t.turma_participantes || [];
    const ch            = t.catalogo?.carga_horaria || 0;
    const nomeT         = t.catalogo?.nome || 'Treinamento';
    const valMeses      = t.catalogo?.validade_meses || 12;
    const cpText        = t.catalogo?.conteudo_programatico || t.catalogo?.descricao || '';
    const nomeEmp       = t.clientes?.nome || 'empresa nao informada';

    const dtObj = new Date(dataCert+'T12:00:00');
    const dtVal = new Date(dtObj); dtVal.setMonth(dtVal.getMonth()+valMeses);
    const fmtVal = fmtValidadePDF(dtVal);

    const codigo      = crypto.randomUUID();
    const codigoShort = codigo.slice(0,8).toUpperCase();
    const urlValid    = `https://www.toledolabs.com.br/validar.html?codigo=${codigo}`;
    const qrData      = await gerarQRCodeDataURL(urlValid);

    const nrMatch = nomeT.match(/NR[\s\-]*(\d+)/i);
    const nrNum   = nrMatch ? nrMatch[1] : '';

    const s = (v, max) => pdfSafe(v, max);

    const {jsPDF} = window.jspdf;
    const W=297, H=210;
    const NAVY  = [30,42,74];
    const AMBER = [245,158,11];
    const WHITE = [255,255,255];
    const LGRAY = [180,196,220];
    const T2    = [71,85,105];
    const T3    = [148,163,184];
    const GRAY  = [244,246,250];
    const BORD  = [220,228,240];
    const BLUE  = [29,78,216];
    const GRAYLT = [248,250,252];

    const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});

    // ── Texto corrido da capa ──
    const txtCorrido = s(`Os colaboradores da empresa ${nomeEmp} concluiram com aproveitamento o ${nomeT}, realizado em ${fmtDataExtensoPDF(dataCert)}, com carga horaria de ${ch} hora${ch!==1?'s':''}, conforme os criterios estabelecidos para a capacitacao.`, 400);

    // ════════════════════════════════
    // PÁGINA 1 - CAPA COLETIVA
    // ════════════════════════════════
    doc.setFillColor(...WHITE); doc.rect(0,0,W,H,'F');

    // Faixa navy topo
    doc.setFillColor(...NAVY); doc.rect(0,0,W,52,'F');
    doc.setFillColor(...AMBER); doc.rect(0,52,W,3,'F');
    doc.addImage(LOGO_AVANTESEG,'PNG',16,12,58,18);
    doc.setFontSize(7.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('CERTIFICADO COLETIVO DE CONCLUSAO', W/2, 16, {align:'center'});
    doc.setFontSize(6.5); doc.setTextColor(...LGRAY);
    doc.text('AvanteSeg Cursos e Treinamentos Corporativos Ltda', W/2, 22, {align:'center'});
    // Medalha NR
    if (nrNum) {
      doc.setFillColor(...AMBER); doc.circle(W-30,22,16,'F');
      doc.setFontSize(7.5); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
      doc.text('NR', W-30, 18, {align:'center'});
      doc.setFontSize(16); doc.text(s(nrNum,4), W-30, 27, {align:'center'});
    }

    // Área central
    let cy = 66;
    doc.setFontSize(9); doc.setTextColor(...T2); doc.setFont('helvetica','normal');
    doc.text('A AVANTESeg certifica que a empresa', W/2, cy, {align:'center'});
    cy += 13;

    // Nome empresa em destaque
    doc.setFontSize(28); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    const nomeEmpSafe = s(nomeEmp,45);
    doc.text(nomeEmpSafe, W/2, cy, {align:'center'});
    const nEW = doc.getTextWidth(nomeEmpSafe);
    doc.setDrawColor(...AMBER); doc.setLineWidth(2.5);
    doc.line(W/2-nEW/2, cy+3, W/2+nEW/2, cy+3);
    cy += 11;

    if (t.clientes?.cnpj) {
      doc.setFontSize(8); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text(`CNPJ: ${s(t.clientes.cnpj)}`, W/2, cy, {align:'center'});
      cy += 8;
    }

    // Nome do treinamento
    doc.setFontSize(16); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    const lTCo = doc.splitTextToSize(s(nomeT,120), W-60);
    lTCo.forEach((l,i) => doc.text(l, W/2, cy+i*8, {align:'center'}));
    cy += lTCo.length*8 + 7;

    // Texto corrido elegante
    doc.setFontSize(9); doc.setTextColor(...T2); doc.setFont('helvetica','italic');
    const lTxt = doc.splitTextToSize(txtCorrido, W-60);
    lTxt.forEach((l,i) => doc.text(l, W/2, cy+i*5.5, {align:'center'}));

    // Rodapé com assinatura do instrutor + QR
    const fy = H-30;
    doc.setFillColor(...AMBER); doc.rect(0,fy,W,2,'F');
    doc.setFillColor(...NAVY);  doc.rect(0,fy+2,W,28,'F');
    doc.setDrawColor(...LGRAY); doc.setLineWidth(0.3);
    doc.line(W/2-55,fy+12,W/2+55,fy+12);
    doc.setFontSize(8); doc.setTextColor(...WHITE); doc.setFont('helvetica','bold');
    doc.text(s(instrutor,40), W/2, fy+17, {align:'center'});
    doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    if (instCredencial) {
      doc.text(instCredencial, W/2, fy+22, {align:'center'});
    } else {
      doc.text('Instrutor Responsavel', W/2, fy+22, {align:'center'});
    }
    if (qrData) doc.addImage(qrData,'PNG',W-50,fy+4,18,18);
    doc.setFontSize(6); doc.setTextColor(...T3);
    doc.text(`Cod: ${codigoShort}`, W-41, fy+24, {align:'center'});
    doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text(`No ${codigoShort}  |  Emitido em ${fmtDataExtensoPDF(new Date().toISOString().split('T')[0])}  |  toledolabs.com.br/validar`, W/2, H-3, {align:'center'});

    // ════════════════════════════════════════════════════════
    // PÁGINA 2 - CONTRACAPA COLETIVO — Layout B1 v2
    // Mesma geometria da contracapa individual (padronizado)
    // ════════════════════════════════════════════════════════
    doc.addPage('a4','landscape');
    doc.setFillColor(...WHITE); doc.rect(0,0,W,H,'F');

    // ── Cabeçalho navy (28mm) ──
    doc.setFillColor(...NAVY); doc.rect(0,0,W,28,'F');
    doc.setFillColor(...AMBER); doc.rect(0,28,W,2,'F');
    doc.addImage(LOGO_AVANTESEG,'PNG',14,6,50,16);
    doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text(`Protocolo: ${codigoShort}  |  Emitido em: ${fmtDataExtensoPDF(new Date().toISOString().split('T')[0])}`, W-14, 17, {align:'right'});

    // ── Geometria idêntica ao individual ──
    const p_mg=14, p_gap=6, p_top=30, p_bot=H-26;
    const p_c1w=85, p_c2w=95, p_c3w=77;
    const p_c1x=p_mg, p_c2x=p_mg+p_c1w+p_gap, p_c3x=p_mg+p_c1w+p_gap+p_c2w+p_gap;

    // Separadores verticais
    doc.setDrawColor(...BORD); doc.setLineWidth(0.3);
    doc.line(p_c2x-p_gap/2, p_top+4, p_c2x-p_gap/2, p_bot-2);
    doc.line(p_c3x-p_gap/2, p_top+4, p_c3x-p_gap/2, p_bot-2);

    // ══ COLUNA 1: Treinamento + Dados gerais + Assinatura ══
    let p_y1 = p_top+6;
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('TREINAMENTO', p_c1x, p_y1); p_y1+=3.5;
    doc.setDrawColor(...AMBER); doc.setLineWidth(0.6);
    doc.line(p_c1x, p_y1, p_c1x+22, p_y1); p_y1+=5;

    doc.setFontSize(10); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    const p_lTCol = doc.splitTextToSize(s(nomeT,80), p_c1w-3);
    p_lTCol.slice(0,2).forEach((l,i) => doc.text(l, p_c1x, p_y1+i*7));
    p_y1 += Math.min(p_lTCol.length,2)*7 + 4;

    [
      {l:'Empresa',      v:s(nomeEmp,28)},
      {l:'CNPJ',         v:s(t.clientes?.cnpj||'nao informado')},
      {l:'Realizado em', v:fmtDataExtensoPDF(dataCert)},
      {l:'Carga horaria',v:`${ch} hora${ch!==1?'s':''}`},
      {l:'Validade',     v:s(fmtVal)},
      {l:'Instrutor',    v:s(instrutor,28)},
    ].forEach(c => {
      doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text(c.l.toUpperCase(), p_c1x, p_y1); p_y1+=3.5;
      doc.setFontSize(8); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
      doc.text(c.v, p_c1x, p_y1); p_y1+=6;
    });

    // Assinatura — base da col1
    const p_sigYc = p_bot - 12;
    doc.setDrawColor(...LGRAY); doc.setLineWidth(0.3);
    doc.line(p_c1x + p_c1w*0.08, p_sigYc, p_c1x + p_c1w*0.92, p_sigYc);
    doc.setFontSize(8); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    doc.text(s(instrutor,28), p_c1x+p_c1w/2, p_sigYc+5, {align:'center'});
    if (instCredencial) {
      doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text(instCredencial, p_c1x+p_c1w/2, p_sigYc+10, {align:'center'});
      if (instEspec) {
        doc.setFontSize(6); doc.text(pdfSafe(instEspec,40), p_c1x+p_c1w/2, p_sigYc+15, {align:'center'});
      }
    } else {
      doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text('Instrutor Responsavel', p_c1x+p_c1w/2, p_sigYc+10, {align:'center'});
    }

    // ══ COLUNA 2: Conteúdo Programático ══
    let p_y2 = p_top+6;
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('CONTEUDO PROGRAMATICO', p_c2x, p_y2); p_y2+=3.5;
    doc.setDrawColor(...AMBER); doc.setLineWidth(0.6);
    doc.line(p_c2x, p_y2, p_c2x+36, p_y2); p_y2+=5;

    const p_cpMaxY2 = p_bot - 4;
    const p_cpLeading2 = 4.2;
    if (cpText) {
      const p_lCP2 = doc.splitTextToSize(s(cpText,2000), p_c2w-4);
      const p_maxLinhas2 = Math.floor((p_cpMaxY2 - p_y2) / p_cpLeading2);
      doc.setFontSize(7); doc.setTextColor(...T2); doc.setFont('helvetica','normal');
      p_lCP2.slice(0, p_maxLinhas2).forEach((l,i) => {
        doc.text(l, p_c2x, p_y2 + i*p_cpLeading2);
      });
      if (p_lCP2.length > p_maxLinhas2) {
        doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','italic');
        doc.text('(continua no verso...)', p_c2x, p_cpMaxY2);
      }
    } else {
      doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','italic');
      doc.text('Conteudo nao informado.', p_c2x, p_y2);
    }

    // ══ COLUNA 3: Lista de Participantes ══
    let p_y3 = p_top+6;
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text(`PARTICIPANTES (${participantes.length})`, p_c3x, p_y3); p_y3+=3.5;
    doc.setDrawColor(...AMBER); doc.setLineWidth(0.6);
    doc.line(p_c3x, p_y3, p_c3x+24, p_y3); p_y3+=4;

    // Cabeçalho da tabela
    doc.setFillColor(...NAVY); doc.rect(p_c3x, p_y3, p_c3w-2, 8, 'F');
    doc.setFontSize(7); doc.setTextColor(...WHITE); doc.setFont('helvetica','bold');
    doc.text('No',   p_c3x+3, p_y3+5.5);
    doc.text('Nome', p_c3x+12, p_y3+5.5);
    doc.text('CPF',  p_c3x+p_c3w-38, p_y3+5.5);
    p_y3+=8;

    const MAX_P2 = Math.floor((p_bot - p_y3) / 8);
    participantes.slice(0, MAX_P2).forEach((p,i) => {
      const co = p.colaboradores||{};
      doc.setFillColor(i%2===0?244:255, i%2===0?246:255, i%2===0?250:255);
      doc.rect(p_c3x, p_y3, p_c3w-2, 8, 'F');
      doc.setDrawColor(...BORD); doc.setLineWidth(0.15);
      doc.rect(p_c3x, p_y3, p_c3w-2, 8, 'S');
      doc.setFontSize(7); doc.setTextColor(...NAVY); doc.setFont('helvetica','normal');
      doc.text(String(i+1), p_c3x+3, p_y3+5.5);
      doc.text(s(co.nome||'',20), p_c3x+12, p_y3+5.5);
      doc.text(s(co.cpf||'-'), p_c3x+p_c3w-38, p_y3+5.5);
      p_y3+=8;
    });
    if (participantes.length > MAX_P2) {
      doc.setFontSize(6.5); doc.setTextColor(...T3); doc.setFont('helvetica','italic');
      doc.text(`+ ${participantes.length-MAX_P2} nas paginas seguintes`, p_c3x+2, p_y3+5);
    }

    // ── STRIP DE VALIDAÇÃO (mesma spec do individual) ──
    const p_stripY = H-26;
    doc.setFillColor(244,246,250); doc.rect(0, p_stripY, W, 14, 'F');
    doc.setDrawColor(...BORD); doc.setLineWidth(0.3); doc.line(0, p_stripY, W, p_stripY);

    doc.setFillColor(...AMBER); doc.circle(p_mg+3, p_stripY+7, 2, 'F');
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('VALIDACAO DO CERTIFICADO', p_mg+8, p_stripY+4.5);
    doc.setFontSize(6.5); doc.setTextColor(...BLUE); doc.setFont('helvetica','bold');
    doc.text('toledolabs.com.br/validar', p_mg+8, p_stripY+10);

    doc.setDrawColor(...BORD); doc.setLineWidth(0.3); doc.line(p_mg+76, p_stripY+2, p_mg+76, p_stripY+12);

    doc.setFillColor(100,116,139); doc.circle(p_mg+80, p_stripY+7, 2, 'F');
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('CODIGO', p_mg+85, p_stripY+4.5);
    doc.setFontSize(7); doc.setTextColor(...NAVY); doc.setFont('helvetica','bold');
    doc.text(codigoShort, p_mg+85, p_stripY+10.5);

    doc.setDrawColor(...BORD); doc.line(p_mg+118, p_stripY+2, p_mg+118, p_stripY+12);

    if (qrData) doc.addImage(qrData,'PNG', p_mg+122, p_stripY+1, 12, 12);
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('Escaneie para validar', p_mg+137, p_stripY+8);
    doc.setFontSize(6); doc.setTextColor(...T3);
    doc.text('Emitido eletronicamente. Validade juridica conforme legislacao vigente.', W-14, p_stripY+8, {align:'right'});

    // ── RODAPÉ ──
    doc.setFillColor(...NAVY); doc.rect(0, H-12, W, 12, 'F');
    doc.setFontSize(7); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
    doc.text('AvanteSeg Cursos e Treinamentos Corporativos Ltda', W/2, H-6.5, {align:'center'});
    doc.setFontSize(6); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
    doc.text('Av. Arno Carlo Gracher, 69 Sala 4  -  Brusque - SC  -  (47) 3351-4266  -  www.avanteseg.com.br', W/2, H-2.5, {align:'center'});

    // ════════════════════════════════
    // PÁGINAS ADICIONAIS - participantes excedentes (20 por página)
    // ════════════════════════════════
    const restantes = participantes.slice(MAX_P2);
    const MAX_PAG   = 20;
    for (let pg=0; pg*MAX_PAG < restantes.length; pg++) {
      doc.addPage('a4','landscape');
      doc.setFillColor(...WHITE); doc.rect(0,0,W,H,'F');

      // Mini-cabeçalho navy
      doc.setFillColor(...NAVY); doc.rect(0,0,W,28,'F');
      doc.setFillColor(...AMBER); doc.rect(0,28,W,2,'F');
      doc.addImage(LOGO_AVANTESEG,'PNG',16,5,44,14);
      doc.setFontSize(7); doc.setTextColor(...T3); doc.setFont('helvetica','normal');
      doc.text(`${s(nomeT,60)}  |  ${s(nomeEmp,30)}  |  ${fmtDataExtensoPDF(dataCert)}`, W-16, 11, {align:'right'});
      doc.text(`Pagina ${pg+3}  |  Cod: ${codigoShort}`, W-16, 18, {align:'right'});

      let ty = 38;
      doc.setFontSize(6.5); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
      doc.text(`LISTA DE PARTICIPANTES (continuacao) - pag. ${pg+3}`, 16, ty); ty+=5;

      // Tabela
      doc.setFillColor(...NAVY); doc.rect(16,ty,W-32,9,'F');
      doc.setFontSize(8); doc.setTextColor(...WHITE); doc.setFont('helvetica','bold');
      doc.text('No', 20, ty+6);
      doc.text('Nome', 32, ty+6);
      doc.text('CPF', W/2+10, ty+6);
      doc.text('Cargo', W/2+58, ty+6);
      ty+=9;

      const offset = MAX_P2 + pg*MAX_PAG;
      restantes.slice(pg*MAX_PAG, (pg+1)*MAX_PAG).forEach((p,i) => {
        const co = p.colaboradores||{};
        doc.setFillColor(i%2===0?244:255, i%2===0?246:255, i%2===0?250:255);
        doc.rect(16,ty,W-32,9,'F');
        doc.setDrawColor(...BORD); doc.setLineWidth(0.15); doc.rect(16,ty,W-32,9,'S');
        doc.setFontSize(8); doc.setTextColor(...NAVY); doc.setFont('helvetica','normal');
        doc.text(String(offset+i+1), 20, ty+6);
        doc.text(s(co.nome||'',40), 32, ty+6);
        doc.text(s(co.cpf||'-'), W/2+10, ty+6);
        doc.text(s(p.cargo_vinculo||co.cargo||'-',24), W/2+58, ty+6);
        ty+=9;
      });

      // Rodapé página adicional
      doc.setFillColor(...NAVY); doc.rect(0,H-12,W,12,'F');
      doc.setFontSize(6.5); doc.setTextColor(...AMBER); doc.setFont('helvetica','bold');
      doc.text('AvanteSeg Cursos e Treinamentos Corporativos Ltda', W/2, H-6.5, {align:'center'});
    }

    const nomeCli = s(nomeEmp,40).replace(/\s+/g,'-').toLowerCase();
    doc.save(`certificado-coletivo-${nomeCli}.pdf`);
    await salvarDocumentoSupabase(doc,`cert-coletivo-${turmaId}.pdf`,'certificado_coletivo',turmaId,null,codigo);
    showToast('Certificado coletivo gerado!','success');
  } catch(e) {
    console.error(e); showToast(e.message||'Erro ao gerar certificado coletivo','error');
  } finally { hideLoading(); }
}


// ============================================================
// TELA DOCUMENTOS - turma concluída
// ============================================================
async function renderDocumentosTurma(turmaId) {
  showLoading('Carregando documentos...');
  try {
    const {data:t, error} = await sb.from('turmas')
      .select('*,clientes(nome,email),catalogo(nome,carga_horaria),sessoes(*),turma_participantes(*,colaboradores(nome))')
      .eq('id', turmaId).single();
    if (error) throw error;

    const participantes = t.turma_participantes||[];
    const agendamentos  = t.sessoes||[];
    const nomeT = t.catalogo?.nome||'Treinamento';
    const nomeC = t.clientes?.nome||'-';
    const emailCliente = t.clientes?.email||'';

    // Se a turma já está concluída, todos os agendamentos são considerados concluídos
    // Isso cobre casos históricos e finalizações manuais pelo gestor
    const turmaJaConcluida = t.status === 'concluida';
    const totalAg      = agendamentos.length;
    const concluidosAg = agendamentos.filter(a => a.concluida === true).length;
    const todosConcluidos = turmaJaConcluida || totalAg === 0 || concluidosAg === totalAg;

    // Documentos já gerados
    const {data:docs} = await sb.from('documentos').select('*').eq('turma_id', turmaId);
    const docsMap = {};
    (docs||[]).forEach(d => { docsMap[d.tipo+(d.colaborador_id||'')] = d; });

    // Verificar se todos os documentos necessários foram gerados
    const temLista     = !!docsMap['lista_presenca'];
    const temColetivo  = !!docsMap['certificado_coletivo'];
    const temTodosInd  = participantes.length > 0 && participantes.every(p => !!docsMap['certificado_individual'+p.colaborador_id]);
    const podosEnviar  = temLista && temColetivo && temTodosInd && emailCliente;

    // Status de envio anterior
    const {data:envio} = await sb.from('envios_email').select('*').eq('turma_id', turmaId).maybeSingle();

    const htmlParticipantes = participantes.length===0
      ? `<div class="empty" style="padding:16px"><div class="empty-title">Nenhum participante</div></div>`
      : participantes.map(p => {
          const col = p.colaboradores||{};
          const jaGerado = docsMap['certificado_individual'+p.colaborador_id];
          const subInfo = jaGerado
            ? `<div class="li-sub" style="color:var(--green)">✓ Gerado em ${formatarDataHora(jaGerado.gerado_em)}</div>`
            : `<div class="li-sub">Aguardando geração</div>`;
          return `<div class="list-item" style="padding:12px 0">
              <div class="li-icon" style="background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:700;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center">${iniciais(col.nome||'?')}</div>
              <div class="li-info"><div class="li-title">${col.nome||'-'}</div>${subInfo}</div>
              <button class="btn btn-navy btn-sm" onclick="gerarCertificadoIndividual('${turmaId}','${p.colaborador_id}')">⬇ PDF</button>
            </div>`;
        }).join('') + (participantes.length > 0
          ? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><button class="btn btn-outline" style="width:100%" onclick="gerarTodosCertificados('${turmaId}')">⬇ Gerar todos os certificados individuais</button></div>`
          : '');

    // Bloco de status dos agendamentos
    const htmlAgendamentos = totalAg === 0 ? '' : `
      <div class="card" style="margin-bottom:16px;border-color:${todosConcluidos?'var(--green)':'#fde68a'}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${todosConcluidos?'0':'10px'}">
          <div style="font-size:20px">${todosConcluidos?'✅':'⏳'}</div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text-1)">${todosConcluidos?'Todos os agendamentos concluídos':'Agendamentos pendentes'}</div>
            <div style="font-size:12px;color:var(--text-2)">${concluidosAg} de ${totalAg} concluído(s)</div>
          </div>
        </div>
        ${!todosConcluidos ? `<div style="font-size:12px;color:var(--amber);background:var(--amber-l);padding:8px 12px;border-radius:var(--r-md)">
          O envio automático só ocorrerá após todos os agendamentos serem marcados como concluídos.
        </div>` : ''}
      </div>`;

    // Bloco de envio
    const htmlEnvio = `
      <div class="card" style="margin-bottom:16px;${todosConcluidos&&emailCliente?'border-color:var(--blue)':''}" id="cardEnvio">
        <div style="font-size:15px;font-weight:600;color:var(--text-1);margin-bottom:8px">✉️ Envio automático</div>
        ${!emailCliente ? `
          <div style="font-size:13px;color:var(--red);background:var(--red-l);padding:10px 12px;border-radius:var(--r-md)">
            ⚠️ A empresa cliente não possui e-mail cadastrado. Cadastre o e-mail do cliente para habilitar o envio.
          </div>` : `
          <div style="font-size:13px;color:var(--text-2);margin-bottom:12px">
            Destinatário: <strong>${emailCliente}</strong>
          </div>
          ${envio ? `<div style="font-size:12px;color:var(--green);margin-bottom:12px">✓ Enviado em ${formatarDataHora(envio.enviado_em)}</div>` : ''}
          ${!todosConcluidos ? `<div style="font-size:12px;color:var(--amber)">Aguardando conclusão de todos os agendamentos.</div>` :
            !podosEnviar ? `<div style="font-size:12px;color:var(--text-3)">Gere todos os documentos acima para habilitar o envio.</div>` :
            `<button class="btn btn-navy" style="width:100%" onclick="enviarDocumentosPorEmail('${turmaId}')">
              ✉️ ${envio ? 'Reenviar documentos' : 'Enviar documentos por e-mail'}
            </button>`
          }`}
      </div>`;

    const html = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <button class="btn btn-ghost btn-sm" data-action="verTurma" data-id="${turmaId}">${ICONS.back} Voltar</button>
        <div style="flex:1;min-width:0">
          <div style="font-size:18px;font-weight:700;color:var(--text-1)">${nomeT}</div>
          <div style="font-size:13px;color:var(--text-2)">${nomeC}</div>
        </div>
        <span class="badge badge-green">Concluída</span>
      </div>

      ${htmlAgendamentos}
      ${htmlEnvio}

      <!-- Lista de Presença -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--text-1)">📋 Lista de Presença</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px">Consolidada por todos os agendamentos</div>
          </div>
          <button class="btn btn-navy btn-sm" onclick="gerarListaPresenca('${turmaId}')">⬇ Gerar PDF</button>
        </div>
        ${temLista ? `<div style="font-size:11px;color:var(--green);margin-top:6px">✓ Gerado em ${formatarDataHora(docsMap['lista_presenca'].gerado_em)}</div>` : ''}
      </div>

      <!-- Certificado Coletivo -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div>
            <div style="font-size:15px;font-weight:600;color:var(--text-1)">🏢 Certificado Coletivo</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px">Para a empresa - ${participantes.length} participante(s)</div>
          </div>
          <button class="btn btn-navy btn-sm" onclick="gerarCertificadoColetivo('${turmaId}')">⬇ Gerar PDF</button>
        </div>
        ${temColetivo ? `<div style="font-size:11px;color:var(--green);margin-top:6px">✓ Gerado em ${formatarDataHora(docsMap['certificado_coletivo'].gerado_em)}</div>` : ''}
      </div>

      <!-- Certificados Individuais -->
      <div class="card">
        <div style="font-size:15px;font-weight:600;color:var(--text-1);margin-bottom:12px">🎓 Certificados Individuais</div>
        ${htmlParticipantes}
      </div>`;

    setConteudo(html);
    setMobileHeader(`<div class="mh-greeting">Documentos</div><div class="mh-name">${nomeT}</div>`);
  } finally { hideLoading(); }
}

// ============================================================
// ENVIO DE DOCUMENTOS POR E-MAIL
// ============================================================
async function enviarDocumentosPorEmail(turmaId) {
  if (!confirm('Confirma o envio dos documentos por e-mail para a empresa cliente?')) return;
  showLoading('Preparando documentos para envio...');
  try {
    const {data:t, error} = await sb.from('turmas')
      .select('*,clientes(nome,email),catalogo(nome,carga_horaria),sessoes(*,usuarios(nome)),turma_participantes(*,colaboradores(nome))')
      .eq('id', turmaId).single();
    if (error) throw error;

    const {data:docs} = await sb.from('documentos').select('*').eq('turma_id', turmaId);
    if (!docs || docs.length === 0) throw new Error('Nenhum documento gerado. Gere os documentos antes de enviar.');

    // Baixar cada PDF do Storage e converter para base64 no browser
    const arquivos = [];
    for (const doc of docs) {
      const {data:blob, error:dlErr} = await sb.storage.from('documentos').download(doc.arquivo_path);
      if (dlErr || !blob) { console.warn('Não foi possível baixar:', doc.arquivo_path); continue; }
      const base64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
      arquivos.push({
        tipo:           doc.tipo,
        nome:           doc.arquivo_path.split('/').pop(),
        conteudo_b64:   base64,
        colaborador_id: doc.colaborador_id || null,
      });
    }

    if (arquivos.length === 0) throw new Error('Não foi possível baixar nenhum documento do Storage.');

    const ag = (t.sessoes||[]).sort((a,b) => a.data > b.data ? 1 : -1);

    const payload = {
      turma_id:      turmaId,
      treinamento:   t.catalogo?.nome||'Treinamento',
      empresa:       t.clientes?.nome||'',
      email_destino: t.clientes?.email||'',
      carga_horaria: t.catalogo?.carga_horaria||'',
      datas:         ag.map(a => formatarData(a.data)).join(', '),
      local:         t.local||'',
      instrutor:     ag[0]?.usuarios?.nome||'',
      participantes: (t.turma_participantes||[]).map(p => p.colaboradores?.nome||'').filter(Boolean),
      arquivos,
      org_id:        usuarioAtual.org_id,
    };

    const resp = await sb.functions.invoke('enviar-documentos', {body: payload});
    if (resp.error) throw new Error(resp.error.message || 'Erro na Edge Function');

    const {data: envioExistente} = await sb.from('envios_email').select('id').eq('turma_id', turmaId).maybeSingle();
    if (envioExistente) {
      await sb.from('envios_email').update({
        email_destino: t.clientes?.email||'',
        enviado_em:    new Date().toISOString(),
        status:        'enviado',
      }).eq('id', envioExistente.id);
    } else {
      await sb.from('envios_email').insert({
        turma_id:      turmaId,
        org_id:        usuarioAtual.org_id,
        email_destino: t.clientes?.email||'',
        enviado_em:    new Date().toISOString(),
        status:        'enviado',
      });
    }

    showToast('Documentos enviados com sucesso!', 'success');
    await renderDocumentosTurma(turmaId);
  } catch(e) {
    console.error(e);
    showToast(e.message||'Erro ao enviar documentos', 'error');
  } finally { hideLoading(); }
}

async function gerarTodosCertificados(turmaId) {
  const {data:t} = await sb.from('turmas')
    .select('turma_participantes(colaborador_id)').eq('id',turmaId).single();
  const participantes = t?.turma_participantes||[];
  for (const p of participantes) {
    await gerarCertificadoIndividual(turmaId, p.colaborador_id);
    await new Promise(r => setTimeout(r, 500));
  }
}
