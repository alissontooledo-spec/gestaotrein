<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Treinamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   DESIGN SYSTEM — Treinamentos
   Paleta: Azul marinho #0F172A · Ação #2563EB · Superfície #fff · Fundo #F8FAFC
   Tipo: Inter
   ============================================================ */
:root {
  --navy:    #0F172A;
  --navy-2:  #1E293B;
  --navy-3:  #334155;
  --blue:    #2563EB;
  --blue-h:  #1D4ED8;
  --blue-l:  #EFF6FF;
  --blue-m:  #BFDBFE;
  --green:   #059669;
  --green-l: #D1FAE5;
  --amber:   #D97706;
  --amber-l: #FEF3C7;
  --red:     #DC2626;
  --red-l:   #FEE2E2;
  --gray-50: #F8FAFC;
  --gray-100:#F1F5F9;
  --gray-200:#E2E8F0;
  --gray-300:#CBD5E1;
  --gray-400:#94A3B8;
  --gray-500:#64748B;
  --gray-600:#475569;
  --gray-700:#334155;
  --gray-800:#1E293B;
  --text-1:  #0F172A;
  --text-2:  #475569;
  --text-3:  #94A3B8;
  --surface: #FFFFFF;
  --bg:      #F8FAFC;
  --border:  #E2E8F0;
  --r-sm:    6px;
  --r-md:    10px;
  --r-lg:    14px;
  --r-xl:    20px;
  --shadow:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --nav-h:   64px;
  --sidebar-w:240px;
  --header-h: 60px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.5}

/* ---- TELAS ---- */
.screen{display:none;position:fixed;inset:0;overflow:hidden;flex-direction:column}
.screen.active{display:flex}

/* ---- LOGIN ---- */
#screenLogin{background:var(--navy);align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo-icon{width:42px;height:42px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-icon svg{width:24px;height:24px}
.login-logo-text{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.login-logo-sub{font-size:11px;color:var(--text-3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px}
.login-sub{font-size:14px;color:var(--text-2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:15px;font-family:inherit;color:var(--text-1);background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.field input::placeholder{color:var(--text-3)}
.btn-primary{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:-.1px}
.btn-primary:hover{background:var(--blue-h)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed;transform:none}
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--text-3)}
.login-error{background:var(--red-l);color:var(--red);border-radius:var(--r-md);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.login-error.show{display:block}

/* ---- LAYOUT PRINCIPAL ---- */
#screenApp{background:var(--bg)}

/* Sidebar (desktop) */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo-row{display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo-icon svg{width:18px;height:18px}
.sidebar-logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sidebar-logo-tag{font-size:10px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sidebar-section{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.8px;text-transform:uppercase;padding:8px 10px 4px;margin-top:8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;transition:background .15s,color .15s;margin-bottom:2px}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(37,99,235,.3);color:#fff}
.sidebar-item.active .si-icon{color:var(--blue-m)}
.si-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sidebar-bottom{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);cursor:pointer;transition:background .15s}
.sidebar-user:hover{background:rgba(255,255,255,.08)}
.su-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.su-name{font-size:13px;font-weight:500;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.su-role{font-size:11px;color:rgba(255,255,255,.4)}

/* Conteúdo principal */
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.main-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.main-header-title{font-size:17px;font-weight:600;color:var(--text-1);flex:1}
.main-body{flex:1;overflow-y:auto;padding:24px}

/* Botão hamburguer (mobile) */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--text-1)}
.hamburger svg{width:22px;height:22px}

/* Overlay (sidebar mobile) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.show{display:block}

/* Nav bottom (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn-items{display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:var(--text-3);font-size:10px;font-weight:500;gap:3px;transition:color .15s;border:none;background:none;font-family:inherit}
.bn-item.active{color:var(--blue)}
.bn-item svg{width:22px;height:22px}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:1px;opacity:0}
.bn-item.active .bn-dot{opacity:1}

/* Conteúdo mobile (sem sidebar) */
.mobile-content{flex:1;overflow-y:auto;padding:16px 16px calc(var(--nav-h) + 16px)}
.mobile-header{background:var(--navy);padding:20px 16px 16px;padding-top:calc(20px + env(safe-area-inset-top));flex-shrink:0}
.mh-greeting{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:2px}
.mh-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
.mh-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;font-size:12px;color:rgba(255,255,255,.8);font-weight:500}

/* ---- CARDS ---- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--text-1);letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px}
.stat-card.blue{background:var(--blue);border-color:var(--blue)}
.stat-card.blue .stat-label,.stat-card.blue .stat-value,.stat-card.blue .stat-sub{color:#fff}
.stat-card.blue .stat-label,.stat-card.blue .stat-sub{color:rgba(255,255,255,.75)}

/* Item de lista */
.list-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.list-item:last-child{border-bottom:none}
.li-icon{width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:700}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--text-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-right{flex-shrink:0}

/* Badge */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.1px}
.badge-blue{background:var(--blue-l);color:var(--blue-h)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}

/* Botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r-md);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-h)}
.btn-outline{background:transparent;color:var(--text-1);border:1px solid var(--border)}
.btn-outline:hover{background:var(--gray-100)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--gray-100);color:var(--text-1)}
.btn-danger{background:var(--red-l);color:var(--red)}
.btn-danger:hover{background:#fecaca}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(var(--nav-h) + 16px);width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:80;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(37,99,235,.5)}
.fab svg{width:24px;height:24px}

/* Seção home */
.home-section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:var(--text-1)}
.section-link{font-size:13px;color:var(--blue);font-weight:500;cursor:pointer;text-decoration:none}

/* Empty state */
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text-3)}

/* Ação rápida */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.qa-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.qa-btn:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.qa-icon{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.qa-label{font-size:13px;font-weight:600;color:var(--text-1)}
.qa-sub{font-size:11px;color:var(--text-3);margin-top:2px}

/* Alerta vencimento */
.alert{border-radius:var(--r-md);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.alert-amber{background:var(--amber-l);border:1px solid #fde68a}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alert-text{font-size:13px;color:var(--text-1);line-height:1.4}
.alert-title{font-weight:600;margin-bottom:2px}

/* Toast */
#toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:12px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;transform:translateX(120%);transition:transform .25s;pointer-events:auto;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.success{background:#064E3B;border-left:3px solid var(--green)}
.toast.error{background:#7F1D1D;border-left:3px solid var(--red)}
.toast.info{background:var(--navy-2);border-left:3px solid var(--blue)}

/* Loading overlay */
#loading-overlay{position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.loading-text{color:rgba(255,255,255,.8);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Scroll suave */
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollable::-webkit-scrollbar{width:4px}
.scrollable::-webkit-scrollbar-track{background:transparent}
.scrollable::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}

/* ============================================================
   RESPONSIVIDADE
   ============================================================ */
@media (min-width:768px) {
  .sidebar{transform:none !important}
  .sidebar-overlay{display:none !important}
  .bottom-nav{display:none !important}
  .main-content{display:flex}
  .mobile-header{display:none}
  .mobile-content{display:none}
  .hamburger{display:none !important}
  .fab{bottom:24px;right:24px}
}

@media (max-width:767px) {
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .bottom-nav{display:block}
  .main-content{margin-left:0}
  .main-header{display:none}
  .main-body{display:none}
  .hamburger{display:flex}
}

@media (min-width:768px) and (max-width:1024px) {
  :root{--sidebar-w:200px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}

@media (min-width:1280px) {
  .stats-grid{grid-template-columns:repeat(4,1fr)}
  .quick-actions{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

<!-- ============================================================
     TELA: LOGIN
     ============================================================ -->
<div class="screen active" id="screenLogin">
  <div class="login-card">
    <div class="login-logo">

        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<!-- ============================================================
     TELA: APP PRINCIPAL (Desktop)
     ============================================================ -->
<div class="screen" id="screenApp">

  <!-- Overlay sidebar mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-row">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <div>
          <div class="sidebar-logo-name">Treinamentos</div>
          <div class="sidebar-logo-tag">Toledo Labs</div>
        </div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-bottom">
      <div class="sidebar-user" onclick="irPara('conta')">
        <div class="su-avatar" id="sidebarAvatar">AL</div>

          <div class="su-name" id="sidebarNome">Carregando...</div>

  <!-- CONTEÚDO DESKTOP -->
  <div class="main-content">

      <button class="hamburger" onclick="abrirSidebar()" aria-label="Menu">

          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Carregando...</div>
</div>

<script>
// ============================================================
//  CONFIGURAÇÃO SUPABASE
//  Troque os valores abaixo pelas suas credenciais
// ============================================================
const SUPABASE_URL = 'https://sbiyxuawnyjgefqlaxgw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AVRr-Mb6NfJ8camm__Isew_F2VnRdWb';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
//  ESTADO GLOBAL
// ============================================================
let usuarioAtual = null;   // linha de public.usuarios
let paginaAtual  = 'home';
let fabCallback  = null;

// ============================================================
//  UTILITÁRIOS
// ============================================================
const isMobile = () => window.innerWidth < 768;

function iniciais(nome){
  if(!nome) return '?';
  return nome.trim().split(' ').filter(Boolean).slice(0,2).map(n=>n[0].toUpperCase()).join('');
}

function corPerfil(perfil){
  return {provedor:'#7C3AED',administrador:'#2563EB',comercial:'#059669',instrutor:'#D97706'}[perfil]||'#64748B';
}

function labelPerfil(perfil){
  return {provedor:'Provedor',administrador:'Administrador',comercial:'Comercial',instrutor:'Instrutor'}[perfil]||perfil;
}

function hora(){
  const h=new Date().getHours();
  return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
}

function formatarData(iso){
  if(!iso)return'—';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR');
}

function formatarDataHora(iso){
  if(!iso)return'—';
  return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, tipo='info', duracao=3500){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${tipo}`;
  const icons={success:'✓',error:'✕',info:'ℹ'};
  t.innerHTML=`<span>${icons[tipo]||'ℹ'}</span><span>${msg}</span>`;
  c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},duracao);
}

// ============================================================
//  LOGIN
// ============================================================
document.getElementById('loginPass').addEventListener('keydown',e=>{
  if(e.key==='Enter') fazerLogin();
});

async function fazerLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');

  if(!email||!senha){
    err.textContent='Preencha e-mail e senha.';
    err.classList.add('show');
    return;
  }

  err.classList.remove('show');
  btn.disabled=true;
  btn.textContent='Entrando...';

  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
    if(error) throw error;

    // Buscar perfil na tabela usuarios
    const{data:perfil,error:ep}=await sb
      .from('usuarios')
      .select('*')
      .eq('id',data.user.id)
      .single();

    if(ep||!perfil) throw new Error('Usuário não encontrado no sistema. Contate o administrador.');
    if(!perfil.ativo) throw new Error('Usuário inativo. Contate o administrador.');

    usuarioAtual=perfil;
    await entrarNoApp();

  }catch(e){
    err.textContent=e.message||'E-mail ou senha incorretos.';
    err.classList.add('show');
    btn.disabled=false;
    btn.textContent='Entrar';
  }
}

// ============================================================
//  LOGOUT
// ============================================================
async function fazerLogout(){
  if(!confirm('Deseja sair do sistema?'))return;
  showLoading('Saindo...');
  await sb.auth.signOut();
  usuarioAtual=null;
  hideLoading();
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='Entrar';
  showScreen('screenLogin');
}

function configurarNavegacao(){
  const perfil=usuarioAtual.perfil;
  const itens=NAV_ITENS[perfil]||[];
  const bottomIds=NAV_BOTTOM[perfil]||[];

  // Sidebar
  const sidebarNav=document.getElementById('sidebarNav');
  sidebarNav.innerHTML=itens.map(i=>`
    <div class="sidebar-item" id="si-${i.id}" onclick="irPara('${i.id}')">
      <span class="si-icon">${i.icon}</span>
      <span>${i.label}</span>
    </div>`).join('');

  // Bottom nav (mobile)
  const bnItems=document.getElementById('bnItems');
  const bottomItens=itens.filter(i=>bottomIds.includes(i.id));
  bnItems.innerHTML=bottomItens.map(i=>`
    <button class="bn-item" id="bn-${i.id}" onclick="irPara('${i.id}')">
      ${i.icon}
      <span>${i.label}</span>
      <div class="bn-dot"></div>
    </button>`).join('');

  // Avatar sidebar
  document.getElementById('sidebarAvatar').textContent=iniciais(usuarioAtual.nome);
  document.getElementById('sidebarAvatar').style.background=corPerfil(perfil);
  document.getElementById('sidebarNome').textContent=usuarioAtual.nome;
  document.getElementById('sidebarPerfil').textContent=labelPerfil(perfil);
}

function marcarNavAtivo(id){
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(el=>el.classList.remove('active'));
  const si=document.getElementById(`si-${id}`);
  const bn=document.getElementById(`bn-${id}`);
  if(si) si.classList.add('active');
  if(bn) bn.classList.add('active');
}

// ============================================================
//  ROTEADOR DE PÁGINAS
// ============================================================
async function irPara(pagina, params={}){
  paginaAtual=pagina;
  marcarNavAtivo(pagina);
  fecharSidebar();
  fabCallback=null;
  document.getElementById('fabBtn').style.display='none';

  const titulos={
    home:'Início', orgs:'Organizações', turmas:'Turmas',
    clientes:'Clientes', colaboradores:'Colaboradores',
    catalogo:'Catálogo de Treinamentos', relatorios:'Relatórios',
    equipe:'Equipe', agenda:'Minha Agenda',
    historico:'Histórico', conta:'Minha Conta',
  };
  document.getElementById('headerTitle').textContent=titulos[pagina]||pagina;

  showLoading();
  try{
    switch(pagina){
      case 'home':     await renderHome(); break;
      case 'agenda':   await renderAgenda(); break;
      case 'conta':    await renderConta(); break;
      case 'orgs':     await renderOrgs(); break;
      default: renderEmBreve(titulos[pagina]||pagina);
    }
  }catch(e){
    console.error(e);
    renderErro(e.message);
  }finally{
    hideLoading();
  }
}

  const concluidas=(turmas||[]).filter(t=>t.status==='concluida');

  const renderTurma=t=>{

      <div class="card">
        ${abertas.length===0
          ?`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Nenhuma turma em aberto</div></div>`
          :abertas.map(renderTurma).join('')}
      </div>
    </div>
    <div class="home-section">
      <div class="section-header"><div class="section-title">Concluídas (${concluidas.length})</div></div>
      <div class="card">
        ${concluidas.length===0
          ?`<div class="empty"><div class="empty-icon">✓</div><div class="empty-title">Nenhuma turma concluída ainda</div></div>`
          :concluidas.map(renderTurma).join('')}
      </div>
    </div>`;
  setConteudo(html);
}

    .from('organizacoes')

  document.getElementById('fabBtn').style.display='flex';

        <div class="list-item">

            <div class="li-title">${o.nome}</div>
            <div class="li-sub">${o.cnpj||'CNPJ não informado'}${o.email?` · ${o.email}`:''}</div>

  setConteudo(html);
}

async function renderConta(){
  const u=usuarioAtual;
  setMobileHeader(`
    <div class="mh-greeting">Configurações</div>
    <div class="mh-name">Minha conta</div>`);

  const html=`
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div style="width:56px;height:56px;border-radius:50%;background:${corPerfil(u.perfil)};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0">${iniciais(u.nome)}</div>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--text-1)">${u.nome}</div>
          <div style="font-size:13px;color:var(--text-2);margin-top:2px">${u.email||'—'}</div>
          <span class="badge badge-blue" style="margin-top:6px">${labelPerfil(u.perfil)}</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="editNome" value="${u.nome}">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="editEmail" value="${u.email||''}">
      </div>
      <button class="btn btn-blue" onclick="salvarConta()" style="width:100%">Salvar alterações</button>
    </div>
    <div class="card">
      <div class="card-title">Segurança</div>
      <button class="btn btn-outline" style="width:100%;margin-bottom:8px" onclick="showToast('Funcionalidade em breve','info')">
        Alterar senha
      </button>
      <button class="btn btn-danger" style="width:100%" onclick="fazerLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair do sistema
      </button>
    </div>`;
  setConteudo(html);
}

async function salvarConta(){
  const nome=document.getElementById('editNome')?.value.trim();
  const email=document.getElementById('editEmail')?.value.trim();
  if(!nome){showToast('Nome é obrigatório','error');return;}
  try{
    const{error}=await sb.from('usuarios').update({nome,email}).eq('id',usuarioAtual.id);
    if(error) throw error;
    usuarioAtual.nome=nome;
    usuarioAtual.email=email;
    document.getElementById('sidebarAvatar').textContent=iniciais(nome);
    document.getElementById('sidebarNome').textContent=nome;
    showToast('Dados atualizados com sucesso','success');
  }catch(e){
    showToast(e.message||'Erro ao salvar','error');
  }
}

// ============================================================
//  INICIALIZAÇÃO
// ============================================================
document.addEventListener('DOMContentLoaded',async()=>{
  // Verificar sessão existente
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    try{
      const{data:perfil,error}=await sb
        .from('usuarios')
        .select('*')
        .eq('id',session.user.id)
        .single();
      if(!error&&perfil&&perfil.ativo){
        usuarioAtual=perfil;
        await entrarNoApp();
        return;
      }
    }catch(e){console.warn('Sessão inválida, redirecionando para login.')}
  }
  showScreen('screenLogin');
});
</script>
