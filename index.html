<style>
:root{--navy:#0F172A;--navy-2:#1E293B;--navy-3:#334155;--blue:#2563EB;--blue-h:#1D4ED8;--blue-l:#EFF6FF;--blue-m:#BFDBFE;--green:#059669;--green-l:#D1FAE5;--amber:#D97706;--amber-l:#FEF3C7;--red:#DC2626;--red-l:#FEE2E2;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;--gray-600:#475569;--gray-700:#334155;--gray-800:#1E293B;--text-1:#0F172A;--text-2:#475569;--text-3:#94A3B8;--surface:#FFFFFF;--bg:#F8FAFC;--border:#E2E8F0;--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.1);--nav-h:64px;--sidebar-w:240px;--header-h:60px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;line-height:1.5}
.screen{display:none;position:fixed;inset:0;overflow:hidden;flex-direction:column}
.screen.active{display:flex}
#screenLogin{background:var(--navy);align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo-icon{width:42px;height:42px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-text{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.login-logo-sub{font-size:11px;color:var(--text-3);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px}
.login-sub{font-size:14px;color:var(--text-2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:15px;font-family:inherit;color:var(--text-1);background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.field input::placeholder,.field textarea::placeholder{color:var(--text-3)}
.btn-primary{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:-.1px}
.btn-primary:hover{background:var(--blue-h)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed;transform:none}
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--text-3)}
.login-error{background:var(--red-l);color:var(--red);border-radius:var(--r-md);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.login-error.show{display:block}
#screenApp{background:var(--bg)}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo-row{display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:34px;height:34px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sidebar-logo-tag{font-size:10px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;transition:background .15s,color .15s;margin-bottom:2px}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(37,99,235,.3);color:#fff}
.si-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sidebar-bottom{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-md);cursor:pointer;transition:background .15s}
.sidebar-user:hover{background:rgba(255,255,255,.08)}
.su-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.su-name{font-size:13px;font-weight:500;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.su-role{font-size:11px;color:rgba(255,255,255,.4)}
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.main-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.main-header-title{font-size:17px;font-weight:600;color:var(--text-1);flex:1}
.main-body{flex:1;overflow-y:auto;padding:24px}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--text-1)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.show{display:block}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn-items{display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:var(--text-3);font-size:10px;font-weight:500;gap:3px;transition:color .15s;border:none;background:none;font-family:inherit}
.bn-item.active{color:var(--blue)}
.bn-item svg{width:22px;height:22px}
.bn-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:1px;opacity:0}
.bn-item.active .bn-dot{opacity:1}
.mobile-header{display:none;flex-shrink:0;background:var(--navy);padding:20px 16px 16px;padding-top:calc(20px + env(safe-area-inset-top))}
.mh-greeting{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:2px}
.mh-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
.mh-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;font-size:12px;color:rgba(255,255,255,.8);font-weight:500}
.mobile-content{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nav-h) + 20px)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--text-1);letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:4px}
.stat-card.blue{background:var(--blue);border-color:var(--blue)}
.stat-card.blue .stat-label,.stat-card.blue .stat-value,.stat-card.blue .stat-sub{color:#fff}
.stat-card.blue .stat-label,.stat-card.blue .stat-sub{color:rgba(255,255,255,.75)}
.list-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.list-item:last-child{border-bottom:none}
.li-icon{width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:700}
.li-info{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--text-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.1px}
.badge-blue{background:var(--blue-l);color:var(--blue-h)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r-md);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-h)}
.btn-outline{background:transparent;color:var(--text-1);border:1px solid var(--border)}
.btn-outline:hover{background:var(--gray-100)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--gray-100);color:var(--text-1)}
.btn-danger{background:var(--red-l);color:var(--red)}
.fab{position:fixed;right:20px;bottom:calc(var(--nav-h) + 16px);width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:80;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.05)}
.fab svg{width:24px;height:24px}
.home-section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:14px;font-weight:600;color:var(--text-1)}
.section-link{font-size:13px;color:var(--blue);font-weight:500;cursor:pointer}
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--text-3)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.qa-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.qa-btn:hover{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.qa-icon{width:36px;height:36px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.qa-label{font-size:13px;font-weight:600;color:var(--text-1)}
.qa-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.divider{height:1px;background:var(--border);margin:16px 0}
.scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrollable::-webkit-scrollbar{width:4px}
.scrollable::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:480px){.modal-overlay{align-items:center;padding:16px}}
.modal-box{background:var(--surface);width:100%;max-width:480px;border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s ease}
@media(min-width:480px){.modal-box{border-radius:var(--r-xl);max-height:85vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:600;color:var(--text-1)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px;border-radius:var(--r-sm);display:flex}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.menu-item{padding:9px 14px;font-size:13px;color:var(--text-1);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.menu-item:hover{background:var(--gray-100)}
.menu-item.danger{color:var(--red)}
.menu-item.danger:hover{background:var(--red-l)}
#toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:12px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;transform:translateX(120%);transition:transform .25s;pointer-events:auto;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.success{background:#064E3B;border-left:3px solid var(--green)}
.toast.error{background:#7F1D1D;border-left:3px solid var(--red)}
.toast.info{background:var(--navy-2);border-left:3px solid var(--blue)}
#loading-overlay{position:fixed;inset:0;background:rgba(15,23,42,.7);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.loading-text{color:rgba(255,255,255,.8);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:768px){.sidebar{transform:none!important}.sidebar-overlay{display:none!important}.bottom-nav{display:none!important}.main-content{display:flex;flex:1}.mobile-header{display:none!important}.mobile-content{display:none!important}.hamburger{display:none!important}.fab{bottom:24px;right:24px}}
@media(max-width:767px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.bottom-nav{display:block}.main-content{display:none!important}.mobile-header{display:block}.mobile-content{display:block}.hamburger{display:flex}#screenApp{flex-direction:column}}
@media(min-width:768px) and (max-width:1024px){:root{--sidebar-w:200px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1280px){.stats-grid{grid-template-columns:repeat(4,1fr)}.quick-actions{grid-template-columns:repeat(4,1fr)}}

/* Abas de execução */
.exec-tab{flex:1;padding:10px 8px;background:none;border:none;border-bottom:2px solid transparent;font-size:14px;font-weight:500;color:var(--text-3);cursor:pointer;font-family:inherit;transition:all .15s}
.exec-tab:hover{color:var(--text-1)}
.exec-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.exec-aba{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<script>
// ============================================================
// GestãoTrein — JavaScript principal
// Arquitetura: zero concatenação de HTML em strings JS.
// Todo HTML dinâmico usa innerHTML com template literals (backtick).
// IDs passados via data-attributes + event delegation centralizado.
// Validado com node --check antes de cada entrega.
// ============================================================

const SUPABASE_URL = 'https://cldbqcpnzitwqvgqbipz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uuOYchKEtJXdYPI0pKmM_A_mtp-ihMT';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---- Estado global ----
let usuarioAtual = null;
let paginaAtual  = 'home';
let fabCallback  = null;
let _modalCurrentId = null;

// ---- Caches de dados ----
let _orgsCache      = [];
let _clientesCache  = [];
let _catalogoCache  = [];
let _turmasCache    = [];
let _colabsCache    = [];

// ============================================================
// UTILITÁRIOS
// ============================================================
const isMobile = () => window.innerWidth < 768;

function iniciais(nome) {
  if (!nome) return '?';
  return nome.trim().split(' ').filter(Boolean).slice(0,2).map(n=>n[0].toUpperCase()).join('');
}
function corPerfil(p) {
  return {provedor:'#7C3AED',administrador:'#2563EB',comercial:'#059669',instrutor:'#D97706'}[p]||'#64748B';
}
function labelPerfil(p) {
  return {provedor:'Provedor',administrador:'Administrador',comercial:'Comercial',instrutor:'Instrutor'}[p]||p;
}
function hora() {
  const h = new Date().getHours();
  return h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
}
function formatarData(iso) {
  if (!iso) return '-';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function formatarDataHora(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function mascararCnpj(input) {
  let v = input.value.replace(/\D/g,'').slice(0,14);
  if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2}).*/,'$1.$2.$3/$4-$5');
  else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d*).*/,'$1.$2.$3/$4');
  else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d*).*/,'$1.$2.$3');
  else if (v.length > 2) v = v.replace(/^(\d{2})(\d*).*/,'$1.$2');
  input.value = v;
}
function mascararCpf(input) {
  let v = input.value.replace(/\D/g,'').slice(0,11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2}).*/,'$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d*).*/,'$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d*).*/,'$1.$2');
  input.value = v;
}

function showToast(msg, tipo='info', dur=3500) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${tipo}`;
  t.innerHTML = `<span>${{success:'✓',error:'✕',info:'ℹ'}[tipo]||'ℹ'}</span><span>${msg}</span>`;
  c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},dur);
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

async function fazerLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  if (!email || !senha) { err.textContent='Preencha e-mail e senha.'; err.classList.add('show'); return; }
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password:senha});
    if (error) throw error;
    const {data:perfil, error:ep} = await sb.from('usuarios').select('*').eq('id',data.user.id).single();
    if (ep || !perfil) throw new Error('Usuário não encontrado no sistema. Contate o administrador.');
    if (!perfil.ativo) throw new Error('Usuário inativo. Contate o administrador.');
    usuarioAtual = perfil;
    await entrarNoApp();
  } catch(e) {
    err.textContent = e.message || 'E-mail ou senha incorretos.';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function entrarNoApp() {
  showScreen('screenApp');
  configurarNavegacao();
  await irPara('home');
}

async function fazerLogout() {
  if (!confirm('Deseja sair do sistema?')) return;
  showLoading('Saindo...');
  await sb.auth.signOut();
  usuarioAtual = null;
  hideLoading();
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Entrar';
  showScreen('screenLogin');
}

async function irPara(pagina, params={}) {
  paginaAtual = pagina;
  marcarNavAtivo(pagina);
  fecharSidebar();
  fabOcultar();
  document.getElementById('headerTitle').textContent = TITULOS[pagina] || pagina;
  showLoading();
  try {
    switch(pagina) {
      case 'home':          await renderHome(); break;
      case 'orgs':          await renderOrgs(); break;
      case 'clientes':      await renderClientes(); break;
      case 'colaboradores': await renderColaboradores(); break;
      case 'catalogo':      await renderCatalogo(); break;
      case 'turmas':        await renderTurmas(); break;
      case 'equipe':        await renderEquipe(); break;
      case 'agenda':        await renderAgenda(); break;
      case 'conta':         await renderConta(); break;
      default: renderEmBreve(TITULOS[pagina]||pagina);
    }
  } catch(e) {
    console.error(e);
    renderErro(e.message);
  } finally {
    hideLoading();
  }
}

function filtrarOrgs(q) {

function _menuDropdown(btn, items) {
  document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove());
  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'dropdown-menu org-menu';
  menu.style.cssText = `position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-md);z-index:200;min-width:180px;padding:4px 0;top:${Math.min(rect.bottom+4,window.innerHeight-160)}px;right:${window.innerWidth-rect.right}px`;
  menu.innerHTML = items.map(item=>item==='---'?'<div style="height:1px;background:var(--border);margin:4px 0"></div>':`<div class="menu-item${item.danger?' danger':''}" data-action="${item.action}" data-id="${item.id||''}" data-extra="${item.extra||''}">${item.label}</div>`).join('');
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),0);
}

function menuOrg(btn, id) {
  const org = _orgsCache.find(o=>o.id===id);

    <div class="field"><label>Perfil *</label>
      <select id="mUsrPerfil" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none">

      </select></div>`,

}

async function criarUsuarioOrg() {
  const nome   = document.getElementById('mUsrNome')?.value.trim();
  const email  = document.getElementById('mUsrEmail')?.value.trim();
  const senha  = document.getElementById('mUsrSenha')?.value;
  const perfil = document.getElementById('mUsrPerfil')?.value;
  if (!nome||!email||!senha) { showToast('Preencha todos os campos','error'); return; }
  if (senha.length<6) { showToast('Senha deve ter no mínimo 6 caracteres','error'); return; }
  try {
    setBtnModalLoading(true);
    const {data:{session}} = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/criar-usuario`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`,'apikey':SUPABASE_KEY},
      body:JSON.stringify({nome,email,senha,perfil,org_id:_modalCurrentId}),
    });
    const resultado = await res.json();
    if (!res.ok) throw new Error(resultado.error||'Erro ao criar usuário');
    fecharModal(); showToast(`${nome} criado com sucesso!`,'success');
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro','error'); }
}

    {action:'toggleCatalogo',id,label:t.ativo?'Desativar':'Ativar',danger:t.ativo},
  ]);
}

function abrirModalCatalogo(id=null) {
  _modalCurrentId = id;
  const t = id ? _catalogoCache.find(x=>x.id===id) : null;
  abrirModal(t?'Editar treinamento':'Novo treinamento', `
    <div class="field"><label>Nome *</label><input type="text" id="mCatNome" value="${t?.nome||''}" placeholder="Ex.: NR-35 Trabalho em Altura"></div>
    <div class="field"><label>Descrição *</label><textarea id="mCatDesc" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Descrição do treinamento...">${t?.descricao||''}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field" style="margin:0"><label>Carga horária (h) *</label><input type="number" id="mCatCH" value="${t?.carga_horaria||''}" placeholder="8" min="1" step="0.5"></div>
      <div class="field" style="margin:0"><label>Validade (meses) *</label><input type="number" id="mCatVal" value="${t?.validade_meses||''}" placeholder="24" min="1"></div>
    </div>
    <div class="field"><label>Categoria</label><input type="text" id="mCatCat" value="${t?.categoria||''}" placeholder="Ex.: NR, CIPA..."></div>
    <div class="field"><label>Conteúdo programático</label><textarea id="mCatCP" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;resize:vertical;outline:none" placeholder="Tópicos abordados...">${t?.conteudo_programatico||''}</textarea></div>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-blue" id="btnSalvarModal" onclick="salvarCatalogo()">${t?'Salvar':'Cadastrar'}</button>`);
}

async function salvarCatalogo() {
  const nome = document.getElementById('mCatNome')?.value.trim();
  const desc = document.getElementById('mCatDesc')?.value.trim();
  const ch   = parseFloat(document.getElementById('mCatCH')?.value);
  const val  = parseInt(document.getElementById('mCatVal')?.value);
  if (!nome) { showToast('Nome obrigatório','error'); return; }
  if (!desc) { showToast('Descrição obrigatória','error'); return; }
  if (!ch||ch<=0) { showToast('Carga horária inválida','error'); return; }
  if (!val||val<=0) { showToast('Validade inválida','error'); return; }
  const dados = {nome, descricao:desc, carga_horaria:ch, validade_meses:val, categoria:document.getElementById('mCatCat')?.value.trim()||null, conteudo_programatico:document.getElementById('mCatCP')?.value.trim()||null};
  try {
    setBtnModalLoading(true);
    const {error} = _modalCurrentId ? await sb.from('catalogo').update(dados).eq('id',_modalCurrentId) : await sb.from('catalogo').insert({...dados,org_id:usuarioAtual.org_id,ativo:true});
    if (error) throw error;
    fecharModal(); showToast(_modalCurrentId?'Treinamento atualizado!':'Treinamento cadastrado!','success');
    await renderCatalogo();
  } catch(e) { setBtnModalLoading(false); showToast(e.message||'Erro ao salvar','error'); }
}

async function toggleCatalogo(id) {
  const t = _catalogoCache.find(x=>x.id===id);
  if (!t||!confirm(`Deseja ${t.ativo?'desativar':'ativar'} este treinamento?`)) return;
  const {error} = await sb.from('catalogo').update({ativo:!t.ativo}).eq('id',id);
  if (error) { showToast(error.message,'error'); return; }
  showToast(`Treinamento ${t.ativo?'desativado':'ativado'}!`,'success');
  await renderCatalogo();
}

function _htmlListaTurmas(lista) {

  const SB = {agendada:'badge-gray',em_andamento:'badge-blue',concluida:'badge-green',cancelada:'badge-red'};
  return lista.map(t=>`
    <div class="list-item" style="padding:16px 4px;cursor:pointer;border-bottom:1px solid var(--border)" data-action="verTurma" data-id="${t.id}">

      </div>
    </div>`).join('');
}

function filtrarTurmas() {
  const s = document.getElementById('filtrStatusTurma')?.value;
  const r = s ? _turmasCache.filter(t=>t.status===s) : _turmasCache;
  document.getElementById('listaTurmas').innerHTML = _htmlListaTurmas(r);
}

async function abrirModalTurma(id=null) {
  _modalCurrentId = id;

    _clientesCache = data||[];

  if (!_catalogoCache.length) {
    const {data} = await sb.from('catalogo').select('id,nome,carga_horaria').eq('org_id',usuarioAtual.org_id).eq('ativo',true).order('nome');
    _catalogoCache = data||[];

  if (!_catalogoCache.length) { showToast('Cadastre o catálogo de treinamentos antes de criar turmas','error'); return; }
  const t = id ? _turmasCache.find(x=>x.id===id) : null;
  const cliOpts = _clientesCache.map(c=>`<option value="${c.id}" ${t?.cliente_id===c.id?'selected':''}>${c.nome}</option>`).join('');
  const catOpts = _catalogoCache.map(c=>`<option value="${c.id}" ${t?.catalogo_id===c.id?'selected':''}>${c.nome}</option>`).join('');

    <div class="field"><label>Treinamento *</label>
      <select id="mTurCat" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text-1);outline:none">
        <option value="">Selecione o treinamento...</option>${catOpts}

function abrirModalImportacao() {
  abrirModal('Importar colaboradores', `
    <div style="background:var(--blue-l);border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--blue-h);line-height:1.6">
      <div style="font-weight:600;margin-bottom:4px">Como importar:</div>
      1. Baixe o modelo de planilha abaixo<br>
      2. Preencha com os dados dos colaboradores<br>
      3. Salve como CSV e selecione o arquivo
    </div>
    <button class="btn btn-outline" style="width:100%;margin-bottom:16px" onclick="baixarModeloImportacao()">
      ⬇ Baixar modelo CSV
    </button>
    <div class="field"><label>Selecione o arquivo CSV *</label>
      <input type="file" id="mImpArquivo" accept=".csv" style="width:100%;padding:9px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;font-family:inherit"></div>
    <div id="mImpPreview" style="margin-top:8px;font-size:13px;color:var(--text-2)"></div>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-blue" id="btnSalvarModal" onclick="executarImportacao()">Importar</button>`);
  document.getElementById('mImpArquivo').addEventListener('change', previewImportacao);
}

let _dadosImportacao = [];
function previewImportacao(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split('\n').filter(l=>l.trim());
    const header = lines[0].toLowerCase().split(',').map(h=>h.trim());
    const nomeIdx  = header.indexOf('nome');
    const cpfIdx   = header.indexOf('cpf');
    const cargoIdx = header.indexOf('cargo');
    const emailIdx = header.indexOf('email');
    const telIdx   = header.indexOf('telefone');
    if (nomeIdx < 0) { document.getElementById('mImpPreview').innerHTML='<span style="color:var(--red)">Coluna "nome" não encontrada no arquivo.</span>'; return; }
    _dadosImportacao = lines.slice(1).map(line=>{
      const cols = line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      return {
        nome:  cols[nomeIdx]||'',
        cpf:   cpfIdx>=0?cols[cpfIdx]||null:null,
        cargo: cargoIdx>=0?cols[cargoIdx]||null:null,
        email: emailIdx>=0?cols[emailIdx]||null:null,
        telefone:telIdx>=0?cols[telIdx]||null:null,
      };
    }).filter(r=>r.nome);
    document.getElementById('mImpPreview').innerHTML=`<span style="color:var(--green);font-weight:500">✓ ${_dadosImportacao.length} colaboradores encontrados no arquivo.</span>`;
  };
  reader.readAsText(file, 'UTF-8');
}

async function executarImportacao() {
  if (!_dadosImportacao.length) { showToast('Selecione um arquivo CSV válido','error'); return; }
  try {
    setBtnModalLoading(true);
    const {data,error} = await sb.from('colaboradores').upsert(_dadosImportacao, {onConflict:'cpf',ignoreDuplicates:false}).select();
    if (error) throw error;
    fecharModal();
    showToast(`${data?.length||_dadosImportacao.length} colaboradores importados com sucesso!`,'success');
    await renderColaboradores();
  } catch(e) {
    setBtnModalLoading(false);
    showToast(e.message||'Erro ao importar','error');
  }
}

async function renderAgenda() {
  // Buscar agendamentos onde este instrutor está designado
  // Buscar sessoes do instrutor
  const {data:sessoes} = await sb
    .from('sessoes')
    .select('id,turma_id,data,hora_inicio,hora_fim,local,modalidade,concluida')
    .eq('instrutor_id',usuarioAtual.id)
    .order('data',{ascending:true});

  // Buscar turmas vinculadas (apenas não canceladas/excluídas)
  const turmaIds = [...new Set((sessoes||[]).map(s=>s.turma_id).filter(Boolean))];
  let turmasMap = {};
  if (turmaIds.length) {
    const {data:turmasData} = await sb
      .from('turmas')
      .select('id,status,catalogo_id,cliente_id,clientes(nome),catalogo(nome,carga_horaria)')
      .in('id',turmaIds)
      .neq('status','cancelada');
    (turmasData||[]).forEach(t => { turmasMap[t.id] = t; });
  }

  // Combinar dados — ignorar sessões de turmas canceladas
  const sessoesComTurma = (sessoes||[])
    .map(s=>({...s, turmas: turmasMap[s.turma_id]||null}))
    .filter(s=>s.turmas !== null);

  setMobileHeader(`<div class="mh-greeting">Agenda</div><div class="mh-name">Meus agendamentos</div>`);
  fabOcultar();

  const SL = {agendada:'Agendada',em_andamento:'Em andamento',concluida:'Concluída',cancelada:'Cancelada'};
  const SB = {agendada:'badge-gray',em_andamento:'badge-blue',concluida:'badge-green',cancelada:'badge-red'};

  const proximas  = sessoesComTurma.filter(s=>!s.concluida);
  const concluidas= sessoesComTurma.filter(s=>s.concluida);

  const renderSessao = s => {
    const t    = s.turmas||{};
    const turmaId = s.turma_id || t.id || '';
    const st   = t.status||'agendada';
    return `<div class="list-item" data-action="verTurma" data-id="${turmaId}" style="cursor:pointer;padding:14px 0">
      <div class="li-icon" style="background:var(--blue-l);color:var(--blue-h);font-size:11px;font-weight:700;border-radius:var(--r-md);text-align:center;padding:4px">${t.catalogo?.carga_horaria||'?'}h</div>
      <div class="li-info">
        <div class="li-title">${t.catalogo?.nome||'Treinamento'}</div>
        <div class="li-sub">${t.clientes?.nome||'—'} · ${formatarData(s.data)}${s.hora_inicio?' · '+s.hora_inicio.slice(0,5):''}${s.local?' · '+s.local:''}</div>
      </div>
      <span class="badge ${SB[st]}">${SL[st]}</span>
    </div>`;
  };

  setConteudo(`
    <div class="home-section">
      <div class="section-header"><div class="section-title">Próximos (${proximas.length})</div></div>
      <div class="card">${proximas.length===0
        ?'<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Nenhum agendamento</div><div class="empty-sub">Você não possui agendamentos pendentes.</div></div>'
        :proximas.map(renderSessao).join('')}</div>
    </div>
    <div class="home-section">
      <div class="section-header"><div class="section-title">Concluídos (${concluidas.length})</div></div>
      <div class="card">${concluidas.length===0
        ?'<div class="empty"><div class="empty-icon">✓</div><div class="empty-title">Nenhum concluído ainda</div></div>'
        :concluidas.map(renderSessao).join('')}</div>
    </div>`);
}

// ============================================================
// EXECUÇÃO DE TURMA
// Fluxo: instrutor abre a turma → inicia execução → registra
// presença → coleta assinaturas → adiciona fotos → finaliza
// ============================================================

// ---- Iniciar execução ----
async function iniciarExecucao(turmaId) {
  if (!confirm('Deseja iniciar a execução desta turma? O status será alterado para "Em andamento".')) return;
  const {error} = await sb.from('turmas').update({status:'em_andamento'}).eq('id',turmaId);
  if (error) { showToast(error.message,'error'); return; }
  showToast('Execução iniciada!','success');
  await abrirExecucao(turmaId);
}

// ---- Tela de execução ----

        </button>

      <div id="abaPresenca" class="exec-aba">
        <div class="card">
          <div class="card-title">Lista de presença</div>
          <div id="listaPresencas">
            ${_htmlListaPresencas(t.turma_participantes||[])}
          </div>
        </div>
      </div>

      <!-- Aba Evidências -->
      <div id="abaEvidencias" class="exec-aba" style="display:none">
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">Fotos e registros</div>
          <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
            <button class="btn btn-outline" type="button" onclick="this.nextElementSibling.click()">📷 Tirar foto</button>
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="adicionarEvidencia(this,'foto')">
            <button class="btn btn-outline" type="button" onclick="this.nextElementSibling.click()">🖼 Galeria</button>

            <div style="font-weight:600;margin-bottom:4px">⚠️ Atenção</div>
            Ao finalizar, o status da turma será alterado para <strong>Concluída</strong>.
            Os documentos ficarão disponíveis para geração.
          </div>
          <button class="btn btn-blue" style="width:100%" onclick="finalizarTurma('${turmaId}')">
            ✓ Finalizar treinamento

        </div>
      </div>`;

    setConteudo(html);
    setMobileHeader(`<div class="mh-greeting">Execução</div><div class="mh-name">${nomeT}</div>`);

  } finally { hideLoading(); }
}

// Retorna o container de execução visível (mobile ou desktop)
function _execContainer() {
  const mobile = document.getElementById('mobileBody');
  const desktop = document.getElementById('mainBody');
  // No mobile o mobileBody está visível (display:block via CSS media query)
  if (window.innerWidth < 768) return mobile;
  return desktop;
}

// Busca um elemento pelo ID dentro do container correto
function execEl(id) {
  return _execContainer().querySelector('#'+id) || document.getElementById(id);
}

function trocarAbaExec(aba, btn) {
  const container = btn.closest('#mainBody, #mobileBody') || _execContainer();
  container.querySelectorAll('.exec-tab').forEach(t => t.classList.remove('active'));
  container.querySelectorAll('.exec-aba').forEach(a => a.style.display = 'none');
  btn.classList.add('active');
  const abaId = 'aba' + aba.charAt(0).toUpperCase() + aba.slice(1);
  const abaEl = container.querySelector('#' + abaId);
  if (abaEl) abaEl.style.display = 'block';

  if (aba === 'presenca') {
    const lista = container.querySelector('#listaPresencas');
    if (lista && window._execParticipantes) {
      lista.innerHTML = _htmlListaPresencas(window._execParticipantes);
    }
  }
  if (aba === 'finalizar') {
    const totalAssin = container.querySelector('#totalAssinados');
    if (totalAssin && window._execPresencas) {
      totalAssin.textContent = Object.values(window._execPresencas).filter(p => p.assinatura_path || p.presente).length;
    }
    const totalEv = container.querySelector('#totalEvidencias');
    if (totalEv && window._execEvidencias) {
      totalEv.textContent = window._execEvidencias.length;
    }
  }
}

// ---- Assinatura digital ----
function abrirAssinatura(colId, nomeCol) {
  window._assinaturaColId = colId;
  window._assinaturaNome  = nomeCol;
  abrirModal(`Assinatura — ${nomeCol}`, `
    <div style="font-size:13px;color:var(--text-2);margin-bottom:12px">
      ${nomeCol}, assine no espaço abaixo:
    </div>
    <canvas id="canvasAssinatura" width="440" height="180"
      style="border:2px solid var(--border);border-radius:var(--r-md);touch-action:none;width:100%;display:block;background:#fff;cursor:crosshair">
    </canvas>
    <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="limparAssinatura()">
      🗑 Limpar
    </button>`,
    `<button class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
     <button class="btn btn-blue" id="btnSalvarModal" onclick="confirmarAssinatura()">Confirmar assinatura</button>`);

  // Inicializar canvas após modal abrir
  setTimeout(()=>_initCanvas(), 100);
}

function _initCanvas() {
  const canvas = document.getElementById('canvasAssinatura');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Ajustar resolução para telas de alta densidade
  const ratio = window.devicePixelRatio||1;
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width  = w * ratio;
  canvas.height = h * ratio;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(ratio, ratio);
  ctx.strokeStyle = '#0F172A';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  let desenhando = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {x: src.clientX - rect.left, y: src.clientY - rect.top};
  }
  function start(e) {
    e.preventDefault();
    desenhando = true;
    const {x,y} = getPos(e);
    lastX = x; lastY = y;
    ctx.beginPath();
    ctx.moveTo(x,y);
  }
  function draw(e) {
    if (!desenhando) return;
    e.preventDefault();
    const {x,y} = getPos(e);
    ctx.lineTo(x,y);
    ctx.stroke();
    lastX = x; lastY = y;
  }
  function end(e) { desenhando = false; }

  canvas.addEventListener('mousedown',  start, {passive:false});
  canvas.addEventListener('mousemove',  draw,  {passive:false});
  canvas.addEventListener('mouseup',    end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove',  draw,  {passive:false});
  canvas.addEventListener('touchend',   end);
}

function limparAssinatura() {
  const canvas = document.getElementById('canvasAssinatura');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

async function confirmarAssinatura() {
  const canvas = document.getElementById('canvasAssinatura');
  if (!canvas) return;

  // Verificar se há traços
  const ctx   = canvas.getContext('2d');
  const pixels= ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasData = pixels.some((v,i)=>i%4===3&&v>0);
  if (!hasData) { showToast('Por favor, realize a assinatura antes de confirmar','error'); return; }

  try {
    setBtnModalLoading(true);
    const turmaId = window._execTurmaId;
    const colId   = window._assinaturaColId;
    const dataUrl = canvas.toDataURL('image/png');

    // Upload da assinatura para o Storage
    const blob    = await (await fetch(dataUrl)).blob();
    const path    = `${usuarioAtual.org_id}/${turmaId}/${colId}.png`;
    const {error:upErr} = await sb.storage.from('assinaturas').upload(path, blob, {upsert:true, contentType:'image/png'});
    if (upErr) throw upErr;

    // Registrar presença
    // Verificar se já existe presença para atualizar ou inserir
    const {data:presExist} = await sb.from('presencas')
      .select('id').eq('turma_id',turmaId).eq('colaborador_id',colId).maybeSingle();
    const sessaoId = window._execSessaoId;
    if (!sessaoId) throw new Error('Sessão não encontrada. Certifique-se de que há um agendamento vinculado a você nesta turma.');
    let dbErr;
    if (presExist) {
      ({error:dbErr} = await sb.from('presencas').update({
        presente:true, assinatura_path:path, assinado_em:new Date().toISOString(),
        sessao_id:sessaoId,
      }).eq('id',presExist.id));
    } else {
      ({error:dbErr} = await sb.from('presencas').insert({
        sessao_id:sessaoId, turma_id:turmaId,
        colaborador_id:colId, org_id:usuarioAtual.org_id,
        presente:true, assinatura_path:path, assinado_em:new Date().toISOString(),
      }));
    }
    if (dbErr) throw dbErr;

    // Atualizar cache local
    window._execPresencas[colId] = {
      colaborador_id:colId,
      presente:true,
      assinatura_path:path,
      assinado_em:new Date().toISOString(),
    };

    fecharModal();
    showToast(`Assinatura de ${window._assinaturaNome} registrada!`,'success');

    // Atualizar lista sem recarregar tudo
    const listaEl = execEl('listaPresencas');
    if (listaEl) listaEl.innerHTML = _htmlListaPresencas(window._execParticipantes);

    // Atualizar contador na aba finalizar
    const totalEl = execEl('totalAssinados');
    if (totalEl) totalEl.textContent = Object.values(window._execPresencas).filter(p=>p.assinatura_path||p.presente).length;

  } catch(e) {
    setBtnModalLoading(false);
    showToast(e.message||'Erro ao salvar assinatura','error');
  }
}

// ---- Evidências fotográficas ----
function _htmlListaEvidencias(evidencias) {
  if (!evidencias.length) return `<div class="empty" style="padding:20px"><div class="empty-icon">📷</div><div class="empty-title">Nenhuma evidência</div><div class="empty-sub">Adicione fotos do treinamento.</div></div>`;
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">` +
    evidencias.map(ev=>`
      <div style="position:relative;border-radius:var(--r-md);overflow:hidden;aspect-ratio:1;background:var(--gray-100)">
        <img src="${ev.url_temp||''}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);padding:4px 6px;font-size:10px;color:#fff">
          ${ev.tipo||'foto'}
        </div>
        <button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:20px;height:20px;color:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center"
          data-action="removerEvidencia" data-id="${ev.id}" data-path="${ev.arquivo_path||''}">✕</button>
      </div>`).join('') + '</div>';
}

async function adicionarEvidencia(input, tipo) {
  const file = input.files[0];
  if (!file) return;
  const turmaId = window._execTurmaId;
  try {
    showLoading('Enviando foto...');
    const ext  = file.type.split('/')[1]||'jpg';
    const uuid = crypto.randomUUID();
    const path = `${usuarioAtual.org_id}/${turmaId}/${uuid}.${ext}`;

    const {error:upErr} = await sb.storage.from('evidencias').upload(path, file, {upsert:false, contentType:file.type});
    if (upErr) throw upErr;

    const {data:ev, error:dbErr} = await sb.from('evidencias').insert({
      org_id:       usuarioAtual.org_id,
      turma_id:     turmaId,
      tipo,
      arquivo_path: path,
    }).select().single();
    if (dbErr) throw dbErr;

    // URL temporária para exibição
    const {data:urlData} = await sb.storage.from('evidencias').createSignedUrl(path, 3600);
    ev.url_temp = urlData?.signedUrl||'';
    window._execEvidencias.push(ev);

    const listaEvEl = execEl('listaEvidencias');
    if (listaEvEl) listaEvEl.innerHTML = _htmlListaEvidencias(window._execEvidencias);
    showToast('Foto adicionada!','success');
    input.value = '';
  } catch(e) {
    showToast(e.message||'Erro ao enviar foto','error');
  } finally { hideLoading(); }
}

async function removerEvidencia(evId, path) {
  if (!confirm('Deseja remover esta evidência?')) return;
  try {
    if (path) await sb.storage.from('evidencias').remove([path]);
    const {error} = await sb.from('evidencias').delete().eq('id',evId);
    if (error) throw error;
    window._execEvidencias = window._execEvidencias.filter(e=>e.id!==evId);
    const listaEvEl2 = execEl('listaEvidencias');
    if (listaEvEl2) listaEvEl2.innerHTML = _htmlListaEvidencias(window._execEvidencias);
    showToast('Evidência removida','info');
  } catch(e) { showToast(e.message||'Erro','error'); }
}

async function salvarAnotacoes(turmaId) {
  const textarea = execEl('anotacoesInstrutor');
  if (!textarea) return;
  const texto = textarea.value.trim();
  const {error} = await sb.from('turmas').update({anotacoes_instrutor:texto}).eq('id',turmaId);
  if (error) { showToast(error.message,'error'); return; }
  textarea.readOnly = true;
  textarea.style.background = 'var(--gray-50)';
  textarea.style.color = 'var(--text-2)';
  const btnSalvar  = execEl('btnSalvarAnotacoes');
  const btnEditar  = execEl('btnEditarAnotacoes');
  const labelSalvo = execEl('anotacoesSalvas');
  if (btnSalvar)  btnSalvar.style.display  = 'none';
  if (btnEditar)  btnEditar.style.display  = 'inline-flex';
  if (labelSalvo) labelSalvo.style.display = 'inline';
  showToast('Anotações salvas!','success');
}

function editarAnotacoes() {
  const textarea = execEl('anotacoesInstrutor');
  if (!textarea) return;
  textarea.readOnly = false;
  textarea.style.background = '';
  textarea.style.color = '';
  textarea.focus();
  const btnSalvar  = execEl('btnSalvarAnotacoes');
  const btnEditar  = execEl('btnEditarAnotacoes');
  const labelSalvo = execEl('anotacoesSalvas');
  if (btnSalvar)  btnSalvar.style.display  = 'inline-flex';
  if (btnEditar)  btnEditar.style.display  = 'none';
  if (labelSalvo) labelSalvo.style.display = 'none';
}

// ---- Finalizar turma ----
async function finalizarTurma(turmaId) {
  const total    = window._execParticipantes.length;
  const assinou  = Object.values(window._execPresencas).filter(p=>p.assinatura_path||p.presente).length;
  if (total > 0 && assinou === 0) {
    if (!confirm('Nenhum participante assinou ainda. Deseja finalizar mesmo assim?')) return;
  }
  if (!confirm('Confirma a finalização do treinamento? Esta ação não pode ser desfeita.')) return;
  try {
    showLoading('Finalizando...');
    const {error} = await sb.from('turmas').update({
      status:'concluida',
      finalizada_em: new Date().toISOString(),
      docs_gerados:  false,
    }).eq('id',turmaId);
    if (error) throw error;
    showToast('Treinamento finalizado com sucesso!','success');
    await verTurma(turmaId);
  } catch(e) {
    showToast(e.message||'Erro ao finalizar','error');
  } finally { hideLoading(); }
}

  setConteudo(`
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-blue" onclick="abrirModalUsuarioOrg('${usuarioAtual.org_id}')">${ICONS.plus} Novo usuário</button>
    </div>
    <div class="card">${(data||[]).length===0?'<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">Nenhum usuário</div></div>':(data||[]).map(u=>`
      <div class="list-item" style="padding:14px 4px">
        <div class="li-icon" style="background:${corPerfil(u.perfil)}22;color:${corPerfil(u.perfil)};font-size:12px;font-weight:700;border-radius:50%">${iniciais(u.nome)}</div>
        <div class="li-info"><div class="li-title">${u.nome}</div><div class="li-sub">${u.email||'Sem e-mail'}</div></div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="badge badge-gray" style="text-transform:capitalize">${labelPerfil(u.perfil)}</span>
          <span class="badge ${u.ativo?'badge-green':'badge-gray'}">${u.ativo?'Ativo':'Inativo'}</span>
        </div>
      </div>`).join('')}</div>`);
}

// ============================================================
// MINHA CONTA
// ============================================================
async function renderConta() {
  const u = usuarioAtual;
  setMobileHeader(`<div class="mh-greeting">Configurações</div><div class="mh-name">Minha conta</div>`);
  fabOcultar();
  setConteudo(`
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div style="width:56px;height:56px;border-radius:50%;background:${corPerfil(u.perfil)};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0">${iniciais(u.nome)}</div>
        <div>
          <div style="font-size:18px;font-weight:700">${u.nome}</div>
          <div style="font-size:13px;color:var(--text-2);margin-top:2px">${u.email||'—'}</div>
          <span class="badge badge-blue" style="margin-top:6px">${labelPerfil(u.perfil)}</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="field"><label>Nome completo</label><input type="text" id="editNome" value="${u.nome}"></div>
      <div class="field"><label>E-mail</label><input type="email" id="editEmail" value="${u.email||''}"></div>
      <button class="btn btn-blue" onclick="salvarConta()" style="width:100%">Salvar alterações</button>
    </div>
    <div class="card">
      <div class="card-title">Segurança</div>
      <button class="btn btn-danger" style="width:100%" onclick="fazerLogout()">${ICONS.logout} Sair do sistema</button>
    </div>`);
}

async function salvarConta() {
  const nome  = document.getElementById('editNome')?.value.trim();
  const email = document.getElementById('editEmail')?.value.trim();
  if (!nome) { showToast('Nome é obrigatório','error'); return; }
  try {
    const {error} = await sb.from('usuarios').update({nome,email}).eq('id',usuarioAtual.id);
    if (error) throw error;
    usuarioAtual.nome  = nome;
    usuarioAtual.email = email;
    document.getElementById('sidebarAvatar').textContent = iniciais(nome);
    document.getElementById('sidebarNome').textContent   = nome;
    showToast('Dados atualizados!','success');
  } catch(e) { showToast(e.message||'Erro ao salvar','error'); }
}

// ============================================================
// EVENT DELEGATION CENTRAL
// ============================================================
document.addEventListener('click', function(e) {
  // Navegação via data-nav
  const navEl = e.target.closest('[data-nav]');
  if (navEl) { irPara(navEl.getAttribute('data-nav')); return; }

  // Ações via data-action
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.getAttribute('data-action');
  const id     = el.getAttribute('data-id') || null;
  const extra  = el.getAttribute('data-extra') || null;
  const cli    = el.getAttribute('data-cli') || null;
  const col    = el.getAttribute('data-col') || null;

  switch(action) {
    // Navegação
    case 'irParaTurmas':    irPara('turmas'); break;
    case 'verTurma':        if(id) verTurma(id); break;
    // Organizações
    case 'menuOrg':         menuOrg(el, id); break;
    case 'editarOrg':       document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalOrg(id); break;
    case 'criarUserOrg':    document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalUsuarioOrg(id); break;
    case 'toggleOrg':       document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); toggleOrg(id); break;
    // Clientes
    case 'menuCliente':     menuCliente(el, id); break;
    case 'editarCliente':   document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalCliente(id); break;
    case 'toggleCliente':   document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); toggleCliente(id); break;
    // Colaboradores
    case 'editarColab':     abrirModalColab(id); break;
    // Catálogo
    case 'menuCatalogo':    menuCatalogo(el, id); break;
    case 'editarCatalogo':  document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalCatalogo(id); break;
    case 'toggleCatalogo':  document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); toggleCatalogo(id); break;
    // Turmas
    case 'menuTurmaCard':         _menuTurmaCard(el,id); break;
    case 'excluirTurma':          document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalExcluirTurma(id); break;
    case 'editarTurma':           document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalTurma(id); break;
    case 'cancelarTurma':   cancelarTurma(id); break;
    case 'addAgendamento':  abrirModalAgendamento(id); break;
    case 'menuAgendamento':  menuAgendamento(el,id,el.getAttribute('data-turma')); break;
    case 'editarAgendamento': document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); abrirModalAgendamento(extra,id); break;
    case 'excluirAgendamento': document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove()); excluirAgendamento(id,extra); break;
    case 'addParticipante': abrirModalAddParticipante(id, cli); break;
    // Participante
    case 'selecionarPart':        selecionarParticipante(el.getAttribute('data-col')); break;
    case 'removerParticipante':   removerParticipante(id,el.getAttribute('data-turma')); break;
    // Execução
    case 'iniciarExecucao':       iniciarExecucao(id); break;
    case 'abrirExecucao':         abrirExecucao(id); break;
    case 'abrirAssinatura':       abrirAssinatura(el.getAttribute('data-col'),el.getAttribute('data-nome')); break;
    case 'removerEvidencia':      removerEvidencia(id,el.getAttribute('data-path')); break;
    case 'cadastroRapidoColab':   abrirCadastroRapidoColab(); break;
  }
});

// ============================================================
// INICIALIZAÇÃO
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const {data:{session}} = await sb.auth.getSession();
  if (session) {
    try {
      const {data:perfil, error} = await sb.from('usuarios').select('*').eq('id',session.user.id).single();
      if (!error && perfil && perfil.ativo) { usuarioAtual = perfil; await entrarNoApp(); return; }
    } catch(e) { console.warn('Sessão inválida'); }
  }
  showScreen('screenLogin');
});



</script>
