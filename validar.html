<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação de Certificado — AvanteSeg</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F8FAFC;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px}
.container{width:100%;max-width:560px}
.header{text-align:center;margin-bottom:28px;padding:24px;background:#0F172A;border-radius:16px}
.logo{max-width:200px;height:auto;display:block;margin:0 auto 10px}
.header-sub{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.6px;text-transform:uppercase;font-weight:500}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.status-ok{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#D1FAE5;border-radius:10px;margin-bottom:20px}
.status-ok .icon{width:36px;height:36px;background:#059669;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.status-ok .lbl{font-size:14px;font-weight:700;color:#065F46}
.status-ok .sub{font-size:12px;color:#059669;margin-top:2px}
.status-err{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#FEE2E2;border-radius:10px}
.status-err .icon{width:36px;height:36px;background:#DC2626;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.status-err .lbl{font-size:14px;font-weight:700;color:#7F1D1D}
.status-err .sub{font-size:12px;color:#DC2626;margin-top:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:420px){.grid{grid-template-columns:1fr}}
.field{padding:12px 14px;background:#F8FAFC;border-radius:8px;border:1px solid #E2E8F0}
.field-label{font-size:10px;color:#94A3B8;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.field-value{font-size:14px;font-weight:600;color:#0F172A}
.field-value.big{font-size:17px}
.divider{height:1px;background:#E2E8F0;margin:16px 0}
.loading{text-align:center;padding:40px;color:#94A3B8;font-size:14px}
.spinner{width:36px;height:36px;border:3px solid #E2E8F0;border-top-color:#2563EB;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.badge-valid{display:inline-flex;align-items:center;gap:5px;background:#D1FAE5;color:#065F46;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.codigo{font-size:11px;color:#CBD5E1}
.footer{text-align:center;margin-top:20px;font-size:11px;color:#94A3B8}
</style>
</head>

<script>
const SUPABASE_URL = 'https://cldbqcpnzitwqvgqbipz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uuOYchKEtJXdYPI0pKmM_A_mtp-ihMT';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function fmtData(iso) {
  if (!iso) return '-';
  const [y,m,d] = iso.split('-');
  const M = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return parseInt(d)+' de '+M[parseInt(m)-1]+' de '+y;
}
function fmtTipo(t) {
  return {certificado_individual:'Certificado Individual',certificado_coletivo:'Certificado Coletivo',lista_presenca:'Lista de Presenca'}[t]||t;
}
function errHtml(msg) {
  return '<div class="status-err"><div class="icon">x</div><div><div class="lbl">Documento Invalido</div><div class="sub">'+msg+'</div></div></div>';
}

async function validar() {
  const codigo = new URLSearchParams(window.location.search).get('codigo');
  const card   = document.getElementById('card');
  if (!codigo) { card.innerHTML = errHtml('Codigo de validacao nao informado.'); return; }
  try {
    const {data:doc,error} = await sb.from('documentos')
      .select('*,turmas(protocolo,local,catalogo(nome,carga_horaria),clientes(nome)),colaboradores(nome,cargo,cpf)')
      .eq('codigo_validacao', codigo).maybeSingle();
    if (error) throw error;
    if (!doc) { card.innerHTML = errHtml('Certificado nao encontrado. O codigo informado nao corresponde a nenhum documento emitido.'); return; }

    const cat = doc.turmas?.catalogo||{};
    const cli = doc.turmas?.clientes||{};
    const col = doc.colaboradores;
    const dataEmissao = doc.gerado_em ? doc.gerado_em.split('T')[0] : null;

    const nomeField = col ? `
      <div class="grid"><div class="field" style="grid-column:1/-1">
        <div class="field-label">Participante</div>
        <div class="field-value big">${col.nome||'-'}</div>
        ${col.cargo?'<div style="font-size:12px;color:#64748B;margin-top:2px">'+col.cargo+'</div>':''}
      </div></div>` : '';

    card.innerHTML = `
      <div class="status-ok">
        <div class="icon">v</div>
        <div><div class="lbl">Documento Autentico</div>
        <div class="sub">Emitido por AvanteSeg Cursos e Treinamentos Corporativos</div></div>
      </div>
      <div class="grid"><div class="field" style="grid-column:1/-1">
        <div class="field-label">Treinamento</div>
        <div class="field-value big">${cat.nome||'-'}</div>
      </div></div>
      ${nomeField}
      <div class="grid">
        <div class="field"><div class="field-label">Empresa</div><div class="field-value">${cli.nome||'-'}</div></div>
        <div class="field"><div class="field-label">Carga Horaria</div><div class="field-value">${cat.carga_horaria||'-'}h</div></div>
      </div>
      <div class="grid">
        <div class="field"><div class="field-label">Tipo</div><div class="field-value">${fmtTipo(doc.tipo)}</div></div>
        <div class="field"><div class="field-label">Emissao</div><div class="field-value">${dataEmissao?fmtData(dataEmissao):'-'}</div></div>
      </div>
      ${doc.turmas?.protocolo?'<div class="field" style="margin-bottom:10px"><div class="field-label">Protocolo</div><div class="field-value">'+doc.turmas.protocolo+'</div></div>':''}
      <div class="divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="badge-valid">v Documento Valido</span>
        <span class="codigo">Cod: ${codigo.slice(0,8).toUpperCase()}</span>
      </div>`;
  } catch(e) {
    document.getElementById('card').innerHTML = errHtml(e.message||'Erro ao verificar.');
  }
}
validar();
</script>
